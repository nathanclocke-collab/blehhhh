<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>:D</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  #introOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 10;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1.5s ease;
  }
  #introOverlay.fade {
    opacity: 0;
  }
  #introOverlay.fadeOut {
    opacity: 1;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="introOverlay"></div>

<script>
(function () {
  "use strict";

  // ---------- MAP IMAGE (embedded, pixel-perfect collision) ----------
  const MAP_DATA_URI = "pixelJazz.png";

  // The floor is a wood-plank texture with a lighter board color and a
  // darker seam/grout color between boards — both count as walkable.
  const FLOOR_COLORS = [
    [144, 114, 80],  // light plank
    [142, 112, 78],  // light plank (slight shading variant)
    [124, 95, 58],   // darker seam
    [105, 79, 49]    // darkest seam
  ];
  // everything else (walls, out-of-bounds, etc.) is treated as solid.
  // Small tolerance since these are exact sampled colors, not a single
  // flat fill — keeps wall colors from being accidentally swept in.
  const COLOR_TOLERANCE = 10;

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  const ZOOM = 11; // how "zoomed in" the player's view is, in CSS pixels per world pixel

  // Render at full device-pixel resolution (not just CSS-pixel resolution)
  // so the pixel art stays crisp on retina/high-DPI screens instead of
  // being upscaled and going soft.
  const DPR = window.devicePixelRatio || 1;

  function resizeCanvas() {
    const cssW = window.innerWidth;
    const cssH = window.innerHeight;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width = Math.round(cssW * DPR);
    canvas.height = Math.round(cssH * DPR);
    ctx.imageSmoothingEnabled = false; // must be re-set after any resize
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const mapImage = new Image();
  let mapReady = false;
  let mapW = 0, mapH = 0;
  let mapPixels = null; // Uint8ClampedArray from getImageData

  // Offscreen canvas used once to read the map's raw pixel colors.
  const sampleCanvas = document.createElement("canvas");
  const sampleCtx = sampleCanvas.getContext("2d");

  mapImage.onload = function () {
    mapW = mapImage.naturalWidth;
    mapH = mapImage.naturalHeight;

    sampleCanvas.width = mapW;
    sampleCanvas.height = mapH;
    sampleCtx.drawImage(mapImage, 0, 0);
    mapPixels = sampleCtx.getImageData(0, 0, mapW, mapH).data;

    // Diagnostics: log actual pixel colors so any floor-color mismatch is
    // easy to spot in devtools if spawning still misbehaves.
    logSampleColor("top-left", 2, 2);
    logSampleColor("center", Math.floor(mapW / 2), Math.floor(mapH / 2));
    logSampleColor("bottom-center", Math.floor(mapW / 2), mapH - 3);

    mapReady = true;
    const spawned = placePlayerAtBottomEntrance();
    if (!spawned) {
      console.warn(
        "walk-around: no walkable floor pixel matched any of FLOOR_COLORS " +
        JSON.stringify(FLOOR_COLORS) + " within tolerance " + COLOR_TOLERANCE +
        ". Check the sample colors logged above and adjust FLOOR_COLORS " +
        "or COLOR_TOLERANCE. Falling back to map center as a raw position."
      );
      player.x = mapW / 2;
      player.y = mapH / 2;
    }
    requestAnimationFrame(loop);

    // Hold on a black screen for 3s, then fade the game in.
    const overlay = document.getElementById("introOverlay");
    setTimeout(() => {
      overlay.classList.add("fade");
    }, 3000);
  };
  mapImage.src = MAP_DATA_URI;

  // ---------- COLLISION ----------
  function logSampleColor(label, x, y) {
    if (x < 0 || y < 0 || x >= mapW || y >= mapH) return;
    const idx = (y * mapW + x) * 4;
    console.log(
      "walk-around: " + label + " (" + x + "," + y + ") = rgb(" +
      mapPixels[idx] + "," + mapPixels[idx + 1] + "," + mapPixels[idx + 2] + ")"
    );
  }

  function isFloorAt(x, y) {
    const ix = Math.floor(x);
    const iy = Math.floor(y);
    if (ix < 0 || iy < 0 || ix >= mapW || iy >= mapH) return false;
    const idx = (iy * mapW + ix) * 4;
    const r = mapPixels[idx], g = mapPixels[idx + 1], b = mapPixels[idx + 2];
    for (let i = 0; i < FLOOR_COLORS.length; i++) {
      const c = FLOOR_COLORS[i];
      if (
        Math.abs(r - c[0]) <= COLOR_TOLERANCE &&
        Math.abs(g - c[1]) <= COLOR_TOLERANCE &&
        Math.abs(b - c[2]) <= COLOR_TOLERANCE
      ) {
        return true;
      }
    }
    return false;
  }

  // Player is treated as a small square; all four corners (inset slightly)
  // must sit on floor pixels for a position to be considered valid.
  const PLAYER_HALF = 3; // half-width of collision box, in map pixels

  function canStandAt(x, y) {
    const h = PLAYER_HALF - 0.5;
    return (
      isFloorAt(x - h, y - h) &&
      isFloorAt(x + h, y - h) &&
      isFloorAt(x - h, y + h) &&
      isFloorAt(x + h, y + h)
    );
  }

  // Finds a walkable spot at the bottom edge of the map (the "bottom
  // entrance") and spawns the player there. Scans upward row by row from
  // the very bottom of the map until it finds a row with walkable floor,
  // then picks the point in that row closest to the map's horizontal
  // center (in case there are multiple openings along the bottom wall).
  function placePlayerAtBottomEntrance() {
    for (let y = mapH - PLAYER_HALF - 1; y >= 0; y--) {
      const candidates = [];
      for (let x = PLAYER_HALF; x < mapW - PLAYER_HALF; x++) {
        if (canStandAt(x, y)) candidates.push(x);
      }
      if (candidates.length > 0) {
        const cx = mapW / 2;
        candidates.sort((a, b) => Math.abs(a - cx) - Math.abs(b - cx));
        player.x = candidates[0];
        player.y = y;
        player.facing = "up"; // face into the room when entering from the bottom
        return true;
      }
    }
    // Fallback: no floor found scanning from the bottom, so just find
    // any valid tile starting from the map's center and expanding outward.
    return placePlayerOnValidFloor();
  }

  function placePlayerOnValidFloor() {
    // Scan outward from the map center for a walkable starting tile,
    // in case the exact center happens to land on a wall.
    const cx = mapW / 2, cy = mapH / 2;
    for (let r = 0; r < Math.max(mapW, mapH); r++) {
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const x = cx + dx, y = cy + dy;
          if (canStandAt(x, y)) {
            player.x = x;
            player.y = y;
            return true;
          }
        }
      }
    }
    return false;
  }

  // ---------- PLAYER ----------
  const player = {
    x: 0, y: 0,
    speed: 42, // map-pixels per second
    facing: "down"
  };

  // ---------- STAGE NPCs (jazz quartet) ----------
  // Each NPC gets its own exact standing spot (world pixel coordinates).
  // Click on the map in-game and check the browser console — it logs the
  // world (x, y) of wherever you clicked — to find/adjust these spots.
  let npcs = [
    { x: 271, y: 38, color: "#ffb347" },
    { x: 281, y: 51, color: "#ff6b6b" },
    { x: 298, y: 49, color: "#9d7bff" },
    { x: 290, y: 37, color: "#5fd97a" }
  ];

  const keys = Object.create(null);
  window.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
    if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });
  window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
  });

  // ---------- TOP EXIT ----------
  // The only walkable spot along the top border of the map is the exit
  // itself, so simply reaching the top edge (any x) triggers it — no need
  // to also check x range. Walking into the top border fades the screen
  // to black over 2s, then navigates to run.html.
  const EXIT_Y_MAX = 6; // how close to y=0 counts as "reached the top border"
  const EXIT_DESTINATION = "run.html";
  let exiting = false;

  function checkTopExit() {
    if (exiting || !mapReady) return;
    if (player.y <= EXIT_Y_MAX) {
      exiting = true;
      const overlay = document.getElementById("introOverlay");
      overlay.classList.remove("fade");
      overlay.classList.add("fadeOut");
      setTimeout(() => {
        window.location.href = EXIT_DESTINATION;
      }, 2000);
    }
  }

  function isDown(...names) {
    return names.some((n) => keys[n]);
  }

  // Click-to-inspect: click anywhere on the map and its world coordinates
  // are logged to the console. Handy for finding exact x/y values (e.g.
  // for placing the stage NPCs) without guessing.
  canvas.addEventListener("click", (e) => {
    if (!mapReady) return;
    const rect = canvas.getBoundingClientRect();
    const cssX = e.clientX - rect.left;
    const cssY = e.clientY - rect.top;
    const scale = getScale();
    const cam = getCamera();
    const worldX = cam.x + (cssX * DPR) / scale;
    const worldY = cam.y + (cssY * DPR) / scale;
    console.log(
      "walk-around: clicked world coords = (" +
      Math.round(worldX) + ", " + Math.round(worldY) + ")"
    );
  });

  function updatePlayer(dt) {
    if (exiting) return;

    let dx = 0, dy = 0;
    if (isDown("w", "arrowup")) dy -= 1;
    if (isDown("s", "arrowdown")) dy += 1;
    if (isDown("a", "arrowleft")) dx -= 1;
    if (isDown("d", "arrowright")) dx += 1;

    if (dx === 0 && dy === 0) return;

    // normalize diagonal movement
    const len = Math.hypot(dx, dy);
    dx /= len;
    dy /= len;

    if (Math.abs(dx) > Math.abs(dy)) player.facing = dx > 0 ? "right" : "left";
    else if (dy !== 0) player.facing = dy > 0 ? "down" : "up";

    const step = player.speed * dt;

    // move on each axis separately so the player slides along walls
    // instead of stopping dead on diagonal contact
    const nx = player.x + dx * step;
    if (canStandAt(nx, player.y)) player.x = nx;

    const ny = player.y + dy * step;
    if (canStandAt(player.x, ny)) player.y = ny;

    checkTopExit();
  }

  // ---------- CAMERA ----------
  // Effective world-to-device-pixel scale (zoom level times device pixel ratio).
  function getScale() {
    return ZOOM * DPR;
  }

  function getCamera() {
    const scale = getScale();
    const viewWorldW = canvas.width / scale;
    const viewWorldH = canvas.height / scale;

    let camX = player.x - viewWorldW / 2;
    let camY = player.y - viewWorldH / 2;

    // If the viewport shows more world than the map has, center the map
    // instead of clamping into negative space.
    camX = mapW <= viewWorldW
      ? (mapW - viewWorldW) / 2
      : Math.max(0, Math.min(camX, mapW - viewWorldW));
    camY = mapH <= viewWorldH
      ? (mapH - viewWorldH) / 2
      : Math.max(0, Math.min(camY, mapH - viewWorldH));

    return { x: camX, y: camY, w: viewWorldW, h: viewWorldH };
  }

  // ---------- DRAW ----------
  function drawPlayer() {
    const r = PLAYER_HALF;

    ctx.save();
    ctx.translate(player.x, player.y);

    // soft ground shadow
    ctx.fillStyle = "rgba(30, 25, 20, 0.28)";
    ctx.beginPath();
    ctx.ellipse(0, r * 0.85, r * 1.05, r * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    // body
    ctx.fillStyle = "#34ccff";
    ctx.strokeStyle = "#3a3a50";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // eyes, offset by facing direction
    let ex = 0, ey = 0;
    if (player.facing === "left") ex = -1;
    else if (player.facing === "right") ex = 1;
    else if (player.facing === "up") ey = -1;
    else ey = 1;

    ctx.fillStyle = "#241f2e";
    const eyeSpacing = player.facing === "up" || player.facing === "down" ? 1.1 : 0.6;
    const eyeForward = player.facing === "left" || player.facing === "right" ? 0.9 : 0.6;

    ctx.beginPath();
    ctx.arc(-eyeSpacing + ex * eyeForward, -0.3 + ey * eyeForward, 0.55, 0, Math.PI * 2);
    ctx.arc(eyeSpacing + ex * eyeForward, -0.3 + ey * eyeForward, 0.55, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawNPC(npc) {
    const r = PLAYER_HALF;

    ctx.save();
    ctx.translate(npc.x, npc.y);

    // soft ground shadow
    ctx.fillStyle = "rgba(30, 25, 20, 0.28)";
    ctx.beginPath();
    ctx.ellipse(0, r * 0.85, r * 1.05, r * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    // body
    ctx.fillStyle = npc.color;
    ctx.strokeStyle = "#3a3a50";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // simple face, looking outward (down) toward the audience
    ctx.fillStyle = "#241f2e";
    ctx.beginPath();
    ctx.arc(-1.1, 0.3, 0.55, 0, Math.PI * 2);
    ctx.arc(1.1, 0.3, 0.55, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!mapReady) return;

    const cam = getCamera();
    const scale = getScale();

    ctx.save();
    ctx.scale(scale, scale);
    ctx.translate(-cam.x, -cam.y);

    ctx.drawImage(mapImage, 0, 0);

    for (let i = 0; i < npcs.length; i++) drawNPC(npcs[i]);
    drawPlayer();

    ctx.restore();
  }

  // ---------- LOOP ----------
  let lastTime = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    updatePlayer(dt);
    draw();

    requestAnimationFrame(loop);
  }
})();
</script>

</body>
</html>
