<!DOCTYPE html>
<html>
  <head>
    <title>:3</title> 

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css"
        integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk"
        crossorigin="anonymous">

    <style>
      body {
        background-color: bisque;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        user-select: none;
        -webkit-user-select: none;
        overflow: hidden;
      }

      #game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        position: relative;
        z-index: 10;
      }

      #character-zone {
        position: relative;
        width: 100px;
        height: 160px;
        margin: 0 auto 80px auto; 
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #character {
        width: 200px;   
        height: 300px;  
        position: absolute;
        --char-offset-y: -20px;
        top: var(--char-offset-y);
        left: -40px;
        z-index: 2; 
        cursor: default;
      }

      #character-sprite {
        width: 100%;
        height: 100%;
        background-image: url("mr-president.png");
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      
      body.drag-unlocked #character {
        cursor: grab;
      }
      body.drag-unlocked #character:active {
        cursor: grabbing;
      }

     .idle {
      animation: bounce 1.2s infinite ease-in-out;
     }
     .idle #character-sprite {
      animation: play-piskel 0.66s infinite;
     }
   
     .talking {
      animation: jitter 0.3s infinite linear;
     }
     .talking #character-sprite {
      animation: play-piskel 0.3s infinite;
     }
     
     .lockdown-panic {
      animation: extreme-jitter 0.1s infinite linear !important;
     }
     .lockdown-panic #character-sprite {
      animation: play-piskel 0.15s infinite !important;
     }

     @keyframes play-piskel {
      0%, 49.9% { transform: scaleX(1); }
      50%, 100% { transform: scaleX(-1); }
     }

     @keyframes bounce {
      0%, 100% { top: var(--char-offset-y); }
      50% { top: calc(var(--char-offset-y) - 8px); }
     }

     @keyframes jitter { 
      0% { transform: translate(0, 0); }
      50% { transform: translate(1px, -2px); }
      100% { transform: translate(-1px, 0); }
     }

      @keyframes extreme-jitter {
        0% { transform: scale(1.1) translate(1px, 1px); }
        50% { transform: scale(1.15) translate(-1px, -1px) rotate(1deg); }
        100% { transform: scale(1.1) translate(1px, -1px) rotate(-1deg); }
      }

      #dialogue-box {
        background: white;          
        border: 3px solid #333;     
        border-radius: 10px;        
        padding: 15px;              
        width: 300px;               
        height: 120px;              
        margin-bottom: 15px;        
        box-shadow: 4px 4px 0px #333;
        text-align: left;
        box-sizing: border-box;
        overflow: hidden;
      }

      #dialogue-text {
        margin: 0;
        line-height: 1.5;
        letter-spacing: 0.5px;
        font-size: 15px;
      }
      
      #dialogue-text span {
        display: inline-block;
      }

      .ghost {
        visibility: hidden;
      }

      button, input[type="submit"] {
        background-color: #ffb7b2;
        border: 2px solid #333;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 2px 2px 0px #333;
        font-family: 'Courier New', Courier, monospace;
      }

      button:active, input[type="submit"]:active {
        transform: translate(2px, 2px);
        box-shadow: 0px 0px 0px #333;
      }

      #bonus-btn {
        display: none;
        position: absolute;
        top: 90%;
        left: 50%; 
        transform: translate(-50%, -50%);
        z-index: 1;
        background-color: #ffd166;
        white-space: nowrap;
        padding: 1px 3px;
        font-size: 5px;
      }

      .chaos-btn {
        position: absolute;
        z-index: 1;
        white-space: nowrap;
        border: 2px solid #1a0000;
        box-shadow: 2px 2px 0px #000;
      }

      body.lockdown-active {
        background-color: #7f0000 !important; 
        animation: alarm-flash 0.5s infinite alternate;
      }

      body.lockdown-active #dialogue-box {
        background: #1a0000;
        border-color: #ff0000;
        color: #ff3333;
        box-shadow: 4px 4px 0px #ff0000;
      }

      body.lockdown-active button#next-btn, body.lockdown-active button#alt-btn {
        background-color: #ff0000;
        color: white;
        border-color: #1a0000;
      }

      @keyframes alarm-flash {
        0% { background-color: #500000; }
        100% { background-color: #b30000; }
      }

      .captcha-card {
        display: none;
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        border: 3px solid #333;
        max-width: 340px;
        width: 100%;
        text-align: center;
        margin-top: 15px;
        color: #000;
      }

      .captcha-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 15px;
      }

      #image-captcha {
        font-family: "Courier New", Courier, monospace;
        font-weight: bold;
        font-size: 24px;
        letter-spacing: 4px;
        color: #222;
        background: linear-gradient(45deg, #e8e8e8 25%, #fafdff 25%, #fafdff 50%, #e8e8e8 50%, #e8e8e8 75%, #fafdff 75%, #fafdff 100%);
        background-size: 15px 15px;
        border: 2px dashed #6c757d;
        border-radius: 6px;
        padding: 6px 15px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        text-decoration: line-through;
        font-style: italic;
      }

      .refresh-btn {
        background: #f1f3f5;
        border: 2px solid #333;
        color: #495057;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
      }

      #submit-captcha {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 2px solid #333;
        border-radius: 6px;
        font-size: 16px;
        margin-bottom: 12px;
        font-family: monospace;
      }

      .recaptcha-container {
        margin: 15px 0;
        display: flex;
        justify-content: center;
      }

      #captcha-btn {
        width: 100%;
        background-color: #228be6;
        color: white;
      }

      #captcha-key {
        margin-top: 10px;
        font-weight: bold;
        font-size: 14px;
      }

      #lockdown-timer-container {
        font-size: 24px;
        color: #ff0000;
        font-weight: bold;
        margin-top: 15px;
        margin-bottom: 15px; 
        font-family: monospace;
      }

      #image-captcha-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        z-index: 999;
        align-items: center;
        justify-content: center;
      }

      #image-captcha-overlay.active {
        display: flex;
      }

      #image-captcha-popup {
        width: 320px;
        max-width: 90vw;
        background: #ece9d8;
        border: 2px solid #0a246a;
        border-radius: 6px;
        box-shadow: 6px 6px 18px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        text-align: left;
        color: #000;
        animation: popup-shake 0.4s ease;
      }

      .retro-titlebar {
        background: linear-gradient(180deg, #2569d6, #0a246a);
        color: white;
        padding: 5px 6px 5px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        font-size: 13px;
        font-family: Tahoma, 'Courier New', sans-serif;
      }

      .retro-titlebar .retro-title {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .retro-buttons {
        display: flex;
        gap: 3px;
        flex-shrink: 0;
        margin-left: 8px;
      }

      .retro-btn {
        background: #d4d0c8;
        color: #000;
        width: 18px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: bold;
        border: 1px solid #808080;
        border-radius: 2px;
        cursor: pointer;
        user-select: none;
        line-height: 1;
      }

      .retro-btn:active {
        border-color: #404040;
      }

      .retro-close:hover {
        background: #e81123;
        color: white;
      }

      .retro-body {
        background: #ffffff;
        padding: 20px;
        text-align: center;
      }

      @keyframes popup-shake {
        0%, 100% { transform: translate(0, 0); }
        20% { transform: translate(-8px, 0); }
        40% { transform: translate(8px, 0); }
        60% { transform: translate(-5px, 0); }
        80% { transform: translate(5px, 0); }
      }

      @keyframes popup-nudge {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(-4px, 0); }
        75% { transform: translate(4px, 0); }
      }

      .retro-body h3 {
        margin-top: 0;
        color: #333;
        margin-bottom: 4px;
      }

      .retro-body .subtext {
        color: #666;
        font-size: 13px;
        margin-bottom: 15px;
      }

      .retro-body .subtext strong {
        color: #222;
      }

      #grid-wrapper {
        position: relative;
        width: 260px;
        height: 260px;
        margin: 0 auto 20px auto;
        border: 2px dashed #6c757d;
        border-radius: 6px;
        overflow: hidden;
      }

      #image-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        width: 100%;
        height: 100%;
      }

      .grid-tile {
        position: relative;
        background-repeat: no-repeat;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-sizing: border-box;
      }

      .grid-tile .check-overlay {
        position: absolute;
        top: 4px;
        left: 4px;
        width: 20px;
        height: 20px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.15s ease;
      }

      .grid-tile .check-overlay i {
        color: #228be6;
        font-size: 13px;
      }

      .grid-tile.selected {
        box-shadow: inset 0 0 0 3px #228be6;
      }

      .grid-tile.selected .check-overlay {
        opacity: 1;
      }

      .refresh-row {
        display: flex;
        justify-content: center;
        margin-bottom: 12px;
      }

      #image-verify-btn {
        width: 100%;
        background-color: #228be6;
        color: white;
      }

      #verify-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        margin: 14px auto 0 auto;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        color: #fff;
        transform: scale(0.6);
        opacity: 0;
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
      }

      #verify-icon.show {
        display: flex;
        transform: scale(1);
        opacity: 1;
      }

      #verify-icon.icon-match {
        background-color: #2b8a3e;
      }

      #verify-icon.icon-error {
        background-color: #c92a2a;
      }

      #image-key {
        margin-top: 15px;
        font-weight: 600;
        font-size: 15px;
      }
      .status-match {
        color: #2b8a3e;
      }
      .status-error {
        color: #c92a2a;
      }

      #checkbox-captcha-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      #checkbox-captcha-overlay.active {
        display: flex;
      }

      #checkbox-captcha-popup {
        width: 340px;
        max-width: 90vw;
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        padding: 22px 20px 18px 20px;
        text-align: center;
        color: #000;
        font-family: Arial, sans-serif;
        animation: popup-shake 0.35s ease;
        position: relative;
      }

      #checkbox-close-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 24px;
        height: 24px;
        border: none;
        background: #eee;
        border-radius: 50%;
        color: #666;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        box-shadow: none;
        transition: background 0.15s ease, color 0.15s ease;
      }

      #checkbox-close-btn:hover {
        background: #e03131;
        color: white;
      }

      #checkbox-close-btn:active {
        transform: none;
        box-shadow: none;
      }

      #checkbox-captcha-popup h4 {
        margin: 0 0 4px 0;
        font-family: 'Courier New', Courier, monospace;
      }

      #checkbox-captcha-popup .subtext {
        font-size: 12px;
        color: #666;
        margin: 0 0 16px 0;
      }

      .recaptcha-widget {
        width: 300px;
        max-width: 100%;
        height: 74px;
        margin: 0 auto;
        background: #f9f9f9;
        border: 1px solid #d3d3d3;
        border-radius: 3px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.03) inset;
        display: flex;
        align-items: center;
        padding: 0 14px;
        box-sizing: border-box;
        text-align: left;
      }

      .recaptcha-check-wrap {
        display: flex;
        align-items: center;
        flex: 1;
      }

      .recaptcha-check {
        width: 28px;
        height: 28px;
        border: 2px solid #c1c1c1;
        border-radius: 2px;
        background: #fff;
        margin-right: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: border-color 0.15s ease;
      }

      .recaptcha-check:hover {
        border-color: #999;
      }

      .recaptcha-check.verifying {
        border-color: #4285f4;
        cursor: default;
      }

      .recaptcha-check.verified {
        background: #4285f4;
        border-color: #4285f4;
        cursor: default;
      }

      .recaptcha-spinner {
        width: 18px;
        height: 18px;
        border: 3px solid #cfe0fb;
        border-top-color: #4285f4;
        border-radius: 50%;
        display: none;
        animation: recaptcha-spin 0.7s linear infinite;
      }

      .recaptcha-check.verifying .recaptcha-spinner {
        display: block;
      }

      .recaptcha-checkmark {
        display: none;
        color: #fff;
        font-size: 15px;
      }

      .recaptcha-check.verified .recaptcha-checkmark {
        display: block;
      }

      @keyframes recaptcha-spin {
        to { transform: rotate(360deg); }
      }

      .recaptcha-label {
        font-size: 14px;
        color: #222;
        user-select: none;
      }

      .recaptcha-badge {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        color: #999;
        line-height: 1.1;
        text-align: center;
        width: 46px;
      }

      .recaptcha-badge i {
        font-size: 20px;
        color: #ccc;
        margin-bottom: 2px;
      }

      #checkbox-key {
        margin-top: 14px;
        font-weight: 600;
        font-size: 14px;
        min-height: 18px;
      }

      #music-toggle-btn {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 1100;
        width: 40px;
        height: 40px;
        padding: 0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
      }

      #final-captcha-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1001;
        align-items: center;
        justify-content: center;
      }

      #final-captcha-overlay.active {
        display: flex;
      }

      #final-captcha-popup {
        width: 480px;
        max-width: 92vw;
        height: 520px;
        max-height: 85vh;
        background: #ece9d8;
        border: 2px solid #0a246a;
        border-radius: 6px;
        box-shadow: 6px 6px 18px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        animation: popup-shake 0.4s ease;
      }

      #final-captcha-popup iframe {
        flex: 1;
        width: 100%;
        border: none;
        background: #ffffff;
      }
    </style>
    
    <script src="https://www.recaptcha.net/recaptcha/api.js" async defer></script>
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  </head>

  <body onload="generateTextCaptcha()">

    <!-- Background music. loop keeps it playing throughout; playback is
         actually kicked off from JS on the user's first click, since
         browsers block autoplay-with-sound until there's been an
         interaction with the page.

         Playback is routed through Tone.js (Tone.Player -> Tone.PitchShift
         -> destination) so that during lockdown mode we can speed the
         track up AND drop its pitch independently, instead of the
         "faster = higher pitched" effect you get from plain
         audio.playbackRate. -->
    <audio id="bg-music" src="29__Charlie_s_Here.mp3" loop preload="auto" style="display:none;"></audio>
    <button id="music-toggle-btn" onclick="toggleMusic()" title="Mute/unmute music">
      <i id="music-icon" class="fas fa-volume-up"></i>
    </button>

    <div id="game-container">
      
      <div id="character-zone">
        <button id="bonus-btn" onclick="addBonusTime()">+15s Secret!</button>
        <div id="character" class="idle" draggable="false">
          <div id="character-sprite"></div>
        </div>
      </div>

      <div id="dialogue-box">
        <p id="dialogue-text">Hello there! Welcome to the birthday website!</p>
      </div>

      <input id="user-input" type="text" placeholder="Type here..." style="display: none; margin-bottom: 15px; padding: 8px; font-family: monospace; border: 2px solid #333; border-radius: 5px;">

      <div id="button-container">
          <button id="next-btn" onclick="advanceDialogue()">Next</button>
          <button id="alt-btn" onclick="selectAlternative()" style="display: none; background-color: #ffb2b2; margin-left: 10px;">No</button>
      </div>
      
      <div id="lockdown-timer-container" style="display: none;">
        TIME REMAINING: <span id="timer-countdown">20</span>s
      </div>

      <!-- FIRST CAPTCHA (text + recaptcha) -->
      <div class="captcha-card" id="captcha-popup">
          <h4 style="margin: 0 0 10px 0;"> Security Overwrite</h4>
          <div class="captcha-row">
              <div id="image-captcha"></div>
              <button class="refresh-btn" onclick="generateTextCaptcha()" title="Change code">
                  <i class="fas fa-sync"></i>
              </button>
          </div>
          <input type="text" id="submit-captcha" placeholder="Enter text code" autocomplete="off" />
          
          <div class="recaptcha-container">
              <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
          </div>
          
          <input type="submit" id="captcha-btn" value="Verify Protocols" onclick="verifyBothCaptchas()" />
          <p id="captcha-key"></p>
      </div>

      <!-- SECOND CAPTCHA (image-select) -->
      <div id="image-captcha-overlay">
        <div id="image-captcha-popup">
          <div class="retro-titlebar">
            <span class="retro-title">⚠ system32.exe - Verification Required</span>
            <div class="retro-buttons">
              <span class="retro-btn" onclick="fakeWindowButton(this)">_</span>
              <span class="retro-btn" onclick="fakeWindowButton(this)">▢</span>
              <span class="retro-btn retro-close" onclick="fakeWindowButton(this)">✕</span>
            </div>
          </div>

          <div class="retro-body">
            <h3>Verify You're Human</h3>
            <p class="subtext">Select all squares with <strong id="prompt-label"></strong></p>

            <div id="grid-wrapper">
                <div id="image-grid"></div>
            </div>

            <div class="refresh-row">
                <button class="refresh-btn" onclick="generateImageCaptcha()" title="New challenge">
                    <i class="fas fa-sync"></i> New challenge
                </button>
            </div>

            <input type="submit" id="image-verify-btn" value="Verify" onclick="verifyImageCaptcha()" />

            <div id="verify-icon"><i class="fas fa-check"></i></div>

            <p id="image-key"></p>
          </div>
        </div>
      </div>

      <!-- THIRD CAPTCHA (fake "I'm not a robot" checkbox) -->
      <div id="checkbox-captcha-overlay">
        <div id="checkbox-captcha-popup">
          <button id="checkbox-close-btn" onclick="closeCheckboxCaptcha()" title="Close">✕</button>
          <h4>One Last Thing...</h4>
          <p class="subtext">just to be REALLY sure you're human</p>

          <div class="recaptcha-widget">
            <div class="recaptcha-check-wrap">
              <div class="recaptcha-check" id="fake-checkbox" onclick="toggleFakeCheckbox()">
                <div class="recaptcha-spinner"></div>
                <i class="fas fa-check recaptcha-checkmark"></i>
              </div>
              <span class="recaptcha-label">I'm not a robot</span>
            </div>
            <div class="recaptcha-badge">
              <i class="fas fa-birthday-cake"></i>
              reCAPTCHA
            </div>
          </div>

          <p id="checkbox-key"></p>
        </div>
      </div>

      <!-- FOURTH "CAPTCHA" (gamecap.html, in an old-Windows-style window) -->
      <div id="final-captcha-overlay">
        <div id="final-captcha-popup">
          <div class="retro-titlebar">
            <span class="retro-title">⚠ WINDOWS.exe </span>
            <div class="retro-buttons">
              <span class="retro-btn" onclick="finalWindowButton(this)">_</span>
              <span class="retro-btn" onclick="finalWindowButton(this)">▢</span>
              <span class="retro-btn retro-close" onclick="finalWindowButton(this)">✕</span>
            </div>
          </div>
          <iframe id="final-captcha-frame" title="Yo Mama"></iframe>
        </div>
      </div>

    </div>

    <script>
      let playerName = "";
      const SECRET_NAME = "Roberta Escobedo Silva";

      const normalDialogue = [
        { text: "My name is Mr. President.", type: "normal" },
        { text: "I make sure that the right people get their presents.", type: "normal" },
        { text: "Now! Before I can give you your wonderful birthday gift... what is your name?", type: "question" }
      ];

      const SECRET_DIALOGUE = [
        { text: "Thats wonderful! Happy Birthday Roberta Escobedo Silva!", type: "normal" },
        { text: "Your present will open shortly.", type: "normal" },
      ];

      const lockdownDialogue = [
        { text: "Are you uh.. sure? We don't want a mixup here-!", type: "choice" },
        { text: "Right right right- did you check your spelling? Capitalization perhaps?", type: "normal" },
        { text: "Is that *definitely* your final answer?", type: "choice" },
        { text: "Oh.", type: "pause" },
        { text: "...", type: "normal" },
        { text: "I suggest you leave this website right now.", type: "alarm" },
      ];

      // Shown once the checkbox captcha is verified, before the final
      // gamecap.html challenge is revealed.
      const FINAL_CHALLENGE_LINE = [
      { text: "Fine, I have nothing else for you. Just play this game of mine I suppose-", type: "normal" },
      { text: "Don't go ANYWHERE you're not supposed to be either, im keeping an eye on you", type: "normal" },
      { text: "Also can I not be on the floor just once? It's rather cold down there", type: "normal"},
    ];

      // Filename of the game/iframe shown after the checkbox captcha closes.
      const FINAL_GAME_SRC = "gamecap.html";

      // Filename of the track that takes over once we're past the
      // lockdown/checkbox stretch. Drop the mp3 next to this HTML file
      // and update this if you name it something else.
      const FINAL_MUSIC_SRC = "penguinMusic.mp3";

      let currentLineIndex = -1; 
      let typingTimer; 
      let isLockdownMode = false; 
      let isSuccessMode = false; 
      let draggingUnlocked = false; 
      let hasTriggeredPanic = false; 
      let countdownSeconds = 20;
      let lockdownTimer;
      let chaosActive = false;
      let textCaptchaValue = "";
      let isFinalChallengeIntro = false; // true while showing FINAL_CHALLENGE_LINE
      let finalChallengeIndex = -1; // which line of FINAL_CHALLENGE_LINE we're on

      const characterImg = document.getElementById('character');
      const dialogueText = document.getElementById('dialogue-text');
      const nextButton = document.getElementById('next-btn');
      const altButton = document.getElementById('alt-btn'); 
      const userInput = document.getElementById('user-input');
      const bonusButton = document.getElementById('bonus-btn');

      // --- BACKGROUND MUSIC (via Tone.js so we can speed up + pitch down independently) ---
      const bgMusicEl = document.getElementById('bg-music');
      const musicIcon = document.getElementById('music-icon');
      let musicStarted = false;
      let musicMuted = false;

      let tonePlayer = null;
      let pitchShift = null;
      let toneReady = false;
      let tickSynth = null;
      let isSwitchingTrack = false; // guards against overlapping switchMusicTrack calls

      // Normal vs. lockdown "panic" audio settings.
      // playbackRate speeds the track up; pitchShift.pitch (in semitones)
      // is applied ON TOP of that and can move independently, so we push
      // it negative to counteract + go beyond the natural pitch rise,
      // giving a faster tempo with a deeper, more menacing tone.
      const NORMAL_RATE = 1.0;
      const NORMAL_PITCH_SEMITONES = 0;
      const LOCKDOWN_RATE = 1.35;
      const LOCKDOWN_PITCH_SEMITONES = -14; // drop ~an octave + a bit, tune to taste

      async function initTonePlayer() {
        if (toneReady) return;
        await Tone.start(); // resumes the audio context on user gesture

        pitchShift = new Tone.PitchShift({
          pitch: NORMAL_PITCH_SEMITONES,
          windowSize: 0.1
        }).toDestination();

        tonePlayer = new Tone.Player({
          url: bgMusicEl.src,
          loop: true,
          autostart: false,
          volume: -6 // roughly matches the old 0.5 <audio> volume
        }).connect(pitchShift);

        // Dedicated synth for the countdown tick, wired straight to the
        // speakers (not through pitchShift) so it stays a crisp, clean
        // digital "beep" regardless of what the music is doing.
        tickSynth = new Tone.Synth({
          oscillator: { type: "square" },
          envelope: { attack: 0.001, decay: 0.02, sustain: 0.3, release: 0.05 }
        }).toDestination();
        tickSynth.volume.value = -14;

        await Tone.loaded();
        toneReady = true;
      }

      // Plays one countdown beep. Gets a touch higher-pitched as the
      // timer runs low, for urgency.
      function playCountdownTick(secondsLeft) {
        if (!toneReady || !tickSynth) return;
        const urgent = secondsLeft <= 5;
        tickSynth.triggerAttackRelease(urgent ? "A5" : "E5", "16n");
      }

      async function startMusicIfNeeded() {
        if (musicStarted) return;
        musicStarted = true;
        try {
          await initTonePlayer();
          tonePlayer.playbackRate = NORMAL_RATE;
          tonePlayer.start();
        } catch (err) {
          console.log("Playback blocked:", err);
        }
      }

      function toggleMusic() {
        if (!musicStarted) {
          startMusicIfNeeded();
          return;
        }
        musicMuted = !musicMuted;
        if (tonePlayer) {
          tonePlayer.mute = musicMuted;
        }
        musicIcon.className = musicMuted ? "fas fa-volume-mute" : "fas fa-volume-up";
      }

      // Ramp the track up to panic speed + drop its pitch. Call this when
      // lockdown visuals/audio should kick in (or to restore normal
      // playback when active = false). Also un-mutes, in case we're
      // coming out of a silence beat (see cutMusicToSilence below).
      function setLockdownAudio(active) {
        if (!toneReady || !tonePlayer || !pitchShift) return;

        const targetRate = active ? LOCKDOWN_RATE : NORMAL_RATE;
        const targetPitch = active ? LOCKDOWN_PITCH_SEMITONES : NORMAL_PITCH_SEMITONES;

        tonePlayer.mute = false;
        tonePlayer.playbackRate = targetRate;

        // Smoothly glide the pitch shift rather than snapping it, for a
        // creepier "the music is warping" feel.
        pitchShift.pitch = targetPitch;
      }

      // Cuts the music to dead silence (used on the "Oh." beat) without
      // stopping/losing playback position, so it can resume cleanly a
      // moment later at the new pitched-down, sped-up settings.
      function cutMusicToSilence() {
        if (!toneReady || !tonePlayer) return;
        tonePlayer.mute = true;
      }

      // Called from gamecap.html (via window.top) when the player walks
      // into the igloo, so the music dies out exactly in sync with the
      // screen fade-to-black there.
      function fadeOutMusic(durationSeconds) {
        if (!toneReady || !tonePlayer) return;
        tonePlayer.volume.rampTo(-Infinity, durationSeconds || 1);
      }

      // Swaps the currently playing track out for a new one. Used to move
      // from the main loop to FINAL_MUSIC_SRC once the player is done with
      // the lockdown/checkbox captcha gauntlet.
      //
      // Rebuilds tonePlayer from scratch (rather than reusing the same
      // instance via .stop()/.load()) and disposes the old one outright.
      // This avoids a Tone.js quirk where stop()+load() on the same
      // Player can leave the old buffer's source node still ringing out
      // while the new buffer starts, which sounds like two tracks playing
      // at once. isSwitchingTrack also guards against this being called
      // more than once in quick succession.
      async function switchMusicTrack(url) {
        if (!toneReady || !tonePlayer || isSwitchingTrack) return;
        isSwitchingTrack = true;

        try {
          const wasMuted = musicMuted;

          tonePlayer.stop();
          tonePlayer.dispose();

          tonePlayer = new Tone.Player({
            url: url,
            loop: true,
            autostart: false,
            volume: -14 // quieter than the main -6 dB track
          }).connect(pitchShift);

          await Tone.loaded();

          tonePlayer.playbackRate = NORMAL_RATE;
          if (pitchShift) pitchShift.pitch = NORMAL_PITCH_SEMITONES;

          tonePlayer.mute = wasMuted;
          tonePlayer.start();
        } catch (err) {
          console.log("Track switch failed:", err);
        } finally {
          isSwitchingTrack = false;
        }
      }

      function advanceDialogue() { 
        startMusicIfNeeded();

        // Special case: walking through FINAL_CHALLENGE_LINE one line at a
        // time. Once we run out of lines, open the final gamecap.html
        // challenge instead of pulling from one of the normal pools.
        if (isFinalChallengeIntro) {
          finalChallengeIndex++;
          if (finalChallengeIndex < FINAL_CHALLENGE_LINE.length) {
            triggerTypingAnimation(FINAL_CHALLENGE_LINE[finalChallengeIndex].text, FINAL_CHALLENGE_LINE[finalChallengeIndex].type);
          } else {
            isFinalChallengeIntro = false;
            openFinalCaptchaBox();
          }
          return;
        }

        let currentPool;
        if (isLockdownMode) {
          currentPool = lockdownDialogue;
        } else if (isSuccessMode) {
          currentPool = SECRET_DIALOGUE;
        } else {
          currentPool = normalDialogue;
        }

        if (!isLockdownMode && !isSuccessMode && currentLineIndex >= 0 && normalDialogue[currentLineIndex].type === "question") {
          if (userInput.value.trim() === "") {
            alert("Blud be patient");
            return;
          }
          
          playerName = userInput.value.trim();
          userInput.value = "";
          userInput.style.display = "none";

          if (playerName.toLowerCase() === SECRET_NAME.toLowerCase()) {
            isSuccessMode = true;
            currentPool = SECRET_DIALOGUE; 
            currentLineIndex = -1; 
          } else {
            isLockdownMode = true;
            currentPool = lockdownDialogue; 
            currentLineIndex = -1;
          }
        } 
        else if (isLockdownMode && currentLineIndex >= 0 && lockdownDialogue[currentLineIndex].type === "choice") {
          altButton.style.display = "none"; 
          nextButton.innerText = "Next";
        }

        clearInterval(typingTimer);
        currentLineIndex++;
        
        if (currentLineIndex < currentPool.length) {
          triggerTypingAnimation(currentPool[currentLineIndex].text, currentPool[currentLineIndex].type);
        } else {
          if (isSuccessMode) {
            window.location.href = "presents.html"; 
          } else if (isLockdownMode) {
            dialogueText.innerText = "SYSTEM TERMINATED.";
            nextButton.style.display = "none"; 
            
            characterImg.className = "lockdown-panic"; 
            
            draggingUnlocked = true;
            document.body.classList.add("drag-unlocked");
            bonusButton.style.display = "block"; 
          } else {
            dialogueText.innerText = "Thats pretty much it.";
            currentLineIndex = -1;
            nextButton.innerText = "Restart";
          }
        }
      }

      function triggerTypingAnimation(fullText, type) {
        dialogueText.innerHTML = "";
        for (let i = 0; i < fullText.length; i++) {
          let char = fullText.charAt(i);
          if (char === " ") {
            dialogueText.innerHTML += "<span>&nbsp;</span>";
          } else {
            dialogueText.innerHTML += `<span class="ghost">${char}</span>`;
          }
        }

        const letters = dialogueText.querySelectorAll('span');
        let currentCharacterIndex = 0;
        
        if (isLockdownMode && type === "alarm") {
          triggerLockdownVisuals();
        } else if (isLockdownMode && type === "pause") {
          cutMusicToSilence();
          characterImg.className = "talking";
        } else {
          characterImg.className = "talking"; 
        }

        typingTimer = setInterval(() => {
          if (currentCharacterIndex < letters.length) {
            letters[currentCharacterIndex].classList.remove('ghost');
            currentCharacterIndex++;
          } else {
            clearInterval(typingTimer); 
            characterImg.className = isLockdownMode && type === "alarm" ? "lockdown-panic" : "idle"; 

            let currentPool = isLockdownMode ? lockdownDialogue : (isSuccessMode ? SECRET_DIALOGUE : normalDialogue);
            let activeLineType = (currentPool && currentPool[currentLineIndex]) ? currentPool[currentLineIndex].type : "normal";

            if (isFinalChallengeIntro) {
              nextButton.innerText = "Next";
            }
            else if (!isLockdownMode && !isSuccessMode && activeLineType === "question") {
              userInput.style.display = "inline-block";
              userInput.focus();
              nextButton.innerText = "Submit";
            } 
            else if (isLockdownMode && activeLineType === "choice") {
              nextButton.innerText = "Yes...";
              altButton.style.display = "inline-block"; 
            } else if (chaosActive) {
              nextButton.style.display = "none";
              spawnFakeButtonChaos();
            } else {
              nextButton.innerText = "Next";
            }
          }
        }, 30); 
      }

      function updateLockdownTimer() {
        countdownSeconds--;
        document.getElementById("timer-countdown").innerText = countdownSeconds;
        playCountdownTick(countdownSeconds);
        
        if (countdownSeconds <= 0) {
          clearInterval(lockdownTimer); 
          clearInterval(typingTimer); 
          window.location.href = "gameover.html";
        }
      }

      function selectAlternative() {
        clearInterval(typingTimer);
        
        isLockdownMode = false;
        isSuccessMode = false;
        draggingUnlocked = false;
        hasTriggeredPanic = false; 
        document.body.classList.remove("drag-unlocked");
        currentLineIndex = 2; 
        
        altButton.style.display = "none"; 
        nextButton.innerText = "Submit";
        
        dialogueText.innerHTML = normalDialogue[currentLineIndex].text; 
        userInput.style.display = "inline-block";
        userInput.focus();
        
        resetCharacterPosition();
        characterImg.className = "idle";
        bonusButton.style.display = "none";

        document.body.classList.remove("lockdown-active");
        setLockdownAudio(false);
      }

      function triggerLockdownVisuals() {
        document.body.classList.add("lockdown-active");
        characterImg.className = "lockdown-panic";
        
        document.getElementById("lockdown-timer-container").style.display = "block";
        
        clearInterval(lockdownTimer);
        lockdownTimer = setInterval(updateLockdownTimer, 1000);

        setLockdownAudio(true);
      }

      function addBonusTime() {
        countdownSeconds += 15; 
        document.getElementById("timer-countdown").innerText = countdownSeconds;

        chaosActive = true;
        bonusButton.style.display = "none"; 
        resetCharacterPosition();
        draggingUnlocked = false;
        document.body.classList.remove("drag-unlocked");
        
        clearInterval(typingTimer);
        triggerTypingAnimation("Fine! If you dont want to leave then youll have to work for it.", "alarm");
      }

      function randomPositionAvoidingCenter() {
  if (Math.random() < 0.5) {
    return Math.floor(Math.random() * 35);       // 0-35
  } else {
    return Math.floor(65 + Math.random() * 35);  // 65-100
  }
}

      function spawnFakeButtonChaos() {
        const totalButtons = 45; 
        const realButtonIndex = Math.floor(Math.random() * totalButtons);
        const baseColors = ['#ffadad', '#ffd166', '#06d6a0', '#118ab2', '#ff70a6', '#ffaa00'];

        for (let i = 0; i < totalButtons; i++) {
          const btn = document.createElement('button');
          btn.className = 'chaos-btn';
          btn.innerText = "+15s Secret!";
          
          const randomX = randomPositionAvoidingCenter();
          const randomY = randomPositionAvoidingCenter();
          btn.style.left = randomX + "vw";
          btn.style.top = randomY + "vh";
          
          const randomBg = baseColors[Math.floor(Math.random() * baseColors.length)];
          btn.style.backgroundColor = randomBg;
          const randomScale = (0.7 + Math.random() * 0.7).toFixed(2);
          btn.style.transform = `scale(${randomScale})`;

          if (i === realButtonIndex) {
            btn.onclick = function() {
              countdownSeconds += 15; 
              document.getElementById("timer-countdown").innerText = countdownSeconds;
              handleRealChaosButtonPress();
            };
          } else {
            btn.onclick = function() {
              this.style.opacity = "0.3";
              this.style.pointerEvents = "none";
              this.innerText = "WRONG!";
            };
          }
          document.body.appendChild(btn);
        }
      }

      function handleRealChaosButtonPress() {
        const allChaosBtns = document.querySelectorAll('.chaos-btn');
        allChaosBtns.forEach(b => b.remove());
        chaosActive = false;

        triggerTypingAnimation("Wait, you found it?! No matter. Access is still restricted until you solve this!", "alarm");
        
        document.getElementById('captcha-popup').style.display = "block";
      }

      function generateTextCaptcha() {
        document.getElementById("submit-captcha").value = "";
        let unichar = "";
        const randomchar = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

        for (let i = 0; i < 4; i++) {
            let randomIndex = Math.floor(Math.random() * randomchar.length);
            unichar += randomchar.charAt(randomIndex);
        }
        textCaptchaValue = unichar;
        document.getElementById("image-captcha").innerHTML = unichar;
      }

      function verifyBothCaptchas() {
        const userInputText = document.getElementById("submit-captcha").value;
        const feedbackMessage = document.getElementById("captcha-key");
        const googleToken = grecaptcha.getResponse();

        if (userInputText !== textCaptchaValue) {
            feedbackMessage.innerText = "✗ Text code incorrect. Try again.";
            feedbackMessage.style.color = "#c92a2a";
            generateTextCaptcha();
        } else if (googleToken.length === 0) {
            feedbackMessage.innerText = "✗ Click the 'I'm not a robot' box!";
            feedbackMessage.style.color = "#c92a2a";
        } else {
            feedbackMessage.innerText = "✓ Override Accepted! Loading next check...";
            feedbackMessage.style.color = "#2b8a3e";

            setTimeout(() => {
                document.getElementById('captcha-popup').style.display = "none";
                document.getElementById('image-captcha-overlay').classList.add('active');
                generateImageCaptcha();
            }, 1500);
        }
      }

      function resetCharacterPosition() {
        characterImg.style.position = "";
        characterImg.style.top = "";
        characterImg.style.left = "";
      }

      const IMAGE_SRC = "love.png";
      const CORRECT_TILES = [1, 4, 7];
      const PROMPT_LABEL = "Blud <3";
      const GRID_SIZE = 3;

      let imgSelectedTiles = new Set();

      function buildImageGrid() {
        const grid = document.getElementById("image-grid");
        grid.innerHTML = "";
        imgSelectedTiles = new Set();

        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
          const row = Math.floor(i / GRID_SIZE);
          const col = i % GRID_SIZE;

          const tile = document.createElement("div");
          tile.className = "grid-tile";
          tile.dataset.index = i;

          tile.style.backgroundImage = `url("${IMAGE_SRC}")`;
          tile.style.backgroundSize = `${GRID_SIZE * 100}% ${GRID_SIZE * 100}%`;
          tile.style.backgroundPosition =
              `${(col / (GRID_SIZE - 1)) * 100}% ${(row / (GRID_SIZE - 1)) * 100}%`;

          const overlay = document.createElement("div");
          overlay.className = "check-overlay";
          overlay.innerHTML = '<i class="fas fa-check"></i>';
          tile.appendChild(overlay);

          tile.addEventListener("click", () => toggleImageTile(tile, i));
          grid.appendChild(tile);
        }
      }

      function toggleImageTile(tileEl, index) {
        if (imgSelectedTiles.has(index)) {
          imgSelectedTiles.delete(index);
          tileEl.classList.remove("selected");
        } else {
          imgSelectedTiles.add(index);
          tileEl.classList.add("selected");
        }
      }

      function generateImageCaptcha() {
        document.getElementById("prompt-label").innerText = PROMPT_LABEL;
        document.getElementById("image-key").innerHTML = "";

        const icon = document.getElementById("verify-icon");
        icon.classList.remove("show", "icon-match", "icon-error");

        buildImageGrid();
      }

      function fakeWindowButton(btnEl) {
        const popup = document.getElementById('image-captcha-popup');
        popup.style.animation = "none";
        void popup.offsetWidth;
        popup.style.animation = "popup-nudge 0.3s ease";

        const messageElement = document.getElementById("image-key");
        messageElement.innerHTML = "U rly thought LMAOOOOOOO. Finish the captcha bruh.";
        messageElement.className = "status-error";
      }

      function verifyImageCaptcha() {
        const messageElement = document.getElementById("image-key");
        const icon = document.getElementById("verify-icon");
        const correctSet = new Set(CORRECT_TILES);

        const isExactMatch =
            imgSelectedTiles.size === correctSet.size &&
            [...imgSelectedTiles].every(i => correctSet.has(i));

        icon.classList.remove("icon-match", "icon-error");

        if (isExactMatch) {
          messageElement.innerHTML = "✓ Verified successfully!";
          messageElement.className = "status-match";

          icon.innerHTML = '<i class="fas fa-check"></i>';
          icon.classList.add("icon-match", "show");

          setTimeout(() => {
            document.getElementById('image-captcha-overlay').classList.remove('active');
            document.getElementById('checkbox-captcha-overlay').classList.add('active');
          }, 1200);
        } else {
          messageElement.innerHTML = "✗ Incorrect selection. Try again.";
          messageElement.className = "status-error";

          icon.innerHTML = '<i class="fas fa-times"></i>';
          icon.classList.add("icon-error", "show");

          setTimeout(generateImageCaptcha, 1200);
        }
      }

      function toggleFakeCheckbox() {
        const box = document.getElementById("fake-checkbox");
        const keyMsg = document.getElementById("checkbox-key");

        // Intentionally never resolves. The spinner just spins forever -
        // the only way past this one is closing the window with the X.
        if (box.classList.contains("verifying")) {
          return;
        }

        box.classList.add("verifying");
        keyMsg.innerHTML = "Verifying...";
        keyMsg.style.color = "#666";
      }

      function closeCheckboxCaptcha() {
        // This is the actual way out of the checkbox captcha - the timer
        // (still running since the image captcha stage) stops here, then
        // we move into the final gamecap.html challenge.
        clearInterval(lockdownTimer);
        document.getElementById("lockdown-timer-container").style.display = "none";

        document.getElementById('checkbox-captcha-overlay').classList.remove('active');

        // Drop the lockdown red-screen/panic look, we're past that now.
        document.body.classList.remove("lockdown-active");

        showFinalChallengeIntro();
      }

      // Delivers the FINAL_CHALLENGE_LINE lines one at a time (advanced via
      // the isFinalChallengeIntro branch inside advanceDialogue), then hands
      // off to openFinalCaptchaBox() once they're exhausted.
      function showFinalChallengeIntro() {
        isFinalChallengeIntro = true;
        finalChallengeIndex = -1;
        clearInterval(typingTimer);

        nextButton.style.display = "inline-block";
        altButton.style.display = "none";
        userInput.style.display = "none";

        // No timer for this final stretch.
        document.getElementById("lockdown-timer-container").style.display = "none";
        clearInterval(lockdownTimer);

        // Make sure the first (text + reCAPTCHA) captcha card is hidden -
        // if it's still sitting in the page flow it pushes the dialogue
        // box and Mr. President up.
        document.getElementById("captcha-popup").style.display = "none";

        characterImg.className = "idle";
        finalChallengeIndex++;
        triggerTypingAnimation(FINAL_CHALLENGE_LINE[finalChallengeIndex].text, FINAL_CHALLENGE_LINE[finalChallengeIndex].type);
      }

      function openFinalCaptchaBox() {
        switchMusicTrack(FINAL_MUSIC_SRC);
        document.getElementById('final-captcha-frame').src = FINAL_GAME_SRC;
        document.getElementById('final-captcha-overlay').classList.add('active');
      }

      function finalWindowButton(btnEl) {
        const popup = document.getElementById('final-captcha-popup');
        popup.style.animation = "none";
        void popup.offsetWidth;
        popup.style.animation = "popup-nudge 0.3s ease";
        // The X/minimize/maximize buttons are decorative on purpose,
        // same as the system32.exe popup — gamecap.html itself is
        // responsible for deciding when to move on (e.g. by redirecting
        // to presents.html once its own challenge is solved).
      }

      let isDragging = false;
      let offsetX = 0;
      let offsetY = 0;

      characterImg.addEventListener('mousedown', dragStart);
      window.addEventListener('mousemove', dragMove);
      window.addEventListener('mouseup', dragEnd);

      characterImg.addEventListener('touchstart', dragStart, { passive: false });
      window.addEventListener('touchmove', dragMove, { passive: false });
      window.addEventListener('touchend', dragEnd);

      function dragStart(e) {
        if (!draggingUnlocked) return;
        
        isDragging = true;
        
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        let rect = characterImg.getBoundingClientRect();
        
        offsetX = clientX - rect.left;
        offsetY = clientY - rect.top;
        
        characterImg.style.position = "fixed";
        characterImg.style.left = (clientX - offsetX) + "px";
        characterImg.style.top = (clientY - offsetY) + "px";

        if (!hasTriggeredPanic) {
          hasTriggeredPanic = true;
          clearInterval(typingTimer);
          
          let customAlertText = "What are you doing?! Stop that right now! Leave me alone!!";
          dialogueText.innerHTML = "";
          
          for (let i = 0; i < customAlertText.length; i++) {
            let char = customAlertText.charAt(i);
            if (char === " ") {
              dialogueText.innerHTML += "<span>&nbsp;</span>";
          } else {
              dialogueText.innerHTML += `<span class="ghost">${char}</span>`;
            }
          }

          const letters = dialogueText.querySelectorAll('span');
          let currentCharacterIndex = 0;
          
          typingTimer = setInterval(() => {
            if (currentCharacterIndex < letters.length) {
              letters[currentCharacterIndex].classList.remove('ghost');
              currentCharacterIndex++;
            } else {
              clearInterval(typingTimer);
            }
          }, 30);
        }
      }

      function dragMove(e) {
        if (!isDragging) return;
        if(e.cancelable) e.preventDefault(); 
        
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        characterImg.style.left = (clientX - offsetX) + "px";
        characterImg.style.top = (clientY - offsetY) + "px";
      }

      function dragEnd() {
        isDragging = false;
        if (draggingUnlocked) {
          characterImg.className = "lockdown-panic";
        }
      }
    </script>
  </body>
</html>
