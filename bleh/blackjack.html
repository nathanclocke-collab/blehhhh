        margin: 0;
        user-select: none; /* Prevents text highlighting while dragging */

      }

      /* Only show grab hands when dragging is actually unlocked by the final button press */
      body.drag-unlocked #character {
        cursor: grab;
      }
      body.drag-unlocked #character:active {
        cursor: grabbing;
      }

     /* Animation frame-swaps coupled with core physics states */
     .idle {
      animation: play-piskel 0.66s steps(2) infinite, bounce 1.2s infinite ease-in-out;
     }
   
     .talking {
      animation: play-piskel 0.3s steps(2) infinite, jitter 0.3s infinite linear; 
     }
     
     .lockdown-panic {
      animation: play-piskel 0.15s steps(2) infinite, extreme-jitter 0.1s infinite linear !important;
     }

     @keyframes play-piskel {
      from { background-position: 0px 0px; }
      to { background-position: -400px 0px; }
     }

     @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
     }

     @keyframes jitter { 
      0% { transform: translate(0, 0) scaleY(1); }
      50% { transform: translate(1px, -3px) scaleY(1.02); }
      100% { transform: translate(-1px, 0) scaleY(1); }
     }

      #dialogue-box {
        background: white;          
        border: 3px solid #333;     
        border-radius: 10px;        
        padding: 15px;              
        width: 300px;               
        height: 120px;              
        margin-bottom: 15px;        
        box-shadow: 4px 4px 0px #333;
        text-align: left;
        box-sizing: border-box;
        overflow: hidden;     /* Safety net */
      }

      #dialogue-text {
        margin: 0;
        line-height: 1.5;
        letter-spacing: 0.5px;
        font-size: 15px;
      }
      
      #dialogue-text span {
        display: inline-block;
      }

      .ghost {
        visibility: hidden;
      }

      button {
        background-color: #ffb7b2;
        border: 2px solid #333;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 2px 2px 0px #333;
      }

      button:active {
        transform: translate(2px, 2px);
        box-shadow: 0px 0px 0px #333;
      }
