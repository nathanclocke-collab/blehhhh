<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms Stretched Full-Screen CRT Matrix</title>
    <style>
        body {
            background-color: #0d0c08; 
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: grid;
            /* Creates exactly 5 equal columns and 4 equal rows filling 100% viewport */
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2px;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
        }

        /* Container for the individual compact TV frame effect */
        .game-container {
            position: relative;
            background: #0d0c08;
            padding: 2px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            overflow: hidden; 
            border-radius: 2px;
            transition: opacity 0.1s ease;
            width: 100%;  
            height: 100%; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container.blackout {
            opacity: 0;
        }

        /* The Old TV Filter Overlay per screen */
        .game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: 
                /* Horizontal Scanlines */
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                /* Vignette (darkened corners) */
                radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.85) 100%);
            background-size: 100% 3px, 100% 100%; 
            z-index: 10;
            pointer-events: none; 
            animation: crt-flicker 0.2s infinite;
            opacity: 0.88;
        }

        @keyframes crt-flicker {
            0% { opacity: 0.90; }
            50% { opacity: 0.82; }
            100% { opacity: 0.87; }
        }

        /* Scaled to let the mini-map adjust cleanly to stretched windows */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 8px); 
            grid-template-rows: repeat(29, 8px);
            gap: 1px;
            transform: scale(1.1); /* Slightly enlarged grid to read better in larger containers */
        }

        .cell {
            width: 8px;
            height: 8px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wall {
            background-color: #d1c79d; 
            border: 1px solid #736942;   
            box-shadow: inset 0 0 1px rgba(0,0,0,0.2);
        }

        .path {
            background-color: #0d0d0c;
        }

        .player {
            width: 6px;
            height: 6px;
            background-color: #ff5555;
            border-radius: 50%;
            box-shadow: 0 0 3px #ff3b3b, 0 0 6px #ff3b3b;
        }

        .dot-blue {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <script>
        const MAP_GRID = [
            [1, 1, 1, 1, 1],
            [1, 0, 0, 0, 1],
            [1, 3, 0, 0, 1],
            [1, 4, 4, 4, 1],
            [1, 0, 3, 0, 1],
            [1, 5, 0, 3, 1],
            [1, 3, 3, 1, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 3, 1],
            [1, 0, 3, 0, 1],
            [1, 3, 0, 0, 1],
            [1, 4, 4, 3, 1],
            [1, 0, 3, 0, 1],
            [1, 0, 0, 0, 1],
            [1, 3, 3, 0, 1],
            [1, 1, 0, 4, 1],
            [1, 0, 3, 5, 1],
            [1, 1, 1, 3, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 4, 1],
            [1, 3, 0, 1, 1],
            [1, 4, 4, 4, 1],
            [1, 1, 1, 0, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 1, 1],
            [1, 3, 3, 3, 1],
            [1, 3, 1, 3, 1],
            [1, 0, 0, 0, 1],
            [1, 1, 2, 1, 1]
        ];

        const ROWS = MAP_GRID.length;
        const COLS = MAP_GRID[0].length;

        function getRandomNonRedColor() {
            const hue = Math.floor(Math.random() * (300 - 45 + 1)) + 45;
            const saturation = 90 + Math.floor(Math.random() * 11); 
            const lightness = 50 + Math.floor(Math.random() * 15);  
            return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        function createSimulationInstance() {
            const container = document.createElement('div');
            container.className = 'game-container';
            
            const gridElement = document.createElement('div');
            gridElement.className = 'grid';
            container.appendChild(gridElement);
            document.body.appendChild(container);

            let redDotPos = { r: 1, c: 1 };
            let blueDotPos = { r: 4, c: 1 };
            let isResetting = false;
            let loopIntervalId = null;
            let roundFate = "normal";
            let blueStepCount = 0;
            let bluePathHistory = [];
            
            let currentBlueColor = getRandomNonRedColor();

            function determineRoundFate() {
                const roll = Math.random();
                blueStepCount = 0;
                bluePathHistory = [{ r: 4, c: 1 }];

                if (roll < 0.40) {
                    roundFate = "perfect_escape";
                } else if (roll < 0.55) {
                    roundFate = "freeze";
                } else {
                    roundFate = "normal";
                }
            }

            function renderMap() {
                gridElement.innerHTML = '';
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';

                        if (MAP_GRID[r][c] === 1) {
                            cell.classList.add('wall');
                        } else {
                            cell.classList.add('path');

                            if (r === redDotPos.r && c === redDotPos.c) {
                                const red = document.createElement('div');
                                red.className = 'player';
                                cell.appendChild(red);
                            } else if (blueDotPos && r === blueDotPos.r && c === blueDotPos.c) {
                                const blueDot = document.createElement('div');
                                blueDot.className = 'dot-blue';
                                blueDot.style.backgroundColor = currentBlueColor;
                                blueDot.style.boxShadow = `0 0 3px ${currentBlueColor}, 0 0 6px ${currentBlueColor}`;
                                cell.appendChild(blueDot);
                            }
                        }
                        gridElement.appendChild(cell);
                    }
                }
            }

            function triggerReset() {
                if (isResetting) return;
                isResetting = true;

                clearInterval(loopIntervalId);
                container.classList.add('blackout');

                setTimeout(() => {
                    redDotPos = { r: 1, c: 1 };
                    blueDotPos = { r: 4, c: 1 };
                    currentBlueColor = getRandomNonRedColor();

                    determineRoundFate();
                    container.classList.remove('blackout');
                    renderMap();

                    isResetting = false;
                    startSimulationLoop();
                }, 1000);
            }

            function checkCollision() {
                if (blueDotPos && redDotPos.r === blueDotPos.r && redDotPos.c === blueDotPos.c) {
                    triggerReset();
                    return true;
                }
                return false;
            }

            function getValidMoves(currentPos) {
                const directions = [
                    { dr: 1, dc: 0 }, { dr: -1, dc: 0 },
                    { dr: 0, dc: 1 }, { dr: 0, dc: -1 }
                ];
                let valid = [];
                for (let dir of directions) {
                    const nextR = currentPos.r + dir.dr;
                    const nextC = currentPos.c + dir.dc;
                    if (nextR >= 0 && nextR < ROWS && nextC >= 0 && nextC < COLS && MAP_GRID[nextR][nextC] !== 1) {
                        valid.push({ r: nextR, c: nextC });
                    }
                }
                return valid;
            }

            function findPerfectEscapeMove(startPos) {
                let queue = [ [startPos] ];
                let visited = new Set();
                visited.add(`${startPos.r},${startPos.c}`);

                while (queue.length > 0) {
                    let path = queue.shift();
                    let current = path[path.length - 1];

                    if (current.r === ROWS - 1) {
                        return path[1] || startPos;
                    }

                    let neighbors = getValidMoves(current);
                    for (let neighbor of neighbors) {
                        let key = `${neighbor.r},${neighbor.c}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            queue.push([...path, neighbor]);
                        }
                    }
                }
                return startPos;
            }

            function updateRedDot() {
                if (isResetting || !blueDotPos) return;

                if (roundFate === "perfect_escape") {
                    if (bluePathHistory.length > 2) {
                        redDotPos = bluePathHistory[bluePathHistory.length - 3];
                    } else {
                        const choices = getValidMoves(redDotPos);
                        let bestMove = redDotPos;
                        let minDistance = Infinity;
                        for (let move of choices) {
                            const dist = Math.abs(move.r - blueDotPos.r) + Math.abs(move.c - move.c);
                            if (dist < minDistance) { minDistance = dist; bestMove = move; }
                        }
                        redDotPos = bestMove;
                    }
                    return;
                }

                const choices = getValidMoves(redDotPos);
                let bestMove = redDotPos;
                let minDistance = Infinity;

                for (let move of choices) {
                    const dist = Math.abs(move.r - blueDotPos.r) + Math.abs(move.c - blueDotPos.c);
                    if (dist < minDistance) {
                        minDistance = dist;
                        bestMove = move;
                    }
                }
                redDotPos = bestMove;
            }

            function updateBlueDot() {
                if (!blueDotPos || isResetting) return;

                if (blueDotPos.r === ROWS - 1) {
                    triggerReset();
                    return;
                }

                if (roundFate === "freeze" && blueStepCount >= 6) {
                    return;
                }

                let bestMove = blueDotPos;

                if (roundFate === "perfect_escape") {
                    bestMove = findPerfectEscapeMove(blueDotPos);
                } else {
                    const choices = getValidMoves(blueDotPos);
                    if (Math.random() < 0.25 && choices.length > 0) {
                        bestMove = choices[Math.floor(Math.random() * choices.length)];
                    } else {
                        let maxScore = -Infinity;
                        for (let move of choices) {
                            const distToRed = Math.abs(move.r - redDotPos.r) + Math.abs(move.c - redDotPos.c);
                            const exitWeight = move.r * 0.5;
                            const score = distToRed + exitWeight;

                            if (score > maxScore) {
                                maxScore = score;
                                bestMove = move;
                            }
                        }
                    }
                }

                blueDotPos = bestMove;
                bluePathHistory.push({ ...blueDotPos });
                blueStepCount++;
            }

            function stepSimulation() {
                updateBlueDot();
                if (checkCollision()) return;

                updateRedDot();
                if (checkCollision()) return;

                renderMap();
            }

            function startSimulationLoop() {
                const variableSpeed = 220 + Math.floor(Math.random() * 40);
                loopIntervalId = setInterval(stepSimulation, variableSpeed);
            }

            determineRoundFate();
            renderMap();
            startSimulationLoop();
        }

        function initializeMatrixGrid() {
            document.body.innerHTML = ''; 
            
            // Generates exactly 25 smooth instances configured perfectly into our grid
            const targetCount = 25; 

            for (let i = 0; i < targetCount; i++) {
                createSimulationInstance();
            }
        }

        initializeMatrixGrid();
    </script>
</body>
</html>
