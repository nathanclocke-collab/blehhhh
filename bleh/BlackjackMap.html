<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>:D</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  #introOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 10;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1.5s ease;
  }
  #introOverlay.fade {
    opacity: 0;
  }
  #introOverlay.fadeOut {
    opacity: 1;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="introOverlay"></div>

<script>
(function () {
  "use strict";

  // ---------- MAP IMAGE (embedded, pixel-perfect collision) ----------
  const MAP_DATA_URI = "pixelJazz.png";

  const FLOOR_COLORS = [
    [144, 114, 80],
    [142, 112, 78],
    [124, 95, 58],
    [105, 79, 49]
  ];
  const COLOR_TOLERANCE = 10;

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  const ZOOM = 11;
  const DPR = window.devicePixelRatio || 1;

  function resizeCanvas() {
    const cssW = window.innerWidth;
    const cssH = window.innerHeight;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width = Math.round(cssW * DPR);
    canvas.height = Math.round(cssH * DPR);
    ctx.imageSmoothingEnabled = false;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const mapImage = new Image();
  let mapReady = false;
  let mapW = 0, mapH = 0;
  let mapPixels = null; 

  const sampleCanvas = document.createElement("canvas");
  const sampleCtx = sampleCanvas.getContext("2d");

  mapImage.onload = function () {
    mapW = mapImage.naturalWidth;
    mapH = mapImage.naturalHeight;

    sampleCanvas.width = mapW;
    sampleCanvas.height = mapH;
    sampleCtx.drawImage(mapImage, 0, 0);
    mapPixels = sampleCtx.getImageData(0, 0, mapW, mapH).data;

    logSampleColor("top-left", 2, 2);
    logSampleColor("center", Math.floor(mapW / 2), Math.floor(mapH / 2));
    logSampleColor("bottom-center", Math.floor(mapW / 2), mapH - 3);

    mapReady = true;
    const spawned = placePlayerAtBottomEntrance();
    if (!spawned) {
      player.x = mapW / 2;
      player.y = mapH / 2;
    }
    requestAnimationFrame(loop);

    const overlay = document.getElementById("introOverlay");
    setTimeout(() => {
      overlay.classList.add("fade");
    }, 3000);
  };
  mapImage.src = MAP_DATA_URI;

  // ---------- COLLISION ----------
  function logSampleColor(label, x, y) {
    if (x < 0 || y < 0 || x >= mapW || y >= mapH) return;
    const idx = (y * mapW + x) * 4;
  }

  function isFloorAt(x, y) {
    const ix = Math.floor(x);
    const iy = Math.floor(y);
    if (ix < 0 || iy < 0 || ix >= mapW || iy >= mapH) return false;
    const idx = (iy * mapW + ix) * 4;
    const r = mapPixels[idx], g = mapPixels[idx + 1], b = mapPixels[idx + 2];
    for (let i = 0; i < FLOOR_COLORS.length; i++) {
      const c = FLOOR_COLORS[i];
      if (
        Math.abs(r - c[0]) <= COLOR_TOLERANCE &&
        Math.abs(g - c[1]) <= COLOR_TOLERANCE &&
        Math.abs(b - c[2]) <= COLOR_TOLERANCE
      ) {
        return true;
      }
    }
    return false;
  }

  const PLAYER_HALF = 3; 

  function canStandAt(x, y) {
    const h = PLAYER_HALF - 0.5;
    return (
      isFloorAt(x - h, y - h) &&
      isFloorAt(x + h, y - h) &&
      isFloorAt(x - h, y + h) &&
      isFloorAt(x + h, y + h)
    );
  }

  function placePlayerAtBottomEntrance() {
    for (let y = mapH - PLAYER_HALF - 1; y >= 0; y--) {
      const candidates = [];
      for (let x = PLAYER_HALF; x < mapW - PLAYER_HALF; x++) {
        if (canStandAt(x, y)) candidates.push(x);
      }
      if (candidates.length > 0) {
        const cx = mapW / 2;
        candidates.sort((a, b) => Math.abs(a - cx) - Math.abs(b - cx));
        player.x = candidates[0];
        player.y = y;
        player.facing = "up"; 
        return true;
      }
    }
    return placePlayerOnValidFloor();
  }

  function placePlayerOnValidFloor() {
    const cx = mapW / 2, cy = mapH / 2;
    for (let r = 0; r < Math.max(mapW, mapH); r++) {
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const x = cx + dx, y = cy + dy;
          if (canStandAt(x, y)) {
            player.x = x;
            player.y = y;
            return true;
          }
        }
      }
    }
    return false;
  }

  // ---------- PLAYER ----------
  const player = {
    x: 0, y: 0,
    speed: 42, 
    facing: "down"
  };

  // ---------- STAGE NPCs (jazz quartet) ----------
  let npcs = [
    { x: 271, y: 38, color: "#ffb347" },
    { x: 281, y: 51, color: "#ff6b6b" },
    { x: 298, y: 49, color: "#9d7bff" },
    { x: 290, y: 37, color: "#5fd97a" }
  ];

  // ---------- GIMBLE / BLACKJACK TABLE ----------
  // Use your canvas click-logger to find the exact coordinates for the table!
  const gimble = { x: 54, y: 142, color: "#ffb7b2" }; // Gimble is pink
  const INTERACT_RADIUS = 25; // How close the player needs to be
  let nearGimble = false;

  const keys = Object.create(null);
  window.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
    if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }

    // INTERACTION LOGIC
    if (e.key.toLowerCase() === "e" && nearGimble && !exiting) {
      exiting = true; // Lock player movement
      const overlay = document.getElementById("introOverlay");
      overlay.classList.remove("fade");
      overlay.classList.add("fadeOut");
      
      // Redirect to the blackjack game after fade
      setTimeout(() => {
        window.location.href = "blackjack.html"; // Change this to your actual game filename!
      }, 2000);
    }
  });

  window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
  });

  // ---------- EXITS ----------
  const EXIT_Y_MAX = 6; 
  const EXIT_DESTINATION = "run.html";
  let exiting = false;

  function checkTopExit() {
    if (exiting || !mapReady) return;
    if (player.y <= EXIT_Y_MAX) {
      exiting = true;
      const overlay = document.getElementById("introOverlay");
      overlay.classList.remove("fade");
      overlay.classList.add("fadeOut");
      setTimeout(() => {
        window.location.href = EXIT_DESTINATION;
      }, 2000);
    }
  }

  function isDown(...names) {
    return names.some((n) => keys[n]);
  }

  canvas.addEventListener("click", (e) => {
    if (!mapReady) return;
    const rect = canvas.getBoundingClientRect();
    const cssX = e.clientX - rect.left;
    const cssY = e.clientY - rect.top;
    const scale = getScale();
    const cam = getCamera();
    const worldX = cam.x + (cssX * DPR) / scale;
    const worldY = cam.y + (cssY * DPR) / scale;
    console.log(
      "walk-around: clicked world coords = (" +
      Math.round(worldX) + ", " + Math.round(worldY) + ")"
    );
  });

  function updatePlayer(dt) {
    if (exiting) return;

    let dx = 0, dy = 0;
    if (isDown("w", "arrowup")) dy -= 1;
    if (isDown("s", "arrowdown")) dy += 1;
    if (isDown("a", "arrowleft")) dx -= 1;
    if (isDown("d", "arrowright")) dx += 1;

    if (dx === 0 && dy === 0) return;

    const len = Math.hypot(dx, dy);
    dx /= len;
    dy /= len;

    if (Math.abs(dx) > Math.abs(dy)) player.facing = dx > 0 ? "right" : "left";
    else if (dy !== 0) player.facing = dy > 0 ? "down" : "up";

    const step = player.speed * dt;

    const nx = player.x + dx * step;
    if (canStandAt(nx, player.y)) player.x = nx;

    const ny = player.y + dy * step;
    if (canStandAt(player.x, ny)) player.y = ny;

    checkTopExit();
  }

  // ---------- CAMERA ----------
  function getScale() {
    return ZOOM * DPR;
  }

  function getCamera() {
    const scale = getScale();
    const viewWorldW = canvas.width / scale;
    const viewWorldH = canvas.height / scale;

    let camX = player.x - viewWorldW / 2;
    let camY = player.y - viewWorldH / 2;

    camX = mapW <= viewWorldW
      ? (mapW - viewWorldW) / 2
      : Math.max(0, Math.min(camX, mapW - viewWorldW));
    camY = mapH <= viewWorldH
      ? (mapH - viewWorldH) / 2
      : Math.max(0, Math.min(camY, mapH - viewWorldH));

    return { x: camX, y: camY, w: viewWorldW, h: viewWorldH };
  }

  // ---------- DRAW ----------
  function drawPlayer() {
    const r = PLAYER_HALF;
    ctx.save();
    ctx.translate(player.x, player.y);

    ctx.fillStyle = "rgba(30, 25, 20, 0.28)";
    ctx.beginPath();
    ctx.ellipse(0, r * 0.85, r * 1.05, r * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#34ccff";
    ctx.strokeStyle = "#3a3a50";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    let ex = 0, ey = 0;
    if (player.facing === "left") ex = -1;
    else if (player.facing === "right") ex = 1;
    else if (player.facing === "up") ey = -1;
    else ey = 1;

    ctx.fillStyle = "#241f2e";
    const eyeSpacing = player.facing === "up" || player.facing === "down" ? 1.1 : 0.6;
    const eyeForward = player.facing === "left" || player.facing === "right" ? 0.9 : 0.6;

    ctx.beginPath();
    ctx.arc(-eyeSpacing + ex * eyeForward, -0.3 + ey * eyeForward, 0.55, 0, Math.PI * 2);
    ctx.arc(eyeSpacing + ex * eyeForward, -0.3 + ey * eyeForward, 0.55, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawNPC(npc) {
    const r = PLAYER_HALF;
    ctx.save();
    ctx.translate(npc.x, npc.y);

    ctx.fillStyle = "rgba(30, 25, 20, 0.28)";
    ctx.beginPath();
    ctx.ellipse(0, r * 0.85, r * 1.05, r * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = npc.color;
    ctx.strokeStyle = "#3a3a50";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#241f2e";
    ctx.beginPath();
    ctx.arc(-1.1, 0.3, 0.55, 0, Math.PI * 2);
    ctx.arc(1.1, 0.3, 0.55, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (!mapReady) return;

    const cam = getCamera();
    const scale = getScale();

    ctx.save();
    ctx.scale(scale, scale);
    ctx.translate(-cam.x, -cam.y);

    ctx.drawImage(mapImage, 0, 0);

    for (let i = 0; i < npcs.length; i++) drawNPC(npcs[i]);
    
    // Draw Gimble
    drawNPC(gimble);
    
    drawPlayer();

    ctx.restore();

    // Check interaction distance and draw prompt on the UI layer
    const distToGimble = Math.hypot(player.x - gimble.x, player.y - gimble.y);
    nearGimble = distToGimble <= INTERACT_RADIUS;

    if (nearGimble && !exiting) {
      ctx.save();
      ctx.fillStyle = "white";
      ctx.strokeStyle = "black";
      ctx.lineWidth = 4;
      ctx.font = `bold ${20 * DPR}px 'Courier New', Courier, monospace`;
      ctx.textAlign = "center";
      
      const text = "Press [E] to talk to Gimble";
      const tx = canvas.width / 2;
      const ty = canvas.height - (50 * DPR);
      
      ctx.strokeText(text, tx, ty);
      ctx.fillText(text, tx, ty);
      ctx.restore();
    }
  }

  // ---------- LOOP ----------
  let lastTime = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    updatePlayer(dt);
    draw();

    requestAnimationFrame(loop);
  }
})();
</script>

</body>
</html>
