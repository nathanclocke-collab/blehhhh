<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*-***-*</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background-color: #020202; user-select: none; }
        #canvas-container { width: 100%; height: 100%; }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #battery-hud {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .battery-cell {
            width: 14px;
            height: 28px;
            background-color: #00ff66;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.5);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .battery-cell.low {
            background-color: #ff3333;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }

        .battery-cell.empty {
            background-color: rgba(255, 255, 255, 0.05);
            box-shadow: none;
        }

        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover;
        }

        /* ── Death / Restart Overlay ── */
        #death-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.05s linear;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #death-overlay.fade-in {
            opacity: 1;
            pointer-events: all;
        }

        #death-dialogue {
            color: #cc2222;
            font-family: 'Courier New', monospace;
            font-size: clamp(14px, 2.2vw, 22px);
            text-align: center;
            max-width: 600px;
            padding: 0 2rem;
            opacity: 0;
            letter-spacing: 0.04em;
            line-height: 1.6;
            transition: opacity 0.3s ease;
            min-height: 1.6em;
        }

        #death-dialogue.visible {
            opacity: 1;
        }

        /* Blinking typewriter cursor, shown only while text is being typed */
        #death-dialogue .type-cursor {
            display: inline-block;
            width: 0.5em;
            margin-left: 2px;
            animation: cursor-blink 0.8s steps(1) infinite;
        }

        @keyframes cursor-blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        #death-subtext {
            margin-top: 1.5rem;
            color: rgba(180, 40, 40, 0.5);
            font-family: 'Courier New', monospace;
            font-size: clamp(10px, 1.3vw, 14px);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #death-subtext.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>

    <div id="battery-hud">
        <div id="cell-1" class="battery-cell"></div>
        <div id="cell-2" class="battery-cell"></div>
        <div id="cell-3" class="battery-cell"></div>
    </div>

    <div id="canvas-container"></div>

    <div id="death-overlay">
        <div id="death-dialogue"></div>
        <div id="death-subtext">descending again&hellip;</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ─────────────────────────────────────────────────────────────────────
        // ── DEATH DIALOGUE CHAIN ──
        // This is your ordered chain of entity lines. Line 0 plays on the
        // player's 1st death, line 1 on the 2nd death, line 2 on the 3rd, etc.
        // They are NOT randomized — they always play in this exact order.
        // Add, remove, or reorder strings here to change the chain.
        // When the FINAL line in this list plays, instead of a normal restart,
        // the player is sent to trapped.html — a permanent ending.
        // ─────────────────────────────────────────────────────────────────────
        const DEATH_DIALOGUES = [
            "...",
            "You again... why do you keep coming back down here?",
            "I'm trapped here too, you know.",
            "Look, just alternate from right to left until you get to the end. It's pretty straightforward.",
            "Please don't try to stay...I don't want to kill you anymore.",
            "There is no escape for me, but you have a chance to leave.",
            "Please. You are running out of time. I don't think you understand what will happen to you.",
            "You'll be stuck just like me. You cannot free me, you cannot kill me, I can't leave. There is no 'saving' me.",
            "It's getting darker, trust me i've tried and tried. Nothing will work. LEAVE NOW. YOU WILL BE STUCK HERE FOREVER.",
            "Make the right decision please..",
            "..."
        ];

        function getDeathDialogue(deathIndex) {
            // If we have an entry for this exact death index, return it
            if (deathIndex < DEATH_DIALOGUES.length) {
                return DEATH_DIALOGUES[deathIndex];
            }
            // If they die more times than lines provided, stay on the final message
            return DEATH_DIALOGUES[DEATH_DIALOGUES.length - 1];
        }

        // ── Typewriter effect ──
        // Prints `text` into `el` one character at a time, then calls onDone.
        // Returns a controller object with a `.cancel()` method in case the
        // sequence gets interrupted (e.g. an early restart).
        const TYPEWRITER_CHAR_DELAY_MS = 38; // speed of each letter
        const TYPEWRITER_PUNCT_PAUSE_MS = 220; // extra pause after . , ! ? …

        function typewriterEffect(el, text, onDone) {
            el.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'type-cursor';
            cursor.textContent = '_';

            let i = 0;
            let cancelled = false;
            const textNode = document.createTextNode('');
            el.appendChild(textNode);
            el.appendChild(cursor);

            function step() {
                if (cancelled) return;
                if (i >= text.length) {
                    cursor.remove();
                    if (onDone) onDone();
                    return;
                }
                const ch = text[i];
                textNode.textContent += ch;
                i++;
                const isPunct = /[.,!?…]/.test(ch);
                const delay = isPunct ? TYPEWRITER_PUNCT_PAUSE_MS : TYPEWRITER_CHAR_DELAY_MS;
                setTimeout(step, delay);
            }
            step();

            return {
                cancel() { cancelled = true; }
            };
        }

        // ── Death Count (sessionStorage persisted) ──
        let deathCount = parseInt(sessionStorage.getItem('infiniteDescentDeaths') || '0');

        // Retro Internal Resolution Settings
        const RETRO_WIDTH = 320;

        // Legend: 0=Empty, 1=Wall, 2=Exit Door, 3=Tall Rubble Pile, 4=Jump Hurdle, 5=Stepping Stool
        const MAP_GRID = [
            [1, 1, 1, 1, 1],
            [1, 0, 0, 0, 1],
            [1, 3, 0, 0, 1],
            [1, 4, 4, 4, 1],
            [1, 0, 3, 0, 1],
            [1, 5, 0, 3, 1],
            [1, 3, 3, 1, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 3, 1],
            [1, 0, 3, 0, 1],
            [1, 3, 0, 0, 1],
            [1, 4, 4, 3, 1],
            [1, 0, 3, 0, 1],
            [1, 0, 0, 0, 1],
            [1, 3, 3, 0, 1],
            [1, 1, 0, 4, 1],
            [1, 0, 3, 5, 1],
            [1, 1, 1, 3, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 4, 1],
            [1, 3, 0, 1, 1],
            [1, 4, 4, 4, 1],
            [1, 1, 1, 0, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 1, 1],
            [1, 3, 3, 3, 1],
            [1, 3, 1, 3, 1],
            [1, 0, 0, 0, 1],
            [1, 1, 2, 1, 1]
        ];
        const TILE_SIZE = 8, WALL_HEIGHT = 4.5;
        const GRID_WIDTH = MAP_GRID[0].length, GRID_HEIGHT = MAP_GRID.length;
        const WORLD_WIDTH = GRID_WIDTH * TILE_SIZE, WORLD_DEPTH = GRID_HEIGHT * TILE_SIZE;

        const WALK_SPEED = 6.0;
        const SPRINT_SPEED = 12.0;
        let currentSpeed = WALK_SPEED;
        const MOUSE_SENSITIVITY = 0.0022;

        let scene, camera, renderer, clock;
        let yaw = 0, pitch = 0;
        let flickerLights = [];
        let moveF = false, moveB = false, moveL = false, moveR = false, isSprinting = false;
        let doorsArray = [];
        const TRANSITION_TRIGGER_DISTANCE = 2.5;

        // Flashlight
        let flashlight, flashlightBaseIntensity = 7;
        let batteryLife = 100.0;
        let flashlightModel;
        let targetModelPos = new THREE.Vector3(0.35, -0.3, -0.6);
        let currentModelPos = new THREE.Vector3(0.35, -0.3, -0.6);
        let shakeTime = 0;
        const FLASHLIGHT_START_DELAY = 2.5;
        let hasPlayedInitialClick = false;

        // Chase & Cinematic
        let shadowEntity;
        let entityAuraLight;
        let chaseTriggered = false;
        const CHASE_SPEED = 10.5;

        // Death Sequence
        let isDeathSequence = false;
        let deathSequenceTimer = 0;
        let isRestartingGame = false;
        let activeTypewriter = null;

        // Physics Engine
        let verticalVelocity = 0;
        const GRAVITY = -26.0;
        const JUMP_FORCE = 9.0;
        let isGrounded = true;

        let jumpBufferTimer = 0;
        const JUMP_BUFFER_DURATION = 0.15;

        const PLAYER_RADIUS = 0.4;
        const DEFAULT_EYE_HEIGHT = 1.65;
        let bobTimer = 0;

        let dynamicObstacles = [];

        // Cinematic forced look-back
        let isForcedLooking = false;
        let forcedLookTimer = 0;
        let originalYaw = 0;
        let targetYaw = 0;

        let lastRechargeTime = -999;

        // ─── SOUND CONFIG ─────────────────────────────────────────────────────
        const VOLUME_CONFIG = {
            ambiance: 0.35,
            footsteps: 0.4,
            flashlightClick: 0.35,
            jumpEffect: 2.5,
            entityGroan: 2.2,
            chaseMusic: 0.55
        };

        let audioListener;
        let globalAmbiance, spatialEntityAudio, footstepAudio, chaseMusic, flashlightAudio, jumpAudio;

        function easeInOutQuad(t) {
            return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        // ─── INIT ────────────────────────────────────────────────────────────

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020202, 0.045);

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(75, aspect, 0.1, 1000);
            clock = new THREE.Clock();

            camera.position.set(TILE_SIZE * 2.5, DEFAULT_EYE_HEIGHT, TILE_SIZE * 1.5);

            renderer = new THREE.WebGLRenderer({ antialias: false });

            const retroHeight = Math.floor(RETRO_WIDTH / aspect);
            renderer.setSize(RETRO_WIDTH, retroHeight, false);

            renderer.setClearColor(0x020202);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            buildWorld();
            setupPhysicalFlashlight();
            setupShadowEntity();
            setupControls();
            animate();
        }

        // ─── TEXTURE ────────────────────────────────────────────────────────

        function createGrimyTexture(base, grime) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = base;
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 15000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? grime : '#000000';
                ctx.globalAlpha = Math.random() * 0.3;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, Math.random() * 5, Math.random() * 5);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        // ─── BUILD WORLD ────────────────────────────────────────────────────

        function buildWorld() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.08);
            scene.add(ambientLight);

            const wallTexture = createGrimyTexture('#2a2a2a', '#111');
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.95 });
            const floorMat = new THREE.MeshStandardMaterial({ map: createGrimyTexture('#1a1a1a', '#050505'), roughness: 0.85 });
            const rubbleMat = new THREE.MeshStandardMaterial({ color: 0x1d1d1d, roughness: 0.95 });
            const stoolMat = new THREE.MeshStandardMaterial({ color: 0x3e3528, roughness: 0.8, metalness: 0.3 });
            const pipeMat = new THREE.MeshStandardMaterial({ color: 0x3a3010, roughness: 0.6, metalness: 0.5 });
            const obsMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_WIDTH, WORLD_DEPTH), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(WORLD_WIDTH / 2, 0, WORLD_DEPTH / 2);
            scene.add(floor);

            const ceil = floor.clone();
            ceil.rotation.x = Math.PI / 2;
            ceil.position.y = WALL_HEIGHT;
            scene.add(ceil);

            const boxGeo = new THREE.BoxGeometry(TILE_SIZE, WALL_HEIGHT, TILE_SIZE);

            const rubbleWidth = TILE_SIZE * 0.7;
            const rubbleDepth = TILE_SIZE * 0.7;
            const rubbleHeight = WALL_HEIGHT * 0.4;
            const debrisGeo = new THREE.BoxGeometry(rubbleWidth, rubbleHeight, rubbleDepth);

            const stoolWidth = TILE_SIZE * 0.5;
            const stoolDepth = TILE_SIZE * 0.5;
            const stoolHeight = WALL_HEIGHT * 0.22;
            const stoolGeo = new THREE.BoxGeometry(stoolWidth, stoolHeight, stoolDepth);

            const hurdleHeight = WALL_HEIGHT * 0.16;
            const hurdleGeo = new THREE.BoxGeometry(TILE_SIZE, hurdleHeight, 0.8);

            for (let z = 0; z < GRID_HEIGHT; z++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const type = MAP_GRID[z][x];
                    const worldX = x * TILE_SIZE + TILE_SIZE / 2;
                    const worldZ = z * TILE_SIZE + TILE_SIZE / 2;

                    if (type === 1) {
                        const b = new THREE.Mesh(boxGeo, wallMat);
                        b.position.set(worldX, WALL_HEIGHT / 2, worldZ);
                        scene.add(b);
                    } else if (type === 3) {
                        const obs = new THREE.Mesh(debrisGeo, rubbleMat);
                        obs.position.set(worldX, rubbleHeight / 2, worldZ);
                        obs.rotation.y = Math.random() * Math.PI;
                        scene.add(obs);
                        dynamicObstacles.push({
                            minX: worldX - rubbleWidth / 2, maxX: worldX + rubbleWidth / 2,
                            minZ: worldZ - rubbleDepth / 2, maxZ: worldZ + rubbleDepth / 2,
                            topY: rubbleHeight
                        });
                    } else if (type === 4) {
                        const hurdle = new THREE.Mesh(hurdleGeo, pipeMat);
                        hurdle.position.set(worldX, hurdleHeight / 2, worldZ);
                        scene.add(hurdle);
                        const boltGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.4, 6);
                        const bolt1 = new THREE.Mesh(boltGeo, obsMat);
                        bolt1.position.set(worldX - 3.8, hurdleHeight / 2, worldZ);
                        scene.add(bolt1);
                        const bolt2 = bolt1.clone();
                        bolt2.position.x = worldX + 3.8;
                        scene.add(bolt2);
                        dynamicObstacles.push({
                            minX: worldX - TILE_SIZE / 2, maxX: worldX + TILE_SIZE / 2,
                            minZ: worldZ - 0.4, maxZ: worldZ + 0.4,
                            topY: hurdleHeight
                        });
                    } else if (type === 5) {
                        const stool = new THREE.Mesh(stoolGeo, stoolMat);
                        stool.position.set(worldX, stoolHeight / 2, worldZ);
                        scene.add(stool);
                        dynamicObstacles.push({
                            minX: worldX - stoolWidth / 2, maxX: worldX + stoolWidth / 2,
                            minZ: worldZ - stoolDepth / 2, maxZ: worldZ + stoolDepth / 2,
                            topY: stoolHeight
                        });
                    } else if (type === 2) {
                        const doorGroup = new THREE.Group();
                        doorGroup.position.set(worldX, 0, worldZ);

                        const doorPanelMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.4, metalness: 0.2 });
                        const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 });
                        const barMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.3 });

                        const frameOuter = new THREE.Mesh(new THREE.BoxGeometry(TILE_SIZE, WALL_HEIGHT, TILE_SIZE * 0.1), frameMat);
                        frameOuter.position.set(0, WALL_HEIGHT / 2, 0);
                        doorGroup.add(frameOuter);

                        const panelMesh = new THREE.Mesh(new THREE.BoxGeometry(TILE_SIZE * 0.85, WALL_HEIGHT * 0.9, TILE_SIZE * 0.12), doorPanelMat);
                        panelMesh.position.set(0, (WALL_HEIGHT * 0.9) / 2, 0.02);
                        doorGroup.add(panelMesh);

                        const pushBar = new THREE.Mesh(new THREE.BoxGeometry(TILE_SIZE * 0.7, 0.15, 0.08), barMat);
                        pushBar.position.set(0, WALL_HEIGHT * 0.4, 0.09);
                        doorGroup.add(pushBar);

                        const ledMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                        const ledMesh = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), ledMat);
                        ledMesh.position.set(0, WALL_HEIGHT * 0.85, 0.1);
                        doorGroup.add(ledMesh);

                        const doorLight = new THREE.PointLight(0x00ff00, 1.5, 6);
                        doorLight.position.set(0, WALL_HEIGHT * 0.85, 0.5);
                        doorGroup.add(doorLight);

                        doorGroup.rotation.y = Math.PI;
                        scene.add(doorGroup);
                        doorsArray.push(doorGroup);
                    }

                    if (type === 0 && z % 3 === 0 && x === 2) {
                        const pLight = new THREE.PointLight(0xffe0b0, 0.8, TILE_SIZE * 2.5);
                        pLight.position.set(worldX, WALL_HEIGHT - 0.5, worldZ);
                        scene.add(pLight);
                        flickerLights.push(pLight);
                    }
                }
            }
        }

        // ─── FLASHLIGHT ─────────────────────────────────────────────────────

        function setupPhysicalFlashlight() {
            flashlightModel = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.8 });

            const bodyMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.25, 12), bodyMat);
            bodyMesh.rotation.x = Math.PI / 2;
            flashlightModel.add(bodyMesh);

            const rimMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.02, 0.05, 12), bodyMat);
            rimMesh.rotation.x = Math.PI / 2;
            rimMesh.position.z = -0.13;
            flashlightModel.add(rimMesh);

            const lensMesh = new THREE.Mesh(new THREE.CircleGeometry(0.03, 12), new THREE.MeshBasicMaterial({ color: 0xfffdf2 }));
            lensMesh.position.z = -0.156;
            lensMesh.rotation.y = Math.PI;
            flashlightModel.add(lensMesh);

            flashlight = new THREE.SpotLight(0xffffff, 0, 35, 0.45, 0.5, 1.2);
            flashlight.position.set(0, 0, -0.16);

            const target = new THREE.Object3D();
            target.position.set(0, 0, -5);
            flashlightModel.add(target);
            flashlight.target = target;
            flashlightModel.add(flashlight);

            flashlightModel.position.copy(targetModelPos);
            camera.add(flashlightModel);
            scene.add(camera);
        }

        // ─── SHADOW ENTITY ──────────────────────────────────────────────────

        function setupShadowEntity() {
            shadowEntity = new THREE.Group();
            const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.12, 1.5, 6), shadowMat);
            torso.position.set(0, 0.6, -0.2);
            torso.rotation.x = 0.4;
            shadowEntity.add(torso);

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 6, 6), shadowMat);
            head.scale.set(0.8, 1.5, 0.8);
            head.position.set(0, 1.1, -0.4);
            shadowEntity.add(head);

            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.015, 4, 4), eyeMat);
            leftEye.position.set(-0.06, 1.15, -0.55);
            shadowEntity.add(leftEye);

            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.008, 4, 4), eyeMat);
            rightEye.position.set(0.05, 1.12, -0.55);
            shadowEntity.add(rightEye);

            shadowEntity.limbs = [];
            const legCount = 6;
            for (let i = 0; i < legCount; i++) {
                const legGroup = new THREE.Group();
                legGroup.position.set(i % 2 === 0 ? -0.12 : 0.12, 0.4 + (i * 0.18), -0.2);
                const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.012, 1.1, 4), shadowMat);
                upper.position.y = 0.5;
                upper.rotation.z = i % 2 === 0 ? 0.7 : -0.7;
                upper.rotation.x = -0.5 + (i * 0.2);
                legGroup.add(upper);
                const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.002, 1.2, 4), shadowMat);
                lower.position.set(i % 2 === 0 ? -0.4 : 0.4, 0.9, -0.2);
                lower.rotation.z = i % 2 === 0 ? -1.4 : 1.4;
                legGroup.add(lower);
                shadowEntity.add(legGroup);
                shadowEntity.limbs.push(legGroup);
            }

            entityAuraLight = new THREE.PointLight(0xff0000, 2.5, 8);
            entityAuraLight.position.set(0, 1, 0);
            shadowEntity.add(entityAuraLight);

            shadowEntity.scale.set(1.4, 2.3, 1.4);
            shadowEntity.position.set(0, -50, 0);
            scene.add(shadowEntity);
        }

        // ─── AUDIO SYSTEM ───────────────────────────────────────────────────

        function initAudio() {
            if (audioListener) {
                if (audioListener.context && audioListener.context.state === 'suspended') {
                    audioListener.context.resume();
                }
                return;
            }

            audioListener = new THREE.AudioListener();
            camera.add(audioListener);

            if (audioListener.context && audioListener.context.state === 'suspended') {
                audioListener.context.resume();
            }

            const audioLoader = new THREE.AudioLoader();

            globalAmbiance = new THREE.Audio(audioListener);
            audioLoader.load('horror/ambiance.mp3', (buffer) => {
                globalAmbiance.setBuffer(buffer);
                globalAmbiance.setLoop(true);
                globalAmbiance.setVolume(VOLUME_CONFIG.ambiance);
                globalAmbiance.play();
            }, undefined, (err) => console.error("Error loading horror/ambiance.mp3:", err));

            spatialEntityAudio = new THREE.PositionalAudio(audioListener);
            audioLoader.load('horror/entity.mp3', (buffer) => {
                spatialEntityAudio.setBuffer(buffer);
                spatialEntityAudio.setRefDistance(3);
                spatialEntityAudio.setMaxDistance(20);
                spatialEntityAudio.setLoop(true);
                spatialEntityAudio.setVolume(VOLUME_CONFIG.entityGroan);
            }, undefined, (err) => console.error("Error loading horror/entity.mp3:", err));
            shadowEntity.add(spatialEntityAudio);

            footstepAudio = new THREE.Audio(audioListener);
            audioLoader.load('horror/walkingp.mp3', (buffer) => {
                footstepAudio.setBuffer(buffer);
                footstepAudio.setVolume(VOLUME_CONFIG.footsteps);
            }, undefined, (err) => console.error("Error loading horror/walkingp.mp3:", err));

            flashlightAudio = new THREE.Audio(audioListener);
            audioLoader.load('horror/flashlightclick.mp3', (buffer) => {
                flashlightAudio.setBuffer(buffer);
                flashlightAudio.setVolume(VOLUME_CONFIG.flashlightClick);
            }, undefined, (err) => console.error("Error loading horror/flashlightclick.mp3:", err));

            jumpAudio = new THREE.Audio(audioListener);
            audioLoader.load('horror/jump.mp3', (buffer) => {
                jumpAudio.setBuffer(buffer);
                jumpAudio.setVolume(VOLUME_CONFIG.jumpEffect);
            }, undefined, (err) => console.error("Error loading horror/jump.mp3:", err));

            chaseMusic = new THREE.Audio(audioListener);
            audioLoader.load('horror/ambiance.mp3', (buffer) => {
                chaseMusic.setBuffer(buffer);
                chaseMusic.setLoop(true);
                chaseMusic.setVolume(VOLUME_CONFIG.chaseMusic);
            }, undefined, (err) => console.error("Error loading chase background asset:", err));
        }

        // ─── CONTROLS ────────────────────────────────────────────────────────

        function setupControls() {
            window.addEventListener('click', () => {
                document.body.requestPointerLock();
                initAudio();
                if (audioListener && audioListener.context && audioListener.context.state === 'suspended') {
                    audioListener.context.resume();
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement !== document.body || isForcedLooking || isDeathSequence) return;
                yaw -= e.movementX * MOUSE_SENSITIVITY;
                pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * MOUSE_SENSITIVITY));
                camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
                if (flashlightModel) {
                    targetModelPos.x -= e.movementX * 0.00015;
                    targetModelPos.y += e.movementY * 0.00015;
                }
            });

            document.addEventListener('keydown', (e) => {
                if (isDeathSequence) return;
                if (e.code === 'KeyW') moveF = true;
                if (e.code === 'KeyS') moveB = true;
                if (e.code === 'KeyA') moveL = true;
                if (e.code === 'KeyD') moveR = true;
                if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') isSprinting = true;
                if (e.code === 'Space') { jumpBufferTimer = JUMP_BUFFER_DURATION; }
                if (e.code === 'KeyR') {
                    const elapsed = clock.getElapsedTime();
                    if (elapsed >= FLASHLIGHT_START_DELAY && batteryLife > 0 && (elapsed - lastRechargeTime) >= 7.5) {
                        batteryLife = Math.min(100, batteryLife + 35);
                        shakeTime = 0.5;
                        lastRechargeTime = elapsed;
                        if (flashlightAudio && flashlightAudio.buffer) {
                            if (flashlightAudio.isPlaying) flashlightAudio.stop();
                            flashlightAudio.play();
                        }
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') moveF = false;
                if (e.code === 'KeyS') moveB = false;
                if (e.code === 'KeyA') moveL = false;
                if (e.code === 'KeyD') moveR = false;
                if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') isSprinting = false;
            });

            window.addEventListener('resize', () => {
                const aspect = window.innerWidth / window.innerHeight;
                camera.aspect = aspect;
                camera.updateProjectionMatrix();
                const retroHeight = Math.floor(RETRO_WIDTH / aspect);
                renderer.setSize(RETRO_WIDTH, retroHeight, false);
            });
        }

        // ─── BATTERY UI ──────────────────────────────────────────────────────

        function updateBatteryUI() {
            const c1 = document.getElementById('cell-1');
            const c2 = document.getElementById('cell-2');
            const c3 = document.getElementById('cell-3');
            [c1, c2, c3].forEach(c => { c.className = 'battery-cell'; });
            if (batteryLife <= 0) {
                c1.classList.add('empty'); c2.classList.add('empty'); c3.classList.add('empty');
            } else if (batteryLife <= 33.3) {
                c1.classList.add('low'); c2.classList.add('empty'); c3.classList.add('empty');
            } else if (batteryLife <= 66.6) {
                c3.classList.add('empty');
            }
        }

        // ─── PHYSICS & COLLISIONS ─────────────────────────────────────────────

        function checkCollision(pos) {
            if (pos.x < 0 || pos.x >= WORLD_WIDTH || pos.z < 0 || pos.z >= WORLD_DEPTH) return false;
            const checkPoints = [
                { x: pos.x - PLAYER_RADIUS, z: pos.z - PLAYER_RADIUS },
                { x: pos.x + PLAYER_RADIUS, z: pos.z - PLAYER_RADIUS },
                { x: pos.x - PLAYER_RADIUS, z: pos.z + PLAYER_RADIUS },
                { x: pos.x + PLAYER_RADIUS, z: pos.z + PLAYER_RADIUS }
            ];
            for (let p of checkPoints) {
                const gx = Math.floor(p.x / TILE_SIZE);
                const gz = Math.floor(p.z / TILE_SIZE);
                if (gx >= 0 && gx < GRID_WIDTH && gz >= 0 && gz < GRID_HEIGHT) {
                    if (MAP_GRID[gz][gx] === 1) return false;
                }
            }
            const playerFeetY = pos.y - DEFAULT_EYE_HEIGHT;
            for (let obs of dynamicObstacles) {
                if (pos.x + PLAYER_RADIUS > obs.minX && pos.x - PLAYER_RADIUS < obs.maxX &&
                    pos.z + PLAYER_RADIUS > obs.minZ && pos.z - PLAYER_RADIUS < obs.maxZ) {
                    if (playerFeetY < (obs.topY - 0.22)) { return false; }
                }
            }
            return true;
        }

        function getFloorHeightAtPosition(posX, posZ) {
            let maxFloorHeight = 0;
            for (let obs of dynamicObstacles) {
                if (posX > obs.minX && posX < obs.maxX && posZ > obs.minZ && posZ < obs.maxZ) {
                    if (obs.topY > maxFloorHeight) { maxFloorHeight = obs.topY; }
                }
            }
            return maxFloorHeight;
        }

        // ─── DEATH & RESTART ─────────────────────────────────────────────────

        function triggerDeath() {
            isDeathSequence = true;
            deathSequenceTimer = 0;
            document.exitPointerLock();
            if (footstepAudio && footstepAudio.isPlaying) footstepAudio.stop();
        }

        function beginRestartSequence() {
            if (isRestartingGame) return;
            isRestartingGame = true;

            const overlay = document.getElementById('death-overlay');
            const dialogue = document.getElementById('death-dialogue');
            const subtext = document.getElementById('death-subtext');

            // Pull the next line out of the ordered dialogue chain
            const line = getDeathDialogue(deathCount);
            // Is this the FINAL line in the chain? If so, this is a permanent ending.
            const isFinalLine = deathCount >= DEATH_DIALOGUES.length - 1;

            // Increment and save death count AFTER displaying message so indexing is zero-based
            deathCount++;
            sessionStorage.setItem('infiniteDescentDeaths', deathCount.toString());

            // Fade overlay to black
            overlay.classList.add('fade-in');

            // Start typing the line out after 0.8s, letter by letter
            setTimeout(() => {
                dialogue.classList.add('visible');
                if (activeTypewriter) activeTypewriter.cancel();
                activeTypewriter = typewriterEffect(dialogue, line, () => {
                    subtext.textContent = isFinalLine ? 'you are the descent now…' : 'descending again…';
                    subtext.classList.add('visible');
                });
            }, 800);

            // After reading time, either reset the game normally, or —
            // on the final line — send the player to the permanent ending page.
            setTimeout(() => {
                if (isFinalLine) {
                    document.exitPointerLock();
                    window.location.href = "trapped.html";
                    return;
                }

                resetGame();

                // Fade overlay back out
                overlay.style.transition = 'opacity 1.5s ease';
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.remove('fade-in');
                    overlay.style.transition = '';
                    overlay.style.opacity = '';
                    dialogue.classList.remove('visible');
                    subtext.classList.remove('visible');
                    if (activeTypewriter) { activeTypewriter.cancel(); activeTypewriter = null; }
                    dialogue.innerHTML = '';
                    isRestartingGame = false;
                }, 1600);
            }, 4200);
        }

        function resetGame() {
            // Reset player position & physics
            camera.position.set(TILE_SIZE * 2.5, DEFAULT_EYE_HEIGHT, TILE_SIZE * 1.5);
            yaw = 0;
            pitch = 0;
            camera.quaternion.setFromEuler(new THREE.Euler(0, 0, 0, 'YXZ'));
            verticalVelocity = 0;
            isGrounded = true;
            bobTimer = 0;

            // Reset movement flags
            moveF = false; moveB = false; moveL = false; moveR = false;
            isSprinting = false;
            jumpBufferTimer = 0;

            // Reset flashlight
            batteryLife = 100.0;
            flashlight.intensity = 0;
            targetModelPos.set(0.35, -0.3, -0.6);
            currentModelPos.set(0.35, -0.3, -0.6);
            shakeTime = 0;
            hasPlayedInitialClick = false;
            lastRechargeTime = -999;

            // Hide battery HUD until flashlight turns on again
            document.getElementById('battery-hud').style.opacity = '0';
            updateBatteryUI();

            // Reset entity
            shadowEntity.position.set(0, -50, 0);
            chaseTriggered = false;
            isForcedLooking = false;
            forcedLookTimer = 0;

            // Reset death/sequence flags
            isDeathSequence = false;
            deathSequenceTimer = 0;

            // Stop entity audio
            if (spatialEntityAudio && spatialEntityAudio.isPlaying) spatialEntityAudio.stop();
            if (chaseMusic && chaseMusic.isPlaying) chaseMusic.stop();

            // Reset clock so flashlight delay re-applies
            clock.start();
        }

        // ─── MAIN ANIMATION LOOP ─────────────────────────────────────────────

        function animate() {
            requestAnimationFrame(animate);
            const d = clock.getDelta();
            const time = clock.getElapsedTime();

            if (jumpBufferTimer > 0) { jumpBufferTimer -= d; }

            if (isForcedLooking && !isDeathSequence) {
                forcedLookTimer += d;
                if (forcedLookTimer < 0.35) {
                    const t = forcedLookTimer / 0.35;
                    yaw = originalYaw + ((targetYaw - originalYaw) * easeInOutQuad(t));
                } else if (forcedLookTimer < 1.1) {
                    yaw = targetYaw;
                    shakeTime = 0.5;
                } else if (forcedLookTimer < 1.45) {
                    const t = (forcedLookTimer - 1.1) / 0.35;
                    yaw = targetYaw - ((targetYaw - originalYaw) * easeInOutQuad(t));
                } else {
                    yaw = originalYaw;
                    isForcedLooking = false;
                }
                camera.quaternion.setFromEuler(new THREE.Euler(pitch * (1 - Math.min(forcedLookTimer/0.35, 1)), yaw, 0, 'YXZ'));
            }

            if (!isForcedLooking && !isDeathSequence) {
                verticalVelocity += GRAVITY * d;
                camera.position.y += verticalVelocity * d;

                const currentFloorY = getFloorHeightAtPosition(camera.position.x, camera.position.z);
                const absoluteGroundY = DEFAULT_EYE_HEIGHT + currentFloorY;

                if (camera.position.y < absoluteGroundY) {
                    camera.position.y = absoluteGroundY;
                    verticalVelocity = 0;
                    isGrounded = true;
                }

                if (jumpBufferTimer > 0 && isGrounded) {
                    verticalVelocity = JUMP_FORCE;
                    isGrounded = false;
                    jumpBufferTimer = 0;
                    if (jumpAudio && jumpAudio.buffer) {
                        if (jumpAudio.isPlaying) jumpAudio.stop();
                        jumpAudio.play();
                    }
                }

                const fv = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                const sv = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                const isMoving = moveF || moveB || moveL || moveR;
                currentSpeed = (isSprinting && isMoving) ? SPRINT_SPEED : WALK_SPEED;

                let np = camera.position.clone();
                if (moveF) np.addScaledVector(fv, currentSpeed * d);
                if (moveB) np.addScaledVector(fv, -currentSpeed * d);
                if (moveR) np.addScaledVector(sv, currentSpeed * d);
                if (moveL) np.addScaledVector(sv, -currentSpeed * d);

                if (np.x < 0) np.x += WORLD_WIDTH;
                if (np.x >= WORLD_WIDTH) np.x -= WORLD_WIDTH;
                if (np.z < 0) np.z += WORLD_DEPTH;
                if (np.z >= WORLD_DEPTH) np.z -= WORLD_DEPTH;

                if (checkCollision(np)) {
                    camera.position.x = np.x;
                    camera.position.z = np.z;
                } else {
                    let slideX = camera.position.clone();
                    slideX.x = np.x;
                    if (checkCollision(slideX)) {
                        camera.position.x = np.x;
                    } else {
                        let slideZ = camera.position.clone();
                        slideZ.z = np.z;
                        if (checkCollision(slideZ)) {
                            camera.position.z = np.z;
                        }
                    }
                }

                const finalFloorY = getFloorHeightAtPosition(camera.position.x, camera.position.z);
                const finalGroundY = DEFAULT_EYE_HEIGHT + finalFloorY;
                if (camera.position.y > finalGroundY + 0.05) { isGrounded = false; }

                if (isGrounded && isMoving) {
                    const playerIsRunning = (currentSpeed === SPRINT_SPEED);
                    if (footstepAudio && footstepAudio.buffer) {
                        const targetSpeed = playerIsRunning ? 2.0 : 1.0;
                        if (footstepAudio.playbackRate !== targetSpeed) { footstepAudio.setPlaybackRate(targetSpeed); }
                        if (!footstepAudio.isPlaying) { footstepAudio.setLoop(true); footstepAudio.play(); }
                    }
                } else {
                    if (footstepAudio && footstepAudio.isPlaying) { footstepAudio.stop(); }
                }

                if (isGrounded) {
                    if (isMoving) {
                        const bobMod = (currentSpeed === SPRINT_SPEED) ? 1.7 : 1.0;
                        bobTimer += d * currentSpeed * 2.2;
                        camera.position.y = finalGroundY + Math.sin(bobTimer) * (0.04 * bobMod);
                        camera.position.x += Math.cos(bobTimer * 0.5) * (0.015 * bobMod);
                    } else {
                        camera.position.y = finalGroundY + Math.sin(time * 1.8) * 0.012;
                    }
                }
            }

            if (!isDeathSequence) {
                doorsArray.forEach(door => {
                    const flatPos = new THREE.Vector3(camera.position.x, door.position.y, camera.position.z);
                    if (flatPos.distanceTo(door.position) < TRANSITION_TRIGGER_DISTANCE) {
                        document.exitPointerLock();
                        window.location.href = "level2.html";
                    }
                });
            }

            {
                let restX = 0.35, restY = -0.3, restZ = -0.6;

                if (time >= (FLASHLIGHT_START_DELAY - 0.2) && !hasPlayedInitialClick) {
                    if (flashlightAudio && flashlightAudio.buffer) { flashlightAudio.play(); }
                    hasPlayedInitialClick = true;
                }

                if (time < FLASHLIGHT_START_DELAY) {
                    restY = -1.2;
                    flashlight.intensity = 0;
                } else {
                    document.getElementById('battery-hud').style.opacity = '1';

                    if (batteryLife > 0 && !isDeathSequence) {
                        batteryLife -= d * 1.0;
                        if (batteryLife < 0) batteryLife = 0;
                        updateBatteryUI();
                    }

                    const isMoving = moveF || moveB || moveL || moveR;
                    if (isMoving && !isDeathSequence) {
                        const swayScale = (currentSpeed === SPRINT_SPEED) ? 2.5 : 1.0;
                        const swaySpeed = (currentSpeed === SPRINT_SPEED) ? 14 : 10;
                        restX += Math.sin(time * swaySpeed) * (0.02 * swayScale);
                        restY += Math.abs(Math.sin(time * swaySpeed)) * (0.02 * swayScale);
                    } else if (!isDeathSequence) {
                        restY += Math.sin(time * 1.5) * 0.005;
                    }

                    if (batteryLife <= 0) {
                        flashlight.intensity = Math.random() > 0.35 ? (Math.random() > 0.5 ? 0.1 : 4.5) : 0.0;
                    } else if (batteryLife < 33.3) {
                        if (Math.random() > 0.85) {
                            flashlight.intensity = Math.random() > 0.5 ? 0.05 : flashlightBaseIntensity * (batteryLife / 50);
                        }
                    } else {
                        flashlight.intensity = flashlightBaseIntensity * (batteryLife / 100);
                    }
                }

                if (!isDeathSequence) {
                    targetModelPos.x += (restX - targetModelPos.x) * 0.1;
                    targetModelPos.y += (restY - targetModelPos.y) * 0.1;
                    targetModelPos.z += (restZ - targetModelPos.z) * 0.1;
                    currentModelPos.lerp(targetModelPos, d * 12);
                    flashlightModel.position.copy(currentModelPos);
                    if (shakeTime > 0 && batteryLife > 0) {
                        shakeTime -= d;
                        flashlightModel.position.x += (Math.random() - 0.5) * 0.08;
                        flashlightModel.position.y += (Math.random() - 0.5) * 0.08;
                        flashlight.intensity = flashlightBaseIntensity;
                    }
                }
            }

            {
                if (!chaseTriggered && camera.position.z > TILE_SIZE * 4) {
                    chaseTriggered = true;
                    isForcedLooking = true;
                    forcedLookTimer = 0;
                    shadowEntity.position.set(camera.position.x, 0.05, camera.position.z - (TILE_SIZE * 2));
                    originalYaw = yaw;
                    const diffX = shadowEntity.position.x - camera.position.x;
                    const diffZ = shadowEntity.position.z - camera.position.z;
                    targetYaw = Math.atan2(-diffX, -diffZ);
                    while (targetYaw - originalYaw < -Math.PI) targetYaw += Math.PI * 2;
                    while (targetYaw - originalYaw > Math.PI) targetYaw -= Math.PI * 2;
                    if (chaseMusic && chaseMusic.buffer && !chaseMusic.isPlaying) { chaseMusic.play(); }
                    if (spatialEntityAudio && spatialEntityAudio.buffer && !spatialEntityAudio.isPlaying) { spatialEntityAudio.play(); }
                }

                if (chaseTriggered) {
                    const dx = camera.position.x - shadowEntity.position.x;
                    const dz = camera.position.z - shadowEntity.position.z;
                    const planarDistance = Math.sqrt(dx * dx + dz * dz);

                    if (!isDeathSequence) {
                        shadowEntity.lookAt(camera.position.x, shadowEntity.position.y, camera.position.z);
                        shadowEntity.rotation.y += Math.PI;
                    }

                    entityAuraLight.intensity = 2.5 + Math.sin(time * 10) * 1.5;

                    if (isForcedLooking && !isDeathSequence) {
                        shadowEntity.limbs.forEach((limb, idx) => {
                            limb.rotation.x = Math.sin(time * 5 + idx) * 0.15;
                        });
                    } else if (!isDeathSequence) {
                        const dir = new THREE.Vector3().subVectors(camera.position, shadowEntity.position).setY(0).normalize();
                        shadowEntity.position.addScaledVector(dir, CHASE_SPEED * d);
                        shadowEntity.limbs.forEach((limb, idx) => {
                            limb.rotation.x = Math.sin(time * 30 + idx) * 0.6;
                        });
                    }

                    // ── Collision Capture → start jumpscare timer ──
                    if (planarDistance <= 1.8 && !isDeathSequence) {
                        triggerDeath();
                    }

                    // ── 0.5s Close-up Camera Sequence → then trigger restart ──
                    if (isDeathSequence) {
                        deathSequenceTimer += d;

                        const monsterFaceY = shadowEntity.position.y + 2.5;
                        const lookTarget = new THREE.Vector3(shadowEntity.position.x, monsterFaceY, shadowEntity.position.z);
                        camera.lookAt(lookTarget);

                        flashlight.intensity = Math.random() > 0.2 ? 10 : 0;

                        if (deathSequenceTimer >= 0.5 && !isRestartingGame) {
                            beginRestartSequence();
                        }
                    }
                }
            }

            if (!isDeathSequence) {
                flickerLights.forEach(l => {
                    if (time < 3.0) {
                        l.intensity = 1.2;
                    } else if (time < 5.5) {
                        if (Math.random() > 0.75) {
                            l.intensity = Math.random() > 0.4 ? 0.02 : 1.5;
                        }
                    } else {
                        l.intensity = 0;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
