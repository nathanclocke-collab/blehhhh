<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms Cinematic CRT Simulation</title>
    <style>
        body {
            background-color: #1a1913; 
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; 
            transition: background-color 0.1s ease;
        }

        body.blackout #game-container {
            display: none;
        }
        body.blackout {
            background-color: #000000 !important;
        }

        /* Container for the TV frame effect */
        #game-container {
            position: relative;
            background: #0d0c08;
            padding: 2px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            overflow: hidden; /* Keeps the vignette inside */
        }

        /* The Old TV Filter Overlay */
        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: 
                /* Horizontal Scanlines */
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                /* Vignette (darkened corners) */
                radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.7) 100%);
            background-size: 100% 4px, 100% 100%; /* Rows are 4px high */
            z-index: 10;
            pointer-events: none; /* Allows clicks to pass through */
            animation: crt-flicker 0.15s infinite;
            opacity: 0.85;
        }

        /* Static tube-screen curvature color warp */
        #game-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.05);
            opacity: 0;
            z-index: 11;
            pointer-events: none;
        }

        /* Subtle CRT phosphor screen flicker */
        @keyframes crt-flicker {
            0% { opacity: 0.88; }
            50% { opacity: 0.83; }
            100% { opacity: 0.86; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 14px); 
            grid-template-rows: repeat(29, 14px);
            gap: 1px;
        }

        .cell {
            width: 14px;
            height: 14px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wall {
            background-color: #d1c79d; 
            border: 1px solid #736942;   
            box-shadow: inset 0 0 3px rgba(0,0,0,0.2);
        }

        .path {
            background-color: #0d0d0c;
        }

        .player {
            width: 10px;
            height: 10px;
            background-color: #ff5555;
            border-radius: 50%;
            /* Layered drop shadows emulate phosphor glow */
            box-shadow: 0 0 4px #ff3b3b, 0 0 10px #ff3b3b, 0 0 18px rgba(255, 59, 59, 0.4);
        }

        .dot-blue {
            width: 7px;
            height: 7px;
            background-color: #33ccff;
            border-radius: 50%;
            box-shadow: 0 0 4px #00bfff, 0 0 10px #00bfff, 0 0 18px rgba(0, 191, 255, 0.4);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="grid" class="grid"></div>
    </div>

    <script>
        const MAP_GRID = [
            [1, 1, 1, 1, 1],
            [1, 0, 0, 0, 1],
            [1, 3, 0, 0, 1],
            [1, 4, 4, 4, 1],
            [1, 0, 3, 0, 1],
            [1, 5, 0, 3, 1],
            [1, 3, 3, 1, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 3, 1],
            [1, 0, 3, 0, 1],
            [1, 3, 0, 0, 1],
            [1, 4, 4, 3, 1],
            [1, 0, 3, 0, 1],
            [1, 0, 0, 0, 1],
            [1, 3, 3, 0, 1],
            [1, 1, 0, 4, 1],
            [1, 0, 3, 5, 1],
            [1, 1, 1, 3, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 4, 1],
            [1, 3, 0, 1, 1],
            [1, 4, 4, 4, 1],
            [1, 1, 1, 0, 1],
            [1, 4, 4, 4, 1],
            [1, 4, 1, 1, 1],
            [1, 3, 3, 3, 1],
            [1, 3, 1, 3, 1],
            [1, 0, 0, 0, 1],
            [1, 1, 2, 1, 1]
        ];

        const ROWS = MAP_GRID.length;
        const COLS = MAP_GRID[0].length;

        let redDotPos = { r: 1, c: 1 }; 
        let blueDotPos = { r: 4, c: 1 }; 
        let isResetting = false;
        let loopIntervalId = null;

        let roundFate = "normal"; 
        let blueStepCount = 0;
        let bluePathHistory = []; 

        const gridElement = document.getElementById('grid');

        function determineRoundFate() {
            const roll = Math.random(); 
            blueStepCount = 0; 
            bluePathHistory = [{ r: 4, c: 1 }]; 

            if (roll < 0.40) {
                roundFate = "perfect_escape";
            } else if (roll < 0.55) { 
                roundFate = "freeze";
            } else {
                roundFate = "normal";
            }
        }

        function renderMap() {
            gridElement.innerHTML = ''; 
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');

                    if (MAP_GRID[r][c] === 1) {
                        cell.classList.add('wall');
                    } else {
                        cell.classList.add('path');

                        if (r === redDotPos.r && c === redDotPos.c) {
                            const red = document.createElement('div');
                            red.classList.add('player');
                            cell.appendChild(red);
                        } else if (blueDotPos && r === blueDotPos.r && c === blueDotPos.c) {
                            const blueDot = document.createElement('div');
                            blueDot.classList.add('dot-blue');
                            cell.appendChild(blueDot);
                        }
                    }
                    gridElement.appendChild(cell);
                }
            }
        }

        function triggerReset() {
            if (isResetting) return;
            isResetting = true;
            
            clearInterval(loopIntervalId);
            document.body.classList.add('blackout');

            setTimeout(() => {
                redDotPos = { r: 1, c: 1 };
                blueDotPos = { r: 4, c: 1 };
                
                determineRoundFate();
                document.body.classList.remove('blackout');
                renderMap();
                
                isResetting = false;
                startSimulationLoop();
            }, 1000); 
        }

        function checkCollision() {
            if (blueDotPos && redDotPos.r === blueDotPos.r && redDotPos.c === blueDotPos.c) {
                triggerReset();
                return true;
            }
            return false;
        }

        // Returns neighboring open blocks
        function getValidMoves(currentPos) {
            const directions = [
                { dr: 1, dc: 0 },
                { dr: -1, dc: 0 },
                { dr: 0, dc: 1 },
                { dr: 0, dc: -1 }
            ];
            let valid = [];

            for (let dir of directions) {
                const nextR = currentPos.r + dir.dr;
                const nextC = currentPos.c + dir.dc;

                if (nextR >= 0 && nextR < ROWS && nextC >= 0 && nextC < COLS && MAP_GRID[nextR][nextC] !== 1) {
                    valid.push({ r: nextR, c: nextC });
                }
            }
            return valid;
        }

        // BFS Pathfinding to find the absolute shortest sequence to the exit row
        function findPerfectEscapeMove(startPos) {
            let queue = [ [startPos] ];
            let visited = new Set();
            visited.add(`${startPos.r},${startPos.c}`);

            while (queue.length > 0) {
                let path = queue.shift();
                let current = path[path.length - 1];

                if (current.r === ROWS - 1) {
                    return path[1] || startPos;
                }

                let neighbors = getValidMoves(current);
                for (let neighbor of neighbors) {
                    let key = `${neighbor.r},${neighbor.c}`;
                    if (!visited.has(key)) {
                        visited.add(key);
                        queue.push([...path, neighbor]);
                    }
                }
            }
            return startPos;
        }

        function updateRedDot() {
            if (isResetting || !blueDotPos) return;

            // Mode 1: Shadow-trail logic for perfect escape runs
            if (roundFate === "perfect_escape") {
                if (bluePathHistory.length > 2) {
                    redDotPos = bluePathHistory[bluePathHistory.length - 3];
                } else {
                    const choices = getValidMoves(redDotPos);
                    let bestMove = redDotPos;
                    let minDistance = Infinity;
                    for (let move of choices) {
                        const dist = Math.abs(move.r - blueDotPos.r) + Math.abs(move.c - blueDotPos.c);
                        if (dist < minDistance) { minDistance = dist; bestMove = move; }
                    }
                    redDotPos = bestMove;
                }
                return;
            }

            // Mode 2: Direct tracking logic for normal/freeze catches
            const choices = getValidMoves(redDotPos);
            let bestMove = redDotPos;
            let minDistance = Infinity;

            for (let move of choices) {
                const dist = Math.abs(move.r - blueDotPos.r) + Math.abs(move.c - blueDotPos.c);
                if (dist < minDistance) {
                    minDistance = dist;
                    bestMove = move;
                }
            }
            redDotPos = bestMove;
        }

        function updateBlueDot() {
            if (!blueDotPos || isResetting) return;

            if (blueDotPos.r === ROWS - 1) {
                triggerReset(); 
                return;
            }

            if (roundFate === "freeze" && blueStepCount >= 6) {
                return;
            }

            let bestMove = blueDotPos;

            if (roundFate === "perfect_escape") {
                bestMove = findPerfectEscapeMove(blueDotPos);
            } 
            else {
                const choices = getValidMoves(blueDotPos);
                
                // Panic Factor: 25% chance of an erratic random choice to alter trap location
                if (Math.random() < 0.25 && choices.length > 0) {
                    bestMove = choices[Math.floor(Math.random() * choices.length)];
                } else {
                    let maxScore = -Infinity;
                    for (let move of choices) {
                        const distToRed = Math.abs(move.r - redDotPos.r) + Math.abs(move.c - redDotPos.c);
                        const exitWeight = move.r * 0.5; 
                        const score = distToRed + exitWeight;

                        if (score > maxScore) {
                            maxScore = score;
                            bestMove = move;
                        }
                    }
                }
            }

            blueDotPos = bestMove;
            bluePathHistory.push({ ...blueDotPos }); 
            blueStepCount++;
        }

        function stepSimulation() {
            updateBlueDot();
            if (checkCollision()) return;

            updateRedDot();
            if (checkCollision()) return;

            renderMap();
        }

        function startSimulationLoop() {
            loopIntervalId = setInterval(stepSimulation, 240);
        }

        determineRoundFate();
        renderMap();
        startSimulationLoop();
    </script>
</body>
</html>
