<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:3</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Pitch black backing */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Keep background dark */
            cursor: crosshair;
            
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;

            filter: contrast(1.15) brightness(0.95) saturate(1.15);
        }

        /* Fade-to-black Overlay */
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999; /* Sit on top of everything, including CRT filters */
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.0s ease-in-out;
        }
        #fade-overlay.active {
            opacity: 1;
        }

        /* --- RETRO CRT FILTERS --- */
        #game-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.04));
            background-size: 100% 4px, 6px 100%; 
            z-index: 10;
            pointer-events: none; 
            animation: crt-flicker 0.15s infinite;
        }

        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 55%, rgba(0,0,0,0.85) 100%);
            z-index: 11;
            pointer-events: none;
        }

        @keyframes crt-flicker {
            0% { opacity: 0.985; }
            50% { opacity: 1.0; }
            100% { opacity: 0.985; }
        }
    </style>
</head>

    function isWallTile(tileType) {

    // --- SPIKE TILES ---
    const SPIKE_UP = 8;
    const SPIKE_RIGHT = 9;
    const SPIKE_DOWN = 10;
    const SPIKE_LEFT = 11;

    function isSpikeTile(tileType) {
        return tileType >= SPIKE_UP && tileType <= SPIKE_LEFT;
    }

    const SPIKE_ROTATION = {
        [SPIKE_UP]: 0,
        [SPIKE_RIGHT]: Math.PI / 2,
        [SPIKE_DOWN]: Math.PI,
        [SPIKE_LEFT]: Math.PI * 1.5
    };

    function drawSpikeTile(ctx, drawX, drawY, size, tileType) {
        ctx.save();
        ctx.translate(drawX + size / 2, drawY + size / 2);
        ctx.rotate(SPIKE_ROTATION[tileType] || 0);
        ctx.translate(-size / 2, -size / 2);

        ctx.fillStyle = "#e2e8f0";
        ctx.strokeStyle = "#475569";
        ctx.lineWidth = 1.5;

        const baseY = size;
        const tipY = size * 0.12;
        const spikeCount = 3;
        const spikeW = size / spikeCount;

        ctx.beginPath();
        for (let i = 0; i < spikeCount; i++) {
            const left = i * spikeW;
            const mid = left + spikeW / 2;
            const right = left + spikeW;
            ctx.moveTo(left, baseY);
            ctx.lineTo(mid, tipY);
            ctx.lineTo(right, baseY);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.restore();
    }

    function checkSpikeCollision() {
        const colLeft = Math.floor(player.x / TILE_SIZE);
        const colRight = Math.floor((player.x + player.width) / TILE_SIZE);
        const rowTop = Math.floor(player.y / TILE_SIZE);
        const rowBot = Math.floor((player.y + player.height) / TILE_SIZE);

        for (let r = rowTop; r <= rowBot; r++) {
            if (r < 0 || r >= MAP_ROWS) continue;
            for (let c = colLeft; c <= colRight; c++) {
                if (c < 0 || c >= MAP_COLS) continue;
                if (isSpikeTile(LEVEL_MAP[r][c])) {
                    return true;
                }
            }
        }
        return false;

    // --- NOTIFICATION / POPUP SYSTEM (fade in / hold / fade out) ---
    const notifications = [];
    function showNotification(text, durationMs = 2200) {
        notifications.push({
            text: text,
            start: performance.now(),
            duration: durationMs,
            fadeIn: 300,
            fadeOut: 400
        });
    }

    function drawNotifications() {
        if (notifications.length === 0) return;
        const now = performance.now();

        for (let i = notifications.length - 1; i >= 0; i--) {
            const n = notifications[i];
            const elapsed = now - n.start;

            if (elapsed >= n.duration) {
                notifications.splice(i, 1);
                continue;
            }

            let alpha = 1;
            if (elapsed < n.fadeIn) {
                alpha = elapsed / n.fadeIn;
            } else if (elapsed > n.duration - n.fadeOut) {
                alpha = (n.duration - elapsed) / n.fadeOut;
            }
            alpha = Math.max(0, Math.min(1, alpha));

            // Stack notifications, newest closest to top
            const stackIndex = notifications.length - 1 - i;
            const boxY = 60 + stackIndex * 44;

            ctx.save();
            ctx.font = "bold 15px monospace";
            const textWidth = ctx.measureText(n.text).width;
            const paddingX = 18;
            const boxW = textWidth + paddingX * 2;
            const boxH = 34;
            const boxX = (canvas.width - boxW) / 2;

            ctx.globalAlpha = alpha;
            ctx.fillStyle = "rgba(10, 10, 20, 0.75)";
            ctx.strokeStyle = "#facc15";
            ctx.lineWidth = 2;
            if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(boxX, boxY, boxW, boxH, 6);
                ctx.fill();
                ctx.stroke();
            } else {
                ctx.fillRect(boxX, boxY, boxW, boxH);
                ctx.strokeRect(boxX, boxY, boxW, boxH);
            }

            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(n.text, canvas.width / 2, boxY + boxH / 2 + 1);
            ctx.restore();
        }
    }

        { x: 700, y: 1100, startX: 600, startY: 1100, width: 30, height: 30, range: 120, speed: 0.04, axis: 'x' },
        { x: 800, y: -1000, startX: -1000, startY: 1000, width: 30, height: 30, range: 80,  speed: 0.06, axis: 'y' },
        { x: 900, y: 1100, startX: 1150, startY: 1200, width: 30, height: 30, range: 160, speed: 0.03, axis: 'x' }
    ];

    let isDrawing = false;
    const curves = []; 
    let currentCurve = [];

    const camera = {
        x: 0,
        y: 0,
        width: window.innerWidth,
        height: window.innerHeight
    };

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function isTileSolid(col, row) {
        if (col < 0 || col >= MAP_COLS || row < 0 || row >= MAP_ROWS) return true; 
        const tile = LEVEL_MAP[row][col];
        return tile === 1 || tile === 2 || tile === 3 || tile === 4 || tile === 5 || tile === 6;
    }

    function respawnPlayer() {
        player.x = player.startX;
        player.y = player.startY;
        player.vx = 0;
        player.vy = 0;
        player.isDashing = false;
        player.ridingCurve = null;
        player.canDash = true;
        deathSound.currentTime = 0; // Resets sound to the beginning if they die rapidly
        deathSound.play().catch(error => {
        console.log("Audio play blocked. Browsers require a user click/interaction on the page before playing audio.", error);
        });
    }

    // --- 3. INPUT HANDLING ---
    const keys = {};
    let spacePressedThisFrame = false;
    let ePressedThisFrame = false;

    window.addEventListener("keydown", (e) => { 
        if (isTransitioning) return; // Ignore inputs during level change

        if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
            if (!keys[e.code]) {
                spacePressedThisFrame = true; 
            }

            if (!player.grounded && player.coyoteTimer <= 0 && !player.ridingCurve && !player.wallSliding && player.canDash && !player.isDashing) {
                player.isDashing = true;
                player.canDash = false;
                player.dashTimer = player.dashDuration;
                
                if (keys["ArrowLeft"] || keys["KeyA"]) {
                    player.dashDirX = -1;
                } else if (keys["ArrowRight"] || keys["KeyD"]) {
                    player.dashDirX = 1;
                } else {
                    player.dashDirX = player.vx >= 0 ? 1 : -1;
                }
            }
        }
        if (e.code === "KeyE") {
            ePressedThisFrame = true;
        }
        keys[e.code] = true; 
    });

    window.addEventListener("keyup", (e) => {
        if ((e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") && player.vy < 0 && !player.isDashing) {
            player.vy *= 0.5; 
        }
        keys[e.code] = false;
    });

    function getMouseWorldPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) / CAMERA_ZOOM + camera.x,
            y: (e.clientY - rect.top) / CAMERA_ZOOM + camera.y
        };
    }

    canvas.addEventListener("mousedown", (e) => {
        if ((!player.hasInk && !player.infiniteInk) || isTransitioning) return;
        isDrawing = true;
        currentCurve = [];
        currentCurve.push(getMouseWorldPos(e));
    });

    canvas.addEventListener("mousemove", (e) => {
        if (!isDrawing || isTransitioning) return;
        const mousePos = getMouseWorldPos(e);
        if (currentCurve.length > 0) {
            const lastPoint = currentCurve[currentCurve.length - 1];
            if (Math.hypot(mousePos.x - lastPoint.x, mousePos.y - lastPoint.y) > 6) {
                currentCurve.push(mousePos);
            }
        }
    });

    window.addEventListener("mouseup", () => {
        if (isDrawing && currentCurve.length > 1) {
            curves.push(currentCurve);
            if (!player.infiniteInk) {
                player.hasInk = false;
            }
        }
        isDrawing = false;
        currentCurve = [];
    });

    // --- LINE OF SIGHT RAYCAST ALGORITHM ---
    function hasLineOfSight(x0, y0, x1, y1) {
        let dx = Math.abs(x1 - x0);
        let dy = Math.abs(y1 - y0);
        let sx = (x0 < x1) ? 1 : -1;
        let sy = (y0 < y1) ? 1 : -1;
        let err = dx - dy;

        let cx = x0;
        let cy = y0;

        while (true) {
            if (cx === x1 && cy === y1) {
                return true; 
            }
            
            if ((cx !== x0 || cy !== y0) && isTileSolid(cx, cy)) {
                return false; 
            }

            let e2 = 2 * err;
            if (e2 > -dy) {
                err -= dy;
                cx += sx;
            }
            if (e2 < dx) {
                err += dx;
                cy += sy;
            }
        }
    }

    function updateLineOfSight() {
        for (let r = 0; r < MAP_ROWS; r++) {
            currentlyVisible[r].fill(false);
        }

        const playerCol = Math.floor((player.x + player.width / 2) / TILE_SIZE);
        const playerRow = Math.floor((player.y + player.height / 2) / TILE_SIZE);

        const visibleWidth = canvas.width / CAMERA_ZOOM;
        const visibleHeight = canvas.height / CAMERA_ZOOM;

        const startCol = Math.max(0, Math.floor(camera.x / TILE_SIZE) - 1);
        const endCol = Math.min(MAP_COLS - 1, Math.ceil((camera.x + visibleWidth) / TILE_SIZE) + 1);
        const startRow = Math.max(0, Math.floor(camera.y / TILE_SIZE) - 1);
        const endRow = Math.min(MAP_ROWS - 1, Math.ceil((camera.y + visibleHeight) / TILE_SIZE) + 1);

        for (let r = startRow; r <= endRow; r++) {
            for (let c = startCol; c <= endCol; c++) {
                if (hasLineOfSight(playerCol, playerRow, c, r)) {
                    currentlyVisible[r][c] = true;
                    discovered[r][c] = true; 
                }
            }
        }
    }

    // --- 4. ENGINE CORE LOOP ---
    let timeAccumulator = 0;

    function update() {
        if (isTransitioning) {
            // Keep drawing the game elements while locked in transition, but don't parse physics.
            drawGame();
            ePressedThisFrame = false;
            return requestAnimationFrame(update);
        }

        let jumped = false;
        timeAccumulator += 0.05;

        // Update Moving Hazards
        for (let i = 0; i < hazards.length; i++) {
            let h = hazards[i];
            let offset = Math.sin(timeAccumulator * h.speed * 10) * h.range;
            if (h.axis === 'x') {
                h.x = h.startX + offset;
            } else {
                h.y = h.startY + offset;
            }

            // Hazard Collision Check
            if (player.x < h.x + h.width && player.x + player.width > h.x &&
                player.y < h.y + h.height && player.y + player.height > h.y) {
                respawnPlayer();
                spacePressedThisFrame = false;
                ePressedThisFrame = false;
                return requestAnimationFrame(update);
            }
        }

        // Manage Coyote Time
        if (player.grounded) {
            player.coyoteTimer = player.coyoteMaxFrames;
        } else {
            if (player.coyoteTimer > 0) player.coyoteTimer--;
        }

        // --- 4A. MOVEMENT ---
        if (player.isDashing) {
            player.vx = player.dashDirX * player.dashSpeed;
            player.vy = 0;
            player.dashTimer--;
            
            if (player.dashTimer <= 0) {
                player.isDashing = false;
                player.vx *= 0.5; 
            }
        } else if (player.ridingCurve) {
            player.canDash = true; 
            if (keys["ArrowRight"] || keys["KeyD"]) player.surfSpeed += 0.35;
            if (keys["ArrowLeft"] || keys["KeyA"])  player.surfSpeed -= 0.35;
            player.surfSpeed *= SURF_FRICTION;

            if (keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) {
                const pt1 = player.ridingCurve[player.curveSegmentIdx];
                const pt2 = player.ridingCurve[player.curveSegmentIdx + 1];
                if (pt1 && pt2) {
                    const len = Math.hypot(pt2.x - pt1.x, pt2.y - pt1.y);
                    player.vx = ((pt2.x - pt1.x) / len) * player.surfSpeed;
                    player.vy = (((pt2.y - pt1.y) / len) * player.surfSpeed) - player.jumpForce;
                }
                player.ridingCurve = null; 
                player.grounded = false;
                jumped = true;
            }
        } else {
            if (keys["ArrowRight"] || keys["KeyD"]) {
                if (player.vx < player.speed) player.vx += 0.4;
            } else if (keys["ArrowLeft"] || keys["KeyA"]) {
                if (player.vx > -player.speed) player.vx -= 0.4;
            } else {
                player.vx *= player.grounded ? GROUND_FRICTION : AIR_FRICTION;
            }

            if (keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) {
                if (player.grounded || player.coyoteTimer > 0) {
                    player.vy = -player.jumpForce;
                    player.grounded = false;
                    player.coyoteTimer = 0; 
                    jumped = true;
                } else if (player.wallSliding && player.wallDir !== 0 && spacePressedThisFrame) {
                    player.vy = -player.jumpForce * 0.9;
                    player.vx = -player.wallDir * (player.speed * 1.6); 
                    player.wallSliding = false;
                    player.canDash = true; 
                    jumped = true;
                }
            }
            
            if (player.wallSliding && player.vy > WALL_SLIDE_SPEED) {
                player.vy = WALL_SLIDE_SPEED;
            } else {
                player.vy += GRAVITY;
            }
        }

        player.wallDir = 0;
        player.wallSliding = false;

        // --- 4B. TILEMAP COLLISION ---
        if (!player.ridingCurve) {
            player.x += player.vx;
            
            let colLeft  = Math.floor(player.x / TILE_SIZE);
            let colRight = Math.floor((player.x + player.width) / TILE_SIZE);
            let rowTop   = Math.floor(player.y / TILE_SIZE);
            let rowBot   = Math.floor((player.y + player.height) / TILE_SIZE);

            if (player.vx > 0) {
                if (isTileSolid(colRight, rowTop) || isTileSolid(colRight, rowBot)) {
                    player.x = colRight * TILE_SIZE - player.width - 0.01;
                    player.vx = 0;
                    player.isDashing = false; 
                    if (!player.grounded) player.wallDir = 1; 
                }
            } else if (player.vx < 0) {
                if (isTileSolid(colLeft, rowTop) || isTileSolid(colLeft, rowBot)) {
                    player.x = (colLeft + 1) * TILE_SIZE + 0.01;
                    player.vx = 0;
                    player.isDashing = false;
                    if (!player.grounded) player.wallDir = -1; 
                }
            }

            player.y += player.vy;
            
            colLeft  = Math.floor(player.x / TILE_SIZE);
            colRight = Math.floor((player.x + player.width) / TILE_SIZE);
            rowTop   = Math.floor(player.y / TILE_SIZE);
            rowBot   = Math.floor((player.y + player.height) / TILE_SIZE);

            if (player.vy > 0) {
                if (isTileSolid(colLeft, rowBot) || isTileSolid(colRight, rowBot)) {
                    player.y = rowBot * TILE_SIZE - player.height - 0.01;
                    player.vy = 0;
                    player.grounded = true;
                    player.canDash = true; 
                }
            } else if (player.vy < 0) {
                if (isTileSolid(colLeft, rowTop) || isTileSolid(colRight, rowTop)) {
                    player.y = (rowTop + 1) * TILE_SIZE + 0.01;
                    player.vy = 0;
                }
            }

            if (player.wallDir !== 0 && !player.grounded && player.vy > 0) {
                player.wallSliding = true;
                player.canDash = true; 
            }

            // --- 4C. RAIL LINE ATTACHMENT ---
            const playerFootX = player.x + player.width / 2;
            const allCurves = [...curves];
            if (isDrawing && currentCurve.length > 1) allCurves.push(currentCurve);

            for (let c = 0; c < allCurves.length; c++) {
                let curvePoints = allCurves[c];
                for (let i = 0; i < curvePoints.length - 1; i++) {
                    let pt1 = curvePoints[i];
                    let pt2 = curvePoints[i+1];

                    let leftX = Math.min(pt1.x, pt2.x);
                    let rightX = Math.max(pt1.x, pt2.x);
                    let leftY = pt1.x < pt2.x ? pt1.y : pt2.y;
                    let rightY = pt1.x < pt2.x ? pt2.y : pt1.y;

                    if (playerFootX >= leftX && playerFootX <= rightX && rightX - leftX > 0.1) {
                        let pct = (playerFootX - leftX) / (rightX - leftX);
                        let lineYAtPlayer = leftY + pct * (rightY - leftY);

                        if (player.vy >= 0 && player.y + player.height >= lineYAtPlayer - 6 && player.y + player.height - player.vy <= lineYAtPlayer + 20) {
                            player.ridingCurve = curvePoints;
                            player.curveSegmentIdx = i;
                            player.curveT = pct;
                            player.isDashing = false;
                            
                            const dx = pt2.x - pt1.x;
                            const dy = pt2.y - pt1.y;
                            const len = Math.hypot(dx, dy);
                            
                            player.surfSpeed = player.vx * (dx / len) + player.vy * (dy / len);
                            if (Math.abs(player.surfSpeed) < Math.abs(player.vx)) {
                                player.surfSpeed = player.vx * 1.2; 
                            }
                            break;
                        }
                    }
                }
                if (player.ridingCurve) break;
            }
        }

        // --- SPIKE COLLISION CHECK ---
        if (checkSpikeCollision()) {
            respawnPlayer();
            spacePressedThisFrame = false;
            ePressedThisFrame = false;
            return requestAnimationFrame(update);
        }

        // --- 4D. CURVED RAIL PHYSICS ---
        if (player.ridingCurve && !jumped) {
            const cPoints = player.ridingCurve;
            let pt1 = cPoints[player.curveSegmentIdx];
            let pt2 = cPoints[player.curveSegmentIdx + 1];

            const dx = pt2.x - pt1.x;
            const dy = pt2.y - pt1.y;
            const segmentLength = Math.hypot(dx, dy);
            
            player.surfSpeed += (dy / segmentLength) * GRAVITY * 1.8; 
            player.surfSpeed = Math.max(-player.maxRampSpeed, Math.min(player.maxRampSpeed, player.surfSpeed));
            player.curveT += player.surfSpeed / segmentLength;

            while (player.curveT > 1.0 && player.ridingCurve) {
                if (player.curveSegmentIdx < cPoints.length - 2) {
                    player.curveT = (player.curveT - 1.0) * segmentLength;
                    player.curveSegmentIdx++;
                    pt1 = cPoints[player.curveSegmentIdx];
                    pt2 = cPoints[player.curveSegmentIdx + 1];
                    player.curveT /= Math.hypot(pt2.x - pt1.x, pt2.y - pt1.y);
                } else {
                    player.vx = (dx / segmentLength) * player.surfSpeed;
                    player.vy = (dy / segmentLength) * player.surfSpeed;
                    player.x = pt2.x - player.width / 2;
                    player.y = pt2.y - player.height;
                    player.ridingCurve = null;
                }
            }

            while (player.curveT < 0.0 && player.ridingCurve) {
                if (player.curveSegmentIdx > 0) {
                    player.curveSegmentIdx--;
                    pt1 = cPoints[player.curveSegmentIdx];
                    pt2 = cPoints[player.curveSegmentIdx + 1];
                    const prevLen = Math.hypot(pt2.x - pt1.x, pt2.y - pt1.y);
                    player.curveT = 1.0 + (player.curveT * segmentLength) / prevLen;
                } else {
                    player.vx = (dx / segmentLength) * player.surfSpeed;
                    player.vy = (dy / segmentLength) * player.surfSpeed;
                    player.x = pt1.x - player.width / 2;
                    player.y = pt1.y - player.height;
                    player.ridingCurve = null;
                }
            }

            if (player.ridingCurve) {
                pt1 = cPoints[player.curveSegmentIdx];
                pt2 = cPoints[player.curveSegmentIdx + 1];
                player.x = (pt1.x + player.curveT * (pt2.x - pt1.x)) - player.width / 2;
                player.y = (pt1.y + player.curveT * (pt2.y - pt1.y)) - player.height;
                player.vx = 0;
                player.vy = 0;
                player.grounded = true;
            }
        }

        // --- 4E. ITEMS ---
        if (player.grounded && !player.ridingCurve) {
            for (let i = 0; i < pickups.length; i++) pickups[i].active = true;
        }

        for (let i = 0; i < pickups.length; i++) {
            let item = pickups[i];
            if (item.active &&
                player.x < item.x + item.width && player.x + player.width > item.x &&
                player.y < item.y + item.height && player.y + player.height > item.y) {
                item.active = false;      
                player.hasInk = true;     
            }
        }

        // --- PENCIL PIECE COLLECTION ---
        for (let i = 0; i < pencilPieces.length; i++) {
            let piece = pencilPieces[i];
            if (piece.active &&
                player.x < piece.x + piece.width && player.x + player.width > piece.x &&
                player.y < piece.y + piece.height && player.y + player.height > piece.y) {
                piece.active = false;
                player.pencilCount++;

                if (player.pencilCount >= PENCIL_GOAL) {
                    player.infiniteInk = true;
                    player.hasInk = true;
                    showNotification(`${Math.min(player.pencilCount, PENCIL_GOAL)}/${PENCIL_GOAL} collected`, 1800);
                    showNotification("You can draw infinitely now!", 3000);
                } else {
                    showNotification(`${player.pencilCount}/${PENCIL_GOAL} collected`);
                }
            }
        }

        // --- OLD DECK PICKUP COLLECTION ---
        for (let i = 0; i < oldDeckPickups.length; i++) {
            let deckItem = oldDeckPickups[i];
            if (deckItem.active &&
                player.x < deckItem.x + deckItem.width && player.x + player.width > deckItem.x &&
                player.y < deckItem.y + deckItem.height && player.y + player.height > deckItem.y) {
                deckItem.active = false;
                // Log the pickup so blackjack.html can pick this back up later.
                try {
                    localStorage.setItem('deckCollected', 'true');
                } catch (err) {
                    console.log("Could not save deck pickup to localStorage:", err);
                }
                showNotification("Found an old deck of cards...", 2400);
                showNotification("Stashed away for later.", 2400);
            }
        }

        // --- FACING DIRECTION ---
        if (player.isDashing) {
            player.facing = player.dashDirX >= 0 ? 1 : -1;
        } else if (Math.abs(player.vx) > 0.05) {
            player.facing = player.vx > 0 ? 1 : -1;
        }

        // --- CAMERA TRACKING & BOUNDS ---
        const visibleWidth = canvas.width / CAMERA_ZOOM;
        const visibleHeight = canvas.height / CAMERA_ZOOM;

        camera.x = (player.x + player.width / 2) - visibleWidth / 2;
        camera.y = (player.y + player.height / 2) - visibleHeight / 2;

        const maxCamX = WORLD_WIDTH - visibleWidth;
        const maxCamY = WORLD_HEIGHT - visibleHeight;

        camera.x = Math.max(0, maxCamX > 0 ? Math.min(maxCamX, camera.x) : 0);
        camera.y = Math.max(0, maxCamY > 0 ? Math.min(maxCamY, camera.y) : 0);

        // --- CALCULATE LINE OF SIGHT ---
        updateLineOfSight();

        // --- IGLOO DETECTOR & TRANSITION ---
        checkIglooProximity();

        // --- RENDER GAME SCENE ---
        drawGame();
        
        spacePressedThisFrame = false; 
        ePressedThisFrame = false;
        requestAnimationFrame(update);
    }

    // --- NEIGHBOR IGLOO DETECTION & INTERACTION ---
    let isPlayerNearIgloo = false;

    function checkIglooProximity() {
        isPlayerNearIgloo = false;

        const pCol = Math.floor((player.x + player.width / 2) / TILE_SIZE);
        const pRow = Math.floor((player.y + player.height / 2) / TILE_SIZE);

        // Check the tile the player is standing on, and immediate adjacent tiles
        for (let r = pRow - 1; r <= pRow + 1; r++) {
            for (let c = pCol - 1; c <= pCol + 1; c++) {
                if (r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS) {
                    if (LEVEL_MAP[r][c] === 12) { // 12 is the Igloo
                        isPlayerNearIgloo = true;
                        
                        // If near the igloo and user pressed E, initiate level transit
                        if (ePressedThisFrame && !isTransitioning) {
                            startLevelTransition();
                        }
                        return;
                    }
                }
            }
        }
    }

    function startLevelTransition() {
        isTransitioning = true;

        const FADE_DURATION_MS = 1000; // matches #fade-overlay CSS transition
        const BLACK_HOLD_MS = 5000;    // how long to stay pitch black once faded, before navigating

        // Fade the local canvas view (inside this popup) to black.
        const overlay = document.getElementById("fade-overlay");
        overlay.classList.add("active");

        // Fade the background music (which lives on the outer index.html
        // page, not in here) down to silence over the same duration as
        // the visual fade, so both land at "black + silent" together.
        try {
            if (typeof window.top.fadeOutMusic === "function") {
                window.top.fadeOutMusic(FADE_DURATION_MS / 1000);
            }
        } catch (err) {
            console.log("Could not fade outer page's music:", err);
        }

        // This game only lives inside the small "WINDOWS.exe" popup on the
        // outer page, so fading #fade-overlay alone leaves Mr. President,
        // the dialogue box, etc. fully visible. Inject a full-viewport
        // black overlay into the OUTER (index.html) document too, so the
        // whole screen goes black - same window.top access the existing
        // navigation below already relies on.
        try {
            const topDoc = window.top.document;
            let topOverlay = topDoc.getElementById("igloo-fade-overlay");
            if (!topOverlay) {
                topOverlay = topDoc.createElement("div");
                topOverlay.id = "igloo-fade-overlay";
                Object.assign(topOverlay.style, {
                    position: "fixed",
                    top: "0",
                    left: "0",
                    width: "100%",
                    height: "100%",
                    backgroundColor: "#000000",
                    zIndex: "999999",
                    opacity: "0",
                    transition: `opacity ${FADE_DURATION_MS / 1000}s ease-in-out`,
                    pointerEvents: "none"
                });
                topDoc.body.appendChild(topOverlay);
            }
            void topOverlay.offsetWidth; // force reflow so the opacity transition actually plays
            topOverlay.style.opacity = "1";
        } catch (err) {
            // Same-origin access blocked for some reason - the local
            // #fade-overlay above still covers the popup itself.
            console.log("Could not fade outer page to black:", err);
        }

        // Wait for the fade to finish, hold at pitch black for a beat,
        // then finally navigate to firstp.html.
        setTimeout(() => {
            setTimeout(() => {
                window.top.location.href = "firstp.html";
            }, BLACK_HOLD_MS);
        }, FADE_DURATION_MS);
    }

    // --- 5. RENDER STAGE ---
    function drawGame() {
        const playerBGCol = Math.floor((player.x + player.width / 2) / TILE_SIZE);
        const playerBGRow = Math.floor((player.y + player.height / 2) / TILE_SIZE);
        
        // Treat cobble tile (7) OR igloo tile (12) as backdrop dims
        const currentTileUnderPlayer = (playerBGRow >= 0 && playerBGRow < MAP_ROWS && playerBGCol >= 0 && playerBGCol < MAP_COLS) 
            ? LEVEL_MAP[playerBGRow][playerBGCol] : 0;
        const playerOnCobble = currentTileUnderPlayer === 7 || currentTileUnderPlayer === 12;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 5A. DRAW BACKDROP ---
        if (backdropImage.complete && backdropImage.naturalWidth > 0) {
            const imgW = backdropImage.naturalWidth;
            const imgH = backdropImage.naturalHeight;
            const canvasAspect = canvas.width / canvas.height;
            const imgAspect = imgW / imgH;

            let drawW, drawH;
            if (imgAspect > canvasAspect) {
                drawH = canvas.height;
                drawW = drawH * imgAspect;
            } else {
                drawW = canvas.width;
                drawH = drawW / imgAspect;
            }

            const parallax = 0.08;
            const maxOffsetX = Math.max(0, drawW - canvas.width);
            const maxOffsetY = Math.max(0, drawH - canvas.height);
            const camPctX = WORLD_WIDTH > canvas.width ? camera.x / (WORLD_WIDTH - (canvas.width / CAMERA_ZOOM)) : 0;
            const camPctY = WORLD_HEIGHT > canvas.height ? camera.y / (WORLD_HEIGHT - (canvas.height / CAMERA_ZOOM)) : 0;
            const offsetX = -maxOffsetX * (camPctX || 0) * parallax * 4;
            const offsetY = -maxOffsetY * (camPctY || 0) * parallax * 4;

            ctx.drawImage(backdropImage, offsetX - (drawW - canvas.width) / 2, offsetY - (drawH - canvas.height) / 2, drawW, drawH);

            ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (playerOnCobble) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        ctx.save();
        ctx.scale(CAMERA_ZOOM, CAMERA_ZOOM);
        ctx.translate(-camera.x, -camera.y);

        // --- DRAW TILE MAP WITH DYNAMIC VISIBILITY ---
        for (let r = 0; r < MAP_ROWS; r++) {
            for (let c = 0; c < MAP_COLS; c++) {
                let tileType = LEVEL_MAP[r][c];
                const wall = isWallTile(tileType);

                let drawX = Math.floor(c * TILE_SIZE);
                let drawY = Math.floor(r * TILE_SIZE);

                ctx.save();

                if (wall) {
                    ctx.globalAlpha = 1.0; 
                } else if (currentlyVisible[r][c]) {
                    ctx.globalAlpha = 1.0; 
                } else {
                    ctx.globalAlpha = 0.25; 
                }

                // If it's cobble (7) OR our custom-backed Igloo (12), render opaque black beneath
                if (tileType === 7 || tileType === 12) {
                    const floorAlpha = ctx.globalAlpha;
                    ctx.globalAlpha = 1.0;
                    ctx.fillStyle = "#000000";
                    ctx.fillRect(drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                    ctx.globalAlpha = floorAlpha;
                }

                if (tileType === 1) {
                    ctx.drawImage(iceTileImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                } else if (tileType === 2) {
                    ctx.drawImage(iceUnderImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                } else if (tileType === 3) {
                    ctx.drawImage(snowDirtImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                } else if (tileType === 4) {
                    ctx.drawImage(dirtImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                } else if (tileType === 5) {
                    ctx.drawImage(snowOverImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                } else if (tileType === 6) {
                    ctx.drawImage(snowOvererImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                } else if (tileType === 7) {
                    ctx.drawImage(cobbleImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                } else if (isSpikeTile(tileType)) {
                    drawSpikeTile(ctx, drawX, drawY, TILE_SIZE, tileType);
                } else if (tileType === 12) {
                    // Draw cobble block as the background first
                    ctx.drawImage(cobbleImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                    // Draw igloo overlay on top of it
                    ctx.drawImage(iglooImage, drawX, drawY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
                }

                ctx.restore();
            }
        }

        // --- DRAW TUTORIAL TEXT ---
        ctx.save();
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)"; 
        ctx.font = "bold 10px monospace";            
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0, 0, 0, 0.8)";
        ctx.shadowBlur = 2;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;

        for (let i = 0; i < tutorialTexts.length; i++) {
            let t = tutorialTexts[i];
            let tCol = Math.floor(t.x / TILE_SIZE);
            let tRow = Math.floor(t.y / TILE_SIZE);
            
            if (currentlyVisible[tRow] && currentlyVisible[tRow][tCol]) {
                ctx.fillText(t.text, t.x, t.y);
            }
        }
        ctx.restore();

        // --- DRAW PROXIMITY "E" PROMPT ABOVE PLAYER ---
        if (isPlayerNearIgloo && !isTransitioning) {
            ctx.save();
            ctx.fillStyle = "#38bdf8"; // Light sky blue retro neon
            ctx.font = "bold 9px monospace";
            ctx.textAlign = "center";
            ctx.shadowColor = "rgba(0, 0, 0, 0.9)";
            ctx.shadowBlur = 3;
            ctx.fillText("Press E to Enter", player.x + player.width / 2, player.y - 12);
            ctx.restore();
        }

        // --- DRAW INTERACTIBLES & HAZARDS ---
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 3;

        for (let i = 0; i < pickups.length; i++) {
            let item = pickups[i];
            let itemCol = Math.floor((item.x + item.width / 2) / TILE_SIZE);
            let itemRow = Math.floor((item.y + item.height / 2) / TILE_SIZE);

            if (item.active && currentlyVisible[itemRow] && currentlyVisible[itemRow][itemCol]) {
                ctx.fillStyle = "#facc15"; 
                ctx.fillRect(item.x, item.y, item.width, item.height);
            }
        }

        // Draw Pencil Pieces (small orange pencil icon)
        for (let i = 0; i < pencilPieces.length; i++) {
            let piece = pencilPieces[i];
            let pieceCol = Math.floor((piece.x + piece.width / 2) / TILE_SIZE);
            let pieceRow = Math.floor((piece.y + piece.height / 2) / TILE_SIZE);

            if (piece.active && currentlyVisible[pieceRow] && currentlyVisible[pieceRow][pieceCol]) {
                ctx.save();
                const bob = Math.sin((Date.now() + i * 400) * 0.004) * 2;
                const px = piece.x;
                const py = piece.y + bob;
                const pw = piece.width;
                const ph = piece.height;

                ctx.translate(px + pw / 2, py + ph / 2);
                ctx.rotate(-Math.PI / 4);
                ctx.translate(-pw / 2, -ph / 2);

                // Pencil body
                ctx.fillStyle = "#fb923c";
                ctx.fillRect(0, ph * 0.28, pw * 0.72, ph * 0.44);
                // Pencil tip
                ctx.beginPath();
                ctx.moveTo(pw * 0.72, ph * 0.28);
                ctx.lineTo(pw, ph * 0.5);
                ctx.lineTo(pw * 0.72, ph * 0.72);
                ctx.closePath();
                ctx.fillStyle = "#f4d19c";
                ctx.fill();
                // Pencil point
                ctx.beginPath();
                ctx.moveTo(pw * 0.92, ph * 0.42);
                ctx.lineTo(pw, ph * 0.5);
                ctx.lineTo(pw * 0.92, ph * 0.58);
                ctx.closePath();
                ctx.fillStyle = "#3f3f46";
                ctx.fill();
                // Pencil eraser
                ctx.fillStyle = "#f472b6";
                ctx.fillRect(-pw * 0.1, ph * 0.28, pw * 0.12, ph * 0.44);

                ctx.restore();
            }
        }

        // Draw Old Deck of Cards pickup (small stacked-card icon)
        for (let i = 0; i < oldDeckPickups.length; i++) {
            let deckItem = oldDeckPickups[i];
            let dCol = Math.floor((deckItem.x + deckItem.width / 2) / TILE_SIZE);
            let dRow = Math.floor((deckItem.y + deckItem.height / 2) / TILE_SIZE);

            if (deckItem.active && currentlyVisible[dRow] && currentlyVisible[dRow][dCol]) {
                ctx.save();
                const bob = Math.sin((Date.now() + i * 500) * 0.0035) * 2;
                const dx = deckItem.x;
                const dy = deckItem.y + bob;
                const dw = deckItem.width;
                const dh = deckItem.height;

                if (oldDeckImage.complete && oldDeckImage.naturalWidth > 0) {
                    // Pixel art texture - disable smoothing so it stays crisp/blocky
                    // no matter what size it's drawn at.
                    const prevSmoothing = ctx.imageSmoothingEnabled;
                    ctx.imageSmoothingEnabled = false;
                    const pad = dw * 0.2;
                    ctx.drawImage(oldDeckImage, dx - pad / 2, dy - pad / 2, dw + pad, dh + pad);
                    ctx.imageSmoothingEnabled = prevSmoothing;
                } else {
                    // Fallback vector drawing while the texture is still loading
                    const cardW = dw * 0.8;
                    const cardH = dh * 0.8;

                    ctx.fillStyle = "#7f0000";
                    ctx.fillRect(dx + 3, dy + 3, cardW, cardH);
                    ctx.fillStyle = "#b71c1c";
                    ctx.fillRect(dx + 1, dy + 1, cardW, cardH);
                    ctx.strokeStyle = "#fdfbf7";
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(dx + 1, dy + 1, cardW, cardH);

                    ctx.fillStyle = "#fdfbf7";
                    const cxp = dx + 1 + cardW / 2;
                    const cyp = dy + 1 + cardH / 2;
                    ctx.beginPath();
                    ctx.moveTo(cxp, cyp - 5);
                    ctx.lineTo(cxp + 4, cyp);
                    ctx.lineTo(cxp, cyp + 5);
                    ctx.lineTo(cxp - 4, cyp);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        for (let i = 0; i < hazards.length; i++) {
    let h = hazards[i];
    let hazardCol = Math.floor((h.x + h.width / 2) / TILE_SIZE);
    let hazardRow = Math.floor((h.y + h.height / 2) / TILE_SIZE);

    if (currentlyVisible[hazardRow] && currentlyVisible[hazardRow][hazardCol]) {
        // 1. Calculate the center and size of the hazard space
        let centerX = h.x + h.width / 2;
        let centerY = h.y + h.height / 2;
        let outerRadius = Math.min(h.width, h.height) / 2; // Outer tip of the spikes
        let innerRadius = outerRadius * 0.6;              // Solid inner circle core

        // --- NEW: Save state and translate to the center of the spike ---
        ctx.save();
        ctx.translate(centerX, centerY);

        // --- NEW: Calculate spin angle based on time (change 0.025 to make it faster or slower) ---
        let spinAngle = (Date.now() * 0.025) % (Math.PI * 2);
        ctx.rotate(spinAngle);

        // 2. Draw the spiked outer ring (NOW GREY)
        ctx.fillStyle = "#9ca3af"; // Metallic light grey instead of red
        
        let spikeCount = 8; // Number of spikes around the circle
        ctx.beginPath();
        
        for (let j = 0; j < spikeCount * 2; j++) {
            // Alternate between the inner core radius and the outer spike tip radius
            let isTip = j % 2 === 0;
            let radius = isTip ? outerRadius : innerRadius;
            let angle = (j * Math.PI) / spikeCount;
            
            // Note: coordinates are now relative to (0,0) because of ctx.translate
            let xPos = Math.cos(angle) * radius;
            let yPos = Math.sin(angle) * radius;
            
            if (j === 0) {
                ctx.moveTo(xPos, yPos);
            } else {
                ctx.lineTo(xPos, yPos);
            }
        }
        
        ctx.closePath();
        ctx.fill();

        // 3. Draw a slightly darker central core (NOW DARK GREY)
        ctx.beginPath();
        // Core is now centered at (0, 0) due to translation
        ctx.arc(0, 0, innerRadius * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = "#4b5563"; // Slate grey core instead of dark red
        ctx.fill();

        // --- NEW: Restore the canvas so other drawings don't get spun around ---
        ctx.restore();
    }
}
        
        ctx.restore(); 

        // Render Ink Lines
        ctx.strokeStyle = "#4ade80";
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (let c = 0; c < curves.length; c++) {
            ctx.beginPath();
            let firstPoint = curves[c][0];
            let fCol = Math.floor(firstPoint.x / TILE_SIZE);
            let fRow = Math.floor(firstPoint.y / TILE_SIZE);

            ctx.moveTo(firstPoint.x, firstPoint.y);
            for (let i = 1; i < curves[c].length; i++) {
                let pt = curves[c][i];
                let ptCol = Math.floor(pt.x / TILE_SIZE);
                let ptRow = Math.floor(pt.y / TILE_SIZE);
                
                if (discovered[ptRow] && discovered[ptRow][ptCol]) {
                    ctx.lineTo(pt.x, pt.y);
                } else {
                    ctx.moveTo(pt.x, pt.y);
                }
            }
            ctx.stroke();
        }

        // Active drawing path
        if (isDrawing && currentCurve.length > 0) {
            ctx.strokeStyle = "#facc15";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(currentCurve[0].x, currentCurve[0].y);
            for (let i = 1; i < currentCurve.length; i++) ctx.lineTo(currentCurve[i].x, currentCurve[i].y);
            ctx.stroke();
        }

        // --- PLAYER RENDERING ---
        {
            const cx = player.x + player.width / 2;
            const cy = player.y + player.height / 2;

            const spriteW = player.width + 10;
            const spriteH = player.height + 10;
            const drawX = cx - spriteW / 2;
            const drawY = player.y + player.height - spriteH;

            let sprite;
            let flip = false; 

            if (player.isDashing) {
                sprite = penguinSlide;
                flip = player.dashDirX >= 0; 
            } else if (player.wallSliding) {
                sprite = player.wallDir >= 0 ? penguinGrabRight : penguinGrabLeft;
            } else {
                sprite = player.facing >= 0 ? penguinRightImage : penguinLeftImage;
            }

            ctx.save();
            ctx.shadowColor = "rgba(0, 0, 0, 0.6)";
            ctx.shadowBlur = 3;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            if (sprite.complete && sprite.naturalWidth > 0) {
                if (flip) {
                    ctx.save();
                    ctx.translate(drawX + spriteW, drawY);
                    ctx.scale(-1, 1);
                    ctx.shadowColor = "transparent"; 
                    ctx.drawImage(sprite, 0, 0, spriteW, spriteH);
                    ctx.restore();
                } else {
                    ctx.drawImage(sprite, drawX, drawY, spriteW, spriteH);
                }
            } else {
                ctx.fillStyle = "#f43f5e";
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }
            ctx.restore();
        }

        ctx.restore();

        // --- DRAW SCREEN-SPACE UI (notifications, popups) ---
        drawNotifications();
    }

    requestAnimationFrame(update);
</script>
