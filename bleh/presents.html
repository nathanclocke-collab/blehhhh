<!DOCTYPE html>
<html>
    <head>
    <title>Happy Birthday!!</title>

    <!-- CSS -->
    <style>
        body {
        background-color: #7B9669;
        font-family: 'Courier New', Courier, monospace;
        display: flex; /*centers everything on screen*/
        flex-direction: column; /* stacks elements vertically - character, text, then button*/
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        user-select: none; /* Prevents text highlighting while dragging */
        -webkit-user-select: none;
      }

      #game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        position: relative;
      }

      #dialogue-box {
        background: white;          
        border: 3px solid #333;     
        border-radius: 10px;        
        padding: 15px;              
        width: 300px;               
        height: 120px;              
        margin-bottom: 15px;        
        box-shadow: 4px 4px 0px #333;
        text-align: left;
        box-sizing: border-box;
        overflow: hidden;     /* Safety net */
        opacity: 0;
        animation:
        fadeIN 1s ease-out forwards,
        pulse 1.5s ease-in-out 1s infinite alternate;
      }

      @keyframes fadeIN {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
      }

      @keyframes pulse {
        from {
            transform: scale(1); /*normal size*/ 
        }
        to {
            transform: scale(1.1);
        }
      }

      

    </style>

    <div id="game-container">
        <h1>HAPPY BIRTHDAY</h1>
        <h4>there is nothing else to look for</h4>
    </div>

    <div id="dialogue-box">
        <p>Happy Birthday toooo youuuuu</p>
        
    </div>

    















    </head>
</html>
