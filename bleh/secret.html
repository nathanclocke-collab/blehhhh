            left: 0;

            height: 100vh;

            0% { opacity: 1; visibility: visible; }
            90% { opacity: 0; visibility: visible; }
            100% { opacity: 0; visibility: hidden; pointer-events: none; }
        }

        @keyframes secret-sequence {
            0% { opacity: 0; }
            25% { opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; }

        function createRippleTexture() {
            const canvas = document.createElement("canvas");
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, 16, 16);
            ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
            
            const highPoints = [
                [7,2],[8,2],[5,3],[6,3],[9,3],[10,3],[3,5],[4,5],[11,5],[12,5],[2,7],
                [2,8],[13,7],[13,8],[3,10],[4,10],[11,10],[12,10],[5,11],[6,11],[9,11],
                [10,11],[7,13],[8,13]
            ];
            highPoints.forEach(p => ctx.fillRect(p[0], p[1], 1, 1));
            
            ctx.fillStyle = "rgba(130, 190, 255, 0.4)";
            const lowPoints = [
                [7,1],[8,1],[6,2],[9,2],[4,3],[11,3],[3,4],[12,4],[2,5],[13,5],[1,6],
                [14,6],[1,7],[14,7],[1,8],[14,8],[1,9],[14,9],[2,10],[13,10],[3,11],
                [12,11],[4,12],[11,12],[6,13],[13,13],[7,14],[8,14]
            ];
            lowPoints.forEach(p => ctx.fillRect(p[0], p[1], 1, 1));
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.NearestFilter;
            texture.magFilter = THREE.NearestFilter;
            return texture;
        }

        function buildRetroStarsEngine() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(420);
            for (let i = 0; i < 140; i++) {
                const angle = 2 * Math.random() * Math.PI;
                const coAngle = Math.acos(0.75 * Math.random());
                const distance = 90 + 4 * Math.random();
                positions[3 * i] = distance * Math.sin(coAngle) * Math.cos(angle);
                positions[3 * i + 1] = distance * Math.cos(coAngle) + 8;
                positions[3 * i + 2] = distance * Math.sin(coAngle) * Math.sin(angle);
            }
            geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 16777215, size: 0.5, transparent: true, opacity: 0.8, depthWrite: false });
            retroStarField = new THREE.Points(geometry, material);
            scene.add(retroStarField);
        }

        function createSkyGradientTexture() {
            const canvas = document.createElement("canvas");
            canvas.width = 1;
            canvas.height = 256;
            const ctx = canvas.getContext("2d");
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, "#0a0e14");
            grad.addColorStop(0.35, "#0a0e14");
            grad.addColorStop(0.52, "#141b29");
            grad.addColorStop(0.66, "#2c1b3d");
            grad.addColorStop(0.78, "#7c2b2d");
            grad.addColorStop(0.88, "#b84d2a");
            grad.addColorStop(1, "#df8729");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = texture.magFilter = THREE.NearestFilter;
            return texture;
        }

        function buildHorizonSkyDome() {
            const geometry = new THREE.SphereGeometry(95, 32, 16);
            const material = new THREE.MeshBasicMaterial({ map: createSkyGradientTexture(), side: THREE.BackSide, depthWrite: false });
            skyDomeMesh = new THREE.Mesh(geometry, material);
            scene.add(skyDomeMesh);
        }
        
        function createFallbackRod() {
            const group = new THREE.Group();
            const handleGeom = new THREE.CylinderGeometry(0.02, 0.025, 0.25, 8);
            const handleMat = new THREE.MeshStandardMaterial({ color: 6044974, roughness: 0.8 });
            const handleMesh = new THREE.Mesh(handleGeom, handleMat);
            handleMesh.position.set(0, 0.125, 0);
            handleMesh.rotation.x = Math.PI / 2;
            group.add(handleMesh);
            
            const shaftGeom = new THREE.CylinderGeometry(0.015, 0.008, 0.5, 8);
            const shaftMat = new THREE.MeshStandardMaterial({ color: 9139029, roughness: 0.6 });
            const shaftMesh = new THREE.Mesh(shaftGeom, shaftMat);
            shaftMesh.position.set(0, 0.125, 0.3);
            shaftMesh.rotation.x = Math.PI / 2;
            group.add(shaftMesh);
            
            const reelGeom = new THREE.SphereGeometry(0.015, 6, 6);
            const reelMat = new THREE.MeshStandardMaterial({ color: 16739125 });
            const reelMesh = new THREE.Mesh(reelGeom, reelMat);
            reelMesh.position.set(0, 0.125, 0.55);
            group.add(reelMesh);
            
            const tipGeom = new THREE.CylinderGeometry(0.002, 0.002, 0.4, 4);
            const tipMat = new THREE.MeshStandardMaterial({ color: 13421772, transparent: true, opacity: 0.4 });
            const tipMesh = new THREE.Mesh(tipGeom, tipMat);
            tipMesh.position.set(0, 0.125, 0.7);
            tipMesh.rotation.x = Math.PI / 2;
            group.add(tipMesh);
            
            const guideGeom = new THREE.CylinderGeometry(0.035, 0.035, 0.015, 8);
            const guideMat = new THREE.MeshStandardMaterial({ color: 4473924, metalness: 0.5, roughness: 0.3 });
            const guideMesh = new THREE.Mesh(guideGeom, guideMat);
            guideMesh.position.set(0, 0.125, 0.05);
            group.add(guideMesh);
            
            group.scale.set(0.8, 0.8, 0.8);
            group.position.set(0, 0.1, 0);
            rodPoleMesh = group;
            fishingRodGroup.add(rodPoleMesh);
            fishingRodGroup.visible = rodEquipped;
        }
        
        function build3DFishingRod() {
            fishingRodGroup = new THREE.Group();
            fishingRodGroup.position.set(0.35, -0.15, -0.5);
            fishingRodGroup.rotation.set(0.1, -0.3, 0.15);
            camera.add(fishingRodGroup);
            fishingRodGroup.visible = false;
            
            new THREE.GLTFLoader().load("./assets/low-poly_fishing_rod.glb", (gltf) => {
                rodPoleMesh = gltf.scene;
                rodPoleMesh.position.set(0, 0.3, 0);
                rodPoleMesh.scale.set(0.03, 0.03, 0.03);
                rodPoleMesh.rotation.set(0, 0.5, 0);
                rodPoleMesh.traverse((child) => {
                    if (child.isMesh) {
                        if (!child.material) {
                            child.material = new THREE.MeshStandardMaterial({ color: 9132587, roughness: 0.75, metalness: 0.15 });
                        }
                        child.visible = true;
                    }
                });
                fishingRodGroup.add(rodPoleMesh);
                fishingRodGroup.visible = rodEquipped;
            }, undefined, (err) => {
                createFallbackRod();
            });
        }
        
        function setupAudioEngine(listenerCam) {
            audioListener = new THREE.AudioListener();
            listenerCam.add(audioListener);
            audioLoader = new THREE.AudioLoader();
            
            ambientLoopSound = new THREE.Audio(audioListener);
            audioLoader.load("secretSounds/ambiance.mp3", (buffer) => {
                ambientLoopSound.setBuffer(buffer);
                ambientLoopSound.setLoop(true);
                ambientLoopSound.setVolume(VOLUME_CONFIG.ambiance);

            audioLoader.load("secretSounds/grasswalk.mp3", (buffer) => { dirtStepBuffer = buffer; });

            audioLoader.load("secretSounds/beatbox.mp3", (buffer) => { beatboxBuffer = buffer; });
            
            stereoAudio = new THREE.Audio(audioListener);
        }
        
        function playAudioInstance(buffer, configKeyOrVal) {
            if (buffer) {
                const instance = new THREE.Audio(audioListener);
                instance.setBuffer(buffer);
                const volume = typeof configKeyOrVal === "string" ? VOLUME_CONFIG[configKeyOrVal] : configKeyOrVal;
                instance.setVolume(volume !== undefined ? volume : 1);
                instance.setLoop(false);
                instance.play();
            }
        }
        
        function cycleStereoChannel() {
            if (!stereoAudio) return;
            currentStereoTrack = (currentStereoTrack + 1) % STEREO_CHANNELS.length;
            hudElement.innerHTML = `📻 Tuning Boombox to Channel ${currentStereoTrack + 1}...`;
            hudElement.classList.add("visible");
            setTimeout(() => { hudElement.classList.remove("visible"); }, 1500);
            
            if (stereoAudio.isPlaying) stereoAudio.stop();
            
            audioLoader.load(STEREO_CHANNELS[currentStereoTrack], (buffer) => {
                stereoAudio.setBuffer(buffer);
                stereoAudio.setLoop(true);
                stereoAudio.setVolume(VOLUME_CONFIG.stereoMusic);
                stereoAudio.play();

        function createUnifiedFoliageTexture(baseColor, noiseColor1, noiseColor2, type) {
            const canvas = document.createElement("canvas");
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext("2d");
            ctx.imageSmoothingEnabled = false;
            
            if (["leaves", "leaves_dark", "leaves_bright", "dandelion", "purpleflower", "marigold", "single_tuft"].includes(type)) {
                ctx.clearRect(0, 0, 16, 16);
            } else {
                ctx.fillStyle = baseColor;
                ctx.fillRect(0, 0, 16, 16);
            }
            
            ctx.fillStyle = baseColor;
            for (let i = 0; i < 180; i++) ctx.fillRect(Math.floor(16 * Math.random()), Math.floor(16 * Math.random()), 1, 1);
            ctx.fillStyle = noiseColor1;
            for (let i = 0; i < 50; i++) ctx.fillRect(Math.floor(16 * Math.random()), Math.floor(16 * Math.random()), 1, 1);
            ctx.fillStyle = noiseColor2;
            for (let i = 0; i < 60; i++) ctx.fillRect(Math.floor(16 * Math.random()), Math.floor(16 * Math.random()), 1, 1);
            
            if (type === "single_tuft") {
                ctx.clearRect(0, 0, 16, 16);
                ctx.fillStyle = baseColor;
                ctx.fillRect(3, 1, 1, 15); ctx.fillRect(7, 4, 1, 12); ctx.fillRect(12, 0, 1, 16);
                ctx.fillStyle = noiseColor1;
                ctx.fillRect(4, 2, 1, 14); ctx.fillRect(11, 1, 1, 15); ctx.fillRect(8, 6, 1, 10);
                ctx.fillStyle = noiseColor2;
                ctx.fillRect(2, 5, 1, 11); ctx.fillRect(13, 4, 1, 12); ctx.fillRect(6, 7, 1, 9);
            } else if (type === "dandelion") {
                ctx.fillStyle = "#ffdf00";
                [[3, 4], [12, 3], [5, 11], [11, 12], [7, 6]].forEach(p => {
                    ctx.fillRect(p[0], p[1], 1, 1);
                    if (Math.random() > 0.3) ctx.fillRect(p[0] + 1, p[1], 1, 1);
                });
            } else if (type === "purpleflower") {
                ctx.fillStyle = "#9b5de5";
                [[4, 2], [10, 5], [3, 12], [13, 10], [8, 8]].forEach(p => {
                    ctx.fillRect(p[0], p[1], 1, 1);
                    ctx.fillStyle = "#f15bb5";
                    if (Math.random() > 0.4) ctx.fillRect(p[0] - 1, p[1], 1, 1);
                });
            } else if (type === "marigold") {
                ctx.fillStyle = "#ff7700";
                [[2, 5], [13, 6], [6, 13], [9, 2], [7, 8]].forEach(p => {
                    ctx.fillRect(p[0], p[1], 2, 1);
                    ctx.fillStyle = "#ffaa00";
                    if (Math.random() > 0.3) ctx.fillRect(p[0], p[1] - 1, 1, 1);
                });
            } else if (type === "sand") {
                for (let i = 0; i < 40; i++) {
                    ctx.fillStyle = Math.random() > 0.4 ? noiseColor1 : noiseColor2;
                    ctx.fillRect(Math.floor(16 * Math.random()), Math.floor(16 * Math.random()), 1, 1);
                }
            } else if (type === "water") {
                for (let i = 0; i < 95; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? noiseColor1 : noiseColor2;
                    ctx.fillRect(Math.floor(16 * Math.random()), Math.floor(16 * Math.random()), Math.floor(4 * Math.random()) + 1, 1);
                }
            } else if (type === "cement") {
                for (let i = 0; i < 45; i++) {
                    ctx.fillStyle = Math.random() > 0.4 ? noiseColor1 : noiseColor2;
                    ctx.fillRect(Math.floor(16 * Math.random()), Math.floor(16 * Math.random()), Math.floor(2 * Math.random()) + 1, Math.floor(Math.floor(2 * Math.random()) + 1));
                }
            } else if (type === "dock") {
                for (let i = 0; i < 40; i++) {
                    ctx.fillStyle = Math.random() > 0.4 ? noiseColor1 : noiseColor2;
                    ctx.fillRect(Math.floor(16 * Math.random()), Math.floor(16 * Math.random()), 1, 4);
                }
            } else if (type === "rail_deck") {
                for (let i = 0; i < 60; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? noiseColor1 : noiseColor2;
                    ctx.fillRect(Math.floor(16 * Math.random()), 4 * Math.floor(4 * Math.random()), 16, 2);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.minFilter = texture.magFilter = THREE.NearestFilter;
            texture.repeat.set(2, 2);
            return texture;
        }

        function buildHybridFoliageBush(x, z, type) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);
            
            const mat = hedgeMaterials[type];
            const core = new THREE.Mesh(new THREE.BoxGeometry(0.85 * TILE_SIZE, 0.95 * BUSH_HEIGHT, 0.85 * TILE_SIZE), hedgeMaterials.shadowCore);
            core.position.y = BUSH_HEIGHT / 2;

            const size = 1.35 * TILE_SIZE;
            const leafGeom = new THREE.PlaneGeometry(size, BUSH_HEIGHT);
            
            const crossA = new THREE.Mesh(leafGeom, mat);
            crossA.position.y = BUSH_HEIGHT / 2;
            crossA.rotation.y = Math.PI / 4;
            group.add(crossA);
            
            const crossB = new THREE.Mesh(leafGeom, mat);
            crossB.position.y = BUSH_HEIGHT / 2;
            crossB.rotation.y = -Math.PI / 4;
            group.add(crossB);
            
            shellOffsets.forEach((offset, idx) => {
                let shellMat = mat;
                if (type !== "standard" && idx % 2 === 0) shellMat = hedgeMaterials.standard;
                const shell = new THREE.Mesh(leafGeom, shellMat);
                shell.position.set(offset.x, BUSH_HEIGHT / 2, offset.z);
                shell.rotation.y = offset.rotY;
                group.add(shell);
            });
            
            for (let i = 0; i < 24; i++) {
                let detailMat = hedgeMaterials.standard;
                let detailY = Math.random() * BUSH_HEIGHT;
                const r = Math.random();
                if (r < 0.35) detailMat = hedgeMaterials.dark;
                else if (r < 0.55) detailMat = hedgeMaterials.bright;
                
                if (type === "marigold" && Math.random() < 0.45) detailMat = hedgeMaterials.marigold;
                else if (type === "dandelion" && Math.random() < 0.42) detailMat = hedgeMaterials.dandelion;
                else if (type === "purple" && Math.random() < 0.42) detailMat = hedgeMaterials.purple;
                
                const detGeom = new THREE.PlaneGeometry(0.25 * Math.random() + 0.45, 0.25 * Math.random() + 0.45);
                const detailMesh = new THREE.Mesh(detGeom, detailMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.2 * TILE_SIZE + 0.4 * Math.random();
                
                detailMesh.position.set(Math.cos(angle) * radius, detailY, Math.sin(angle) * radius);
                detailMesh.rotation.y = -angle + Math.PI / 2 + (0.8 * Math.random() - 0.4);
                detailMesh.rotation.x = 0.2 * Math.random() - 0.1;
                detailMesh.rotation.z = 0.4 * Math.random() - 0.2;

        function wrapCanvasText(ctx, text, maxWidth) {
            const words = text.split(" ");
            const lines = [];
            let currentLine = words[0] || "";
            for (let i = 1; i < words.length; i++) {
                const testLine = currentLine + " " + words[i];
                if (ctx.measureText(testLine).width > maxWidth) {
                    lines.push(currentLine);
                    currentLine = words[i];
                } else {
                    currentLine = testLine;
                }
            }
            lines.push(currentLine);
            return lines;
        }

        function generateNotePaperImage(text) {
            const canvas = document.createElement("canvas");
            canvas.width = 512;
            canvas.height = 384;
            const ctx = canvas.getContext("2d");

            ctx.fillStyle = "#e8d9b5";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 140; i++) {
                const shade = Math.random() > 0.5 ? "rgba(120, 96, 60, 0.10)" : "rgba(180, 150, 100, 0.12)";
                ctx.fillStyle = shade;
                const rw = 10 + Math.random() * 60;
                const rh = 6 + Math.random() * 30;
                ctx.beginPath();
                ctx.ellipse(Math.random() * canvas.width, Math.random() * canvas.height, rw, rh, Math.random() * Math.PI, 0, Math.PI * 2);
                ctx.fill();
            }

            const grad = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, canvas.width * 0.25, canvas.width / 2, canvas.height / 2, canvas.width * 0.65);
            grad.addColorStop(0, "rgba(0,0,0,0)");
            grad.addColorStop(1, "rgba(60, 40, 20, 0.55)");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(60, 40, 20, 0.5)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            const edgePoints = 26;
            for (let i = 0; i <= edgePoints; i++) {
                const t = i / edgePoints;
                const x = t * canvas.width;
                const jag = 4 + Math.random() * 6;
                if (i === 0) ctx.moveTo(x, jag); else ctx.lineTo(x, jag * (i % 2 === 0 ? 1 : 0.4));
            }
            ctx.stroke();

            ctx.fillStyle = "#3a2c18";
            ctx.textBaseline = "top";
            const fontSize = 30;
            ctx.font = `italic ${fontSize}px Georgia, serif`;
            const marginX = 56;
            const maxWidth = canvas.width - marginX * 2;
            const lines = wrapCanvasText(ctx, text, maxWidth);
            const lineHeight = fontSize * 1.35;
            const totalHeight = lines.length * lineHeight;
            let startY = (canvas.height - totalHeight) / 2;

            ctx.save();
            ctx.translate(canvas.width / 2, 0);
            ctx.rotate(-0.015);
            ctx.translate(-canvas.width / 2, 0);
            lines.forEach((line, idx) => {
                ctx.fillText(line, marginX, startY + idx * lineHeight);
            });
            ctx.restore();

            return canvas.toDataURL("image/png");
        }

        function pickRandomNoteText() {
            if (NOTE_BANK.length === 0) return "...the ink has worn away entirely.";
            return NOTE_BANK[Math.floor(Math.random() * NOTE_BANK.length)];
        }

        function showCaughtNote() {
            const text = pickRandomNoteText();
            const dataUrl = generateNotePaperImage(text);
            document.getElementById("note-paper-img").src = dataUrl;
            isReadingNote = true;
            moveF = moveB = moveL = moveR = false;
            document.getElementById("note-overlay").classList.add("active");
            document.getElementById("crosshair").style.opacity = "0";
            hudElement.classList.remove("visible");
            document.exitPointerLock();
        }

        function closeCaughtNote() {
            isReadingNote = false;
            document.getElementById("note-overlay").classList.remove("active");
            document.getElementById("crosshair").style.opacity = "0.4";
        }
        
        function setupControls() {
            window.addEventListener("click", () => {
                if (typeof ambientLoopSound !== "undefined" && ambientLoopSound && !ambientLoopSound.isPlaying && ambientLoopSound.buffer) {
                    ambientLoopSound.play();
                }
                if (!isInspectingBook && !isReadingNote) document.body.requestPointerLock();
            });
            
            document.addEventListener("mousemove", (e) => {
                if (document.pointerLockElement !== document.body || isInspectingBook || isReadingNote) return;
                yaw -= e.movementX * MOUSE_SENSITIVITY;
                pitch = Math.max(-1.4, Math.min(1.4, pitch - e.movementY * MOUSE_SENSITIVITY));
                camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, "YXZ"));
            });
            
            document.addEventListener("keydown", (e) => {
                if (isReadingNote) {
                    if (e.code === "KeyE") closeCaughtNote();
                    return;
                }

                if (isInspectingBook) {
                    if (e.code === "KeyE") closeBookInterface();
                    if (e.code === "KeyD") {
                        currentBookPhotoIndex = (currentBookPhotoIndex + 1) % NOTEBOOK_PAGES.length;
                        updateBookPhotoDisplay();
                        playAudioInstance(cameraClickBuffer, "cameraClick");
                    }
                    if (e.code === "KeyA") {
                        currentBookPhotoIndex = (currentBookPhotoIndex - 1 + NOTEBOOK_PAGES.length) % NOTEBOOK_PAGES.length;
                        updateBookPhotoDisplay();
                        playAudioInstance(cameraClickBuffer, "cameraClick");
                    }
                    return;
                }
                
                if (e.code === "Digit1" && hotbar[0] === "fishingRod") {
                    rodEquipped = !rodEquipped;
                    document.getElementById("slot1").classList.toggle("active", rodEquipped);
                    if (fishingRodGroup) fishingRodGroup.visible = rodEquipped;
                }
                
                if (fishingState === "idle") {
                    if (e.code === "KeyW") moveF = true;
                    if (e.code === "KeyS") moveB = true;
                    if (e.code === "KeyA") moveL = true;
                    if (e.code === "KeyD") moveR = true;
                }
                
                if (e.code === "KeyE") executeInteraction();
            });
            
            document.addEventListener("keyup", (e) => {
                if (e.code === "KeyW") moveF = false;
                if (e.code === "KeyS") moveB = false;
                if (e.code === "KeyA") moveL = false;
                if (e.code === "KeyD") moveR = false;
            });
            
            window.addEventListener("resize", () => {
                camera.aspect = RETRO_WIDTH / RETRO_HEIGHT;
                camera.updateProjectionMatrix();
            });
        }

        function checkCollisionAndHeight(pos) {
            if (pos.x < 0 || pos.x >= WORLD_WIDTH || pos.z < 0 || pos.z >= WORLD_DEPTH) return { valid: false };
            
            const bounds = [
                { x: pos.x - PLAYER_RADIUS, z: pos.z - PLAYER_RADIUS },
                { x: pos.x + PLAYER_RADIUS, z: pos.z - PLAYER_RADIUS },
                { x: pos.x - PLAYER_RADIUS, z: pos.z + PLAYER_RADIUS },
                { x: pos.x + PLAYER_RADIUS, z: pos.z + PLAYER_RADIUS }
            ];
            
            let floorHeight = 0;
            for (let point of bounds) {
                const gridX = Math.floor(point.x / TILE_SIZE);
                const gridZ = Math.floor(point.z / TILE_SIZE);
                if (gridX >= 0 && gridX < GRID_WIDTH && gridZ >= 0 && gridZ < GRID_HEIGHT) {
                    const id = MAP_GRID[gridZ][gridX];
                    if (id === 1 || id === 4 || id === 7 || id === 9) return { valid: false };
                    if (id === 6) floorHeight = Math.max(floorHeight, DOCK_ELEVATION);
                }
            }
            
            for (let obj of solidObjects) {
                if (pos.x + PLAYER_RADIUS > obj.minX && pos.x - PLAYER_RADIUS < obj.maxX && pos.z + PLAYER_RADIUS > obj.minZ && pos.z - PLAYER_RADIUS < obj.maxZ) {
                    return { valid: false };
                }
            }
            return { valid: true, floorHeight: floorHeight };
        }
        
        let dynamicTargetItem = null;
        function runRaycastCheck() {
            if (isInspectingBook || isReadingNote) return;
            if (document.pointerLockElement !== document.body) {
                hudElement.classList.remove("visible");
                dynamicTargetItem = null;
                return;
            }
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersections = raycaster.intersectObjects(interactiveObjects);
            
            if (intersections.length > 0 && intersections[0].distance < 2.5) {
                const target = intersections[0].object;
                dynamicTargetItem = target;
                if (target.userData.isBarrel) {
                    hudElement.innerHTML = hasFishingRod ? "An old barrel holding spare fishing rods." : "[E] Take a Fishing Rod";
                } else if (target.userData.isStereo) {
                    hudElement.innerHTML = "[E] Change Boombox Station";
                } else if (target.userData.isBook) {
                    hudElement.innerHTML = "[E] Read Leather Notebook";
                } else {
                    hudElement.innerHTML = `[E] Interact with ${target.userData.name}`;
                }
                hudElement.classList.add("visible");
                return;
            }
            
            const gridX = Math.floor(camera.position.x / TILE_SIZE);
            const gridZ = Math.floor(camera.position.z / TILE_SIZE);
            
            if (gridX >= 0 && gridX < GRID_WIDTH && gridZ >= 0 && gridZ < GRID_HEIGHT && MAP_GRID[gridZ][gridX] === 6) {
                if (fishingState !== "idle") {
                    hudElement.classList.remove("visible");
                    dynamicTargetItem = null;
                } else if (hasFishingRod) {
                    if (rodEquipped) {
                        dynamicTargetItem = { userData: { name: "Ocean", isWaterHotspot: true } };
                        hudElement.innerHTML = "[E] Cast Fishing Line";
                        hudElement.classList.add("visible");
                    } else {
                        hudElement.innerHTML = "Press 1 to equip your fishing rod.";
                        hudElement.classList.add("visible");
                    }
                } else {
                    hudElement.innerHTML = "You need a fishing rod to fish. Look for a barrel on the sand.";
                    hudElement.classList.add("visible");
                }
            } else {
                hudElement.classList.remove("visible");
                dynamicTargetItem = null;
            }
        }
        
        function executeInteraction() {
            if (dynamicTargetItem && dynamicTargetItem.userData.isBarrel) {
                if (!hasFishingRod) {
                    hasFishingRod = true;
                    hotbar[0] = "fishingRod";
                    document.getElementById("slot1").innerHTML = "🎣";
                    document.getElementById("hotbar").style.display = "flex";
                    hudElement.innerHTML = "Got the Fishing Rod! Press 1 to equip.";
                    playAudioInstance(barrelGrabBuffer, "barrelGrab");
                    setTimeout(() => { hudElement.classList.remove("visible"); }, 2000);
                }
            } else if (dynamicTargetItem && dynamicTargetItem.userData.isStereo) {
                cycleStereoChannel();
            } else if (dynamicTargetItem && dynamicTargetItem.userData.isBook) {
                openBookInterface();
            } else if (fishingState === "idle" && dynamicTargetItem && dynamicTargetItem.userData.isWaterHotspot) {
                if (rodEquipped) {
                    fishingState = "casting";
                    fishingTimer = 0;
                    playAudioInstance(fishingCastBuffer, "fishingCast");
                    hudElement.classList.remove("visible");
                    dynamicTargetItem = null;
                } else {
                    hudElement.innerHTML = "Equip your rod first! [Press 1]";
                    hudElement.classList.add("visible");
                    setTimeout(() => { hudElement.classList.remove("visible"); }, 2000);
                }
            } else {
                if (fishingState === "bite") {
                    playAudioInstance(fishingCastBuffer, "fishingCast");
                    fishingState = "idle";
                    qteBarContainer.style.display = "none";
                    removeSplashEffect();
                    if (qtePosition >= 40 && qtePosition <= 60) {
                        totalFishCaught++;
                        if (rodPoleMesh) rodPoleMesh.rotation.set(0.3, -0.4, 0.1);
                        showCaughtNote();
                    } else {
                        if (rodPoleMesh) rodPoleMesh.rotation.set(0.3, -0.4, 0.1);
                        hudElement.innerHTML = "The line went slack... whatever it was got away.";
                        hudElement.classList.add("visible");
                        setTimeout(() => { hudElement.classList.remove("visible"); }, 2000);
                    }
                    return;
                }
                
                if (fishingState === "waiting" || fishingState === "casting") {
                    fishingState = "idle";
                    qteBarContainer.style.display = "none";
                    removeSplashEffect();
                    return;
                }
            }
        }

        function openBookInterface() {
            isInspectingBook = true;
            currentBookPhotoIndex = 0;
            moveF = moveB = moveL = moveR = false;
            updateBookPhotoDisplay();
            playAudioInstance(cameraClickBuffer, "cameraClick");
            document.getElementById("book-overlay").classList.add("active");
            document.getElementById("crosshair").style.opacity = "0";
            document.getElementById("interaction-hud").classList.remove("visible");
            document.exitPointerLock();
        }

        function closeBookInterface() {
            isInspectingBook = false;
            playAudioInstance(cameraClickBuffer, "cameraClick");
            document.getElementById("book-overlay").classList.remove("active");
            document.getElementById("crosshair").style.opacity = "0.4";
        }

        function updateBookPhotoDisplay() {
            if (NOTEBOOK_PAGES.length !== 0) {
                document.getElementById("book-display-photo").src = NOTEBOOK_PAGES[currentBookPhotoIndex];
                document.getElementById("book-index").innerHTML = `PAGE_00${currentBookPhotoIndex + 1}.JPG [${currentBookPhotoIndex + 1}/${NOTEBOOK_PAGES.length}]`;
            }
        }
        
        function triggerSingleRippleBurst(pos) {
            const geometry = new THREE.RingGeometry(0.1, 1, 8);
            const texture = createRippleTexture();
            for (let i = 0; i < 3; i++) {
                const material = new THREE.MeshStandardMaterial({ map: texture, transparent: true, opacity: 0.85, side: THREE.DoubleSide, depthWrite: false, roughness: 0.2 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.rotation.x = -Math.PI / 2;
                const offset = 0.05 * (Math.random() - 0.5);
                mesh.position.set(pos.x + offset, 0.01, pos.z + offset);
                mesh.scale.set(0.05, 0.05, 0.05);
                scene.add(mesh);
                activeRipples.push({ mesh: mesh, material: material, scale: 0.05 + 0.15 * i, growthSpeed: 1.8 - 0.4 * i, life: 0.9 - 0.08 * i });
            }
        }
        
        function spawnSplashEffect() {
            removeSplashEffect();
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            savedSplashPos = camera.position.clone().add(forward.multiplyScalar(2.2));
            activeThrashes = [
                { delay: 0, triggered: false },
                { delay: 0.35, triggered: false },
                { delay: 1.2, triggered: false },
                { delay: 1.55, triggered: false }
            ];
            if (waterSplashBuffer) playAudioInstance(waterSplashBuffer, "waterSplash");
        }
        
        function removeSplashEffect() {
            activeRipples.forEach(ripple => {
                scene.remove(ripple.mesh);
                ripple.mesh.geometry.dispose();
                ripple.material.dispose();
            });
            activeRipples = [];
            activeThrashes = [];
        }
        
        function updateFishingLogic(delta) {
            if (!hasFishingRod || isInspectingBook || isReadingNote) return;
            
            if (fishingState === "idle") {
                const swayTime = 0.002 * Date.now();
                let baseSwayX = 0.3;
                if (rodPoleMesh) {
                    if (moveF || moveB || moveL || moveR) {
                        rodPoleMesh.rotation.x = baseSwayX + 0.04 * Math.sin(2 * swayTime);
                        rodPoleMesh.rotation.z = 0.1 + 0.02 * Math.cos(swayTime);
                    } else {
                        rodPoleMesh.rotation.x = baseSwayX + 0.01 * Math.sin(swayTime);
                        rodPoleMesh.rotation.z = 0.1;
                    }
                }
                return;
            }
            
            moveF = moveB = moveL = moveR = false;
            fishingTimer += delta;
            
            if (fishingState === "casting") {
                if (rodPoleMesh) {
                    if (fishingTimer < 0.4) {
                        rodPoleMesh.rotation.x = THREE.MathUtils.lerp(0.3, -0.4, fishingTimer / 0.4);
                    } else {
                        rodPoleMesh.rotation.x = THREE.MathUtils.lerp(-0.4, 0.1, (fishingTimer - 0.4) / 1.1);
                    }
                }
                if (fishingTimer > 1.5) {
                    fishingState = "waiting";
                    fishingTimer = 0;
                    fishBiteWindow = 2 + 4 * Math.random();
                }
            }
            
            if (fishingState === "waiting") {
                if (rodPoleMesh) {
                    rodPoleMesh.rotation.x = 0.1 + 0.005 * Math.sin(0.001 * Date.now());
                }
                if (fishingTimer > fishBiteWindow) {
                    fishingState = "bite";
                    fishingTimer = 0;
                    qtePosition = 0;
                    qteDirection = 1;
                    qteBarContainer.style.display = "flex";
                    spawnSplashEffect();
                }
            }
            
            if (fishingState === "bite") {
                if (rodPoleMesh) {
                    rodPoleMesh.rotation.x = 0.1 + 0.1 * Math.sin(0.04 * Date.now());
                }
                qtePosition += QTE_SPEED * delta * qteDirection;
                if (qtePosition >= 97) { qtePosition = 97; qteDirection = -1; }
                if (qtePosition <= 0) { qtePosition = 0; qteDirection = 1; }
                qteIndicatorLine.style.left = qtePosition + "%";
                
                activeThrashes.forEach(thrash => {
                    if (!thrash.triggered && fishingTimer >= thrash.delay) {
                        triggerSingleRippleBurst(savedSplashPos);
                        thrash.triggered = true;
                    }
                });
                
                if (fishingTimer > 2.5) {
                    playAudioInstance(fishingCastBuffer, "fishingCast");
                    fishingState = "idle";
                    qteBarContainer.style.display = "none";
                    removeSplashEffect();
                    hudElement.innerHTML = "The line went slack. Whatever it was got away.";
                    hudElement.classList.add("visible");
                    setTimeout(() => { hudElement.classList.remove("visible"); }, 2000);
                }
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            updateFishingLogic(delta);
            
            if (oceanTexture) {
                oceanTexture.offset.x += 0.045 * delta;
                oceanTexture.offset.y += 0.022 * delta;
            }
            
            for (let i = activeRipples.length - 1; i >= 0; i--) {
                const ripple = activeRipples[i];
                ripple.life -= 0.8 * delta;
                if (ripple.life <= 0) {
                    scene.remove(ripple.mesh);
                    ripple.mesh.geometry.dispose();
                    ripple.material.dispose();
                    activeRipples.splice(i, 1);
                } else {
                    ripple.scale += ripple.growthSpeed * delta;
                    ripple.mesh.scale.set(ripple.scale, ripple.scale, ripple.scale);
                    ripple.material.opacity = 0.8 * ripple.life;
                }
            }
            
            if (document.pointerLockElement === document.body && !isInspectingBook && !isReadingNote) {
                const forwardVec = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const rightVec = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                forwardVec.y = 0;
                rightVec.y = 0;
                forwardVec.normalize();
                rightVec.normalize();
                
                let moveDir = new THREE.Vector3();
                if (moveF) moveDir.add(forwardVec);
                if (moveB) moveDir.sub(forwardVec);
                if (moveR) moveDir.add(rightVec);
                if (moveL) moveDir.sub(rightVec);
                
                if (moveDir.lengthSq() > 0) {
                    moveDir.normalize();
                    const step = moveDir.multiplyScalar(WALK_SPEED * delta);
                    let plannedPos = camera.position.clone().add(step);
                    let check = checkCollisionAndHeight(plannedPos);
                    
                    if (check.valid) {
                        camera.position.x = plannedPos.x;
                        camera.position.z = plannedPos.z;
                        currentEyeHeightTarget = check.floorHeight + 1.5;
                    } else {
                        let slideX = plannedPos.clone();
                        slideX.z = camera.position.z;
                        let checkX = checkCollisionAndHeight(slideX);
                        if (checkX.valid) {
                            camera.position.x = slideX.x;
                            currentEyeHeightTarget = checkX.floorHeight + 1.5;
                        } else {
                            let slideZ = plannedPos.clone();
                            slideZ.x = camera.position.x;
                            let checkZ = checkCollisionAndHeight(slideZ);
                            if (checkZ.valid) {
                                camera.position.z = slideZ.z;
                                currentEyeHeightTarget = checkZ.floorHeight + 1.5;
                            }
                        }
                    }
                    
                    bobTimer += 12 * delta;
                    cameraActualY = currentEyeHeightTarget + Math.sin(bobTimer) * 0.04;
                    timeSinceLastStep += delta;
                    
                    if (timeSinceLastStep >= Time_Between_Steps) {
                        timeSinceLastStep = 0;
                        let playerGridX = Math.floor(camera.position.x / TILE_SIZE);
                        let playerGridZ = Math.floor(camera.position.z / TILE_SIZE);
                        
                        if (playerGridZ >= 0 && playerGridZ < GRID_HEIGHT && playerGridX >= 0 && playerGridX < GRID_WIDTH) {
                            let currentGridId = MAP_GRID[playerGridZ][playerGridX];
                            
                            if (currentGridId === 9) {
                                playAudioInstance(beatboxBuffer, "beatbox");
                            } else if (currentGridId === 6) {
                                playAudioInstance(woodStepBuffer, "woodStep");
                            } else if (currentGridId === 2) {
                                playAudioInstance(sandStepBuffer, "sandStep");
                            } else {
                                playAudioInstance(dirtStepBuffer, "dirtStepBuffer");
                            }
                        }
                    }
                } else {
                    cameraActualY += 0.15 * (currentEyeHeightTarget - cameraActualY);
                    timeSinceLastStep = Time_Between_Steps;
                }
            }
            
            camera.position.y = cameraActualY;
            runRaycastCheck();
            
            if (skyDomeMesh) skyDomeMesh.position.copy(camera.position);
            if (retroStarField) retroStarField.position.copy(camera.position);
            
            renderer.render(scene, camera);
        }
        init();
    </script>
