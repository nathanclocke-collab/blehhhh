<!DOCTYPE html>
<html>
  <head>
    <title>Objects</title>
  </head>
  <body>
    <script>
      const product = {
        name: 'socks', //separate with a comma
        price: 1090
        //this is called the property
      };
      console.log(product);
      console.log(product.name); 
      //put the "." and then the thing you want to log individually
      console.log(product.price);

      product.name = 'cotton socks';
      console.log(product);

      product.newProperty = true
      console.log(product);

      delete product.newProperty;
      console.log(product);






    </script>
  </body>
</html>


//an object groups multiple values together
//you can then pull these values in the console together or individually
//objects make our code more organized by grouping/using it together
