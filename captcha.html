<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Captcha Component - Image Select</title>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css"
        integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk"
        crossorigin="anonymous">

    <style>
        /* ============================================================
           CONFIG - this is the only part you need to touch.
           ============================================================ */
        /*
          1. Set IMAGE_SRC below (in the <script> at the bottom) to your image.
          2. Set CORRECT_TILES to the tile numbers (0-8, left-to-right,
             top-to-bottom) that should be considered "correct".
          3. Set PROMPT_LABEL to whatever you want the target to say
             (e.g. "traffic lights", "cats", "the birthday cake").
        */

        /* General page styling just to center the captcha */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 1. THE MAIN OUTSIDE CONTAINER (same as text captcha) */
        .captcha-card {
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid #e1e4e8;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }

        .captcha-card h3 {
            margin-top: 0;
            color: #333;
            margin-bottom: 4px;
        }

        .captcha-card .subtext {
            color: #666;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .captcha-card .subtext strong {
            color: #222;
        }

        /* 2. IMAGE GRID (replaces the text captcha-row) */
        #grid-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 20px auto;
            border: 2px dashed #6c757d;
            border-radius: 6px;
            overflow: hidden;
        }

        #image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
        }

        .grid-tile {
            position: relative;
            background-repeat: no-repeat;
            /* background-size and background-position are set inline per tile via JS */
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
        }

        .grid-tile .check-overlay {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .grid-tile .check-overlay i {
            color: #228be6;
            font-size: 13px;
        }

        .grid-tile.selected {
            box-shadow: inset 0 0 0 3px #228be6;
        }

        .grid-tile.selected .check-overlay {
            opacity: 1;
        }

        /* 4. THE REFRESH BUTTON (kept identical) */
        .refresh-row {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        .refresh-btn {
            background: #f1f3f5;
            border: 1px solid #ced4da;
            color: #495057;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
        }
        .refresh-btn:hover {
            background: #e9ecef;
            color: #000;
        }

        /* 6. VERIFY BUTTON (same as text captcha) */
        #btn {
            width: 100%;
            background-color: #228be6;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #btn:hover {
            background-color: #1c7ed6;
        }

        /* NEW: Verification icon badge (checkmark / cross) */
        #verify-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            margin: 14px auto 0 auto;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            transform: scale(0.6);
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
        }

        #verify-icon.show {
            display: flex;
            transform: scale(1);
            opacity: 1;
        }

        #verify-icon.icon-match {
            background-color: #2b8a3e;
        }

        #verify-icon.icon-error {
            background-color: #c92a2a;
        }

        /* 7. STATUS MESSAGE (same as text captcha) */
        #key {
            margin-top: 15px;
            font-weight: 600;
            font-size: 15px;
        }
        .status-match {
            color: #2b8a3e;
        }
        .status-error {
            color: #c92a2a;
        }
    </style>
</head>

<body>

    <div class="captcha-card">
        <h3>Verify You're Human</h3>
        <p class="subtext">Select all squares with <strong id="prompt-label"></strong></p>

        <div id="grid-wrapper">
            <div id="image-grid"></div>
        </div>

        <div class="refresh-row">
            <button class="refresh-btn" onclick="generate()" title="New challenge">
                <i class="fas fa-sync"></i> New challenge
            </button>
        </div>

        <input type="submit" id="btn" value="Verify" onclick="verify()" />

        <div id="verify-icon"><i class="fas fa-check"></i></div>

        <p id="key"></p>
    </div>

    <script>
        /* ============================================================
           CONFIG - EDIT THESE THREE THINGS
           ============================================================ */

        // Path or URL to your image. It will be sliced into a 3x3 grid.
        const IMAGE_SRC = "mr-president.png";

        // Which tiles (0-8, left-to-right / top-to-bottom, like a phone
        // number pad) count as "correct". Example below marks the
        // top-middle and center tiles as correct.
        const CORRECT_TILES = [1, 4, 7];

        // What the prompt should say, e.g. "Mr. President"
        const PROMPT_LABEL = "Mr. President";

        /* ============================================================
           Below this line is just plumbing - shouldn't need to touch it
           ============================================================ */

        const GRID_SIZE = 3; // 3x3
        let selectedTiles = new Set();

        function buildGrid() {
            const grid = document.getElementById("image-grid");
            grid.innerHTML = "";
            selectedTiles = new Set();

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const row = Math.floor(i / GRID_SIZE);
                const col = i % GRID_SIZE;

                const tile = document.createElement("div");
                tile.className = "grid-tile";
                tile.dataset.index = i;

                // Slice the single image into a 3x3 grid using background-size
                // (300%) and background-position (0/50/100% per axis).
                tile.style.backgroundImage = `url("${IMAGE_SRC}")`;
                tile.style.backgroundSize = `${GRID_SIZE * 100}% ${GRID_SIZE * 100}%`;
                tile.style.backgroundPosition =
                    `${(col / (GRID_SIZE - 1)) * 100}% ${(row / (GRID_SIZE - 1)) * 100}%`;

                const overlay = document.createElement("div");
                overlay.className = "check-overlay";
                overlay.innerHTML = '<i class="fas fa-check"></i>';
                tile.appendChild(overlay);

                tile.addEventListener("click", () => toggleTile(tile, i));
                grid.appendChild(tile);
            }
        }

        function toggleTile(tileEl, index) {
            if (selectedTiles.has(index)) {
                selectedTiles.delete(index);
                tileEl.classList.remove("selected");
            } else {
                selectedTiles.add(index);
                tileEl.classList.add("selected");
            }
        }

        function generate() {
            document.getElementById("prompt-label").innerText = PROMPT_LABEL;
            document.getElementById("key").innerHTML = "";

            const icon = document.getElementById("verify-icon");
            icon.classList.remove("show", "icon-match", "icon-error");

            buildGrid();
        }

        function verify() {
            const messageElement = document.getElementById("key");
            const icon = document.getElementById("verify-icon");
            const correctSet = new Set(CORRECT_TILES);

            const isExactMatch =
                selectedTiles.size === correctSet.size &&
                [...selectedTiles].every(i => correctSet.has(i));

            icon.classList.remove("icon-match", "icon-error");

            if (isExactMatch) {
                messageElement.innerHTML = "✓ Verified successfully!";
                messageElement.className = "status-match";

                icon.innerHTML = '<i class="fas fa-check"></i>';
                icon.classList.add("icon-match", "show");
            } else {
                messageElement.innerHTML = "✗ Incorrect selection. Try again.";
                messageElement.className = "status-error";

                icon.innerHTML = '<i class="fas fa-times"></i>';
                icon.classList.add("icon-error", "show");

                setTimeout(generate, 1200); // give them a moment to see the red X before it resets
            }
        }

        generate();
    </script>

</body>
</html>
