<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McMaster Sign Language Club - Game</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root {
            --primary: #8cd3e4;
            --primary-hover: #72bdcf;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #222222;
            --success: #10b981;
            --error: #ef4444;
            --muted: #666666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: var(--card-bg);
            padding: 25px 30px 30px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #e0e0e0;
        }

        /* Top Header Navigation */
        .global-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f2f5;
            margin-bottom: 20px;
        }

        .exit-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.15s;
        }

        .exit-link:hover {
            color: var(--error);
        }

        .header-status {
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 600;
        }

        h1 {
            margin-top: 5px;
            font-size: 1.5rem;
            color: #222;
            font-weight: 700;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            background: #f4f6f9;
            padding: 10px 15px;
            border-radius: 8px;
        }

        #timer.penalty {
            color: var(--error);
            animation: pulse 0.3s ease-in-out;
        }

        .flashcard {
            width: 100%;
            height: 250px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #fafafa;
        }

        .flashcard img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .input-area {
            margin-bottom: 20px;
        }

        .letter-input, .text-input {
            font-size: 1.2rem;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            outline: none;
            text-align: center;
            font-family: inherit;
        }

        .text-input {
            width: 80%;
            margin-bottom: 5px;
        }

        .letter-input {
            width: 60px;
            height: 60px;
            font-size: 2rem;
            text-transform: lowercase; /* Keeps text rendering clean */
            font-weight: bold;
        }

        .letter-input.correct { border-color: var(--success); background-color: #ecfdf5; }
        .letter-input.wrong { border-color: var(--error); background-color: #fef2f2; animation: shake 0.2s ease-in-out 2; }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
        }

        .btn {
            background-color: var(--primary);
            color: #222;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 80%;
            box-sizing: border-box;
            transition: background 0.2s;
        }
        .btn:hover { background-color: var(--primary-hover); }

        .hidden { display: none !important; }

        .score-list { list-style: none; padding: 0; margin: 15px 0; text-align: left; }
        .score-list li { padding: 10px 12px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; font-size: 0.95rem; }
        .score-list li:last-child { border-bottom: none; }

        .front-podium {
            margin: 25px 0 15px 0;
            background-color: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 15px;
            border-radius: 8px;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    </style>
</head>
<body>

<div class="game-container">
    
    <div class="global-header">
        <a class="exit-link" onclick="handleExit(event)">✕ Exit to Home</a>
        <div id="header-status" class="header-status">ASL Challenge</div>
    </div>
    
    <div id="start-screen">
        <h1>ASL Alphabet Speedrun</h1>
        <p style="margin: 10px 0; color: #555; font-size: 0.95rem;">Guess 10 signs as fast as you can. +1s penalty for mistakes!</p>
        
        <div class="front-podium">
            <h3 style="font-size: 0.95rem; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;">Top 3:</h3>
            <ol id="front-leaderboard" class="score-list" style="margin: 0;"></ol>
        </div>

        <div style="margin: 15px 0;">
            <input type="text" id="player-name" class="text-input" placeholder="Enter your name/initials" maxlength="15">
        </div>
        
        <div class="btn-container">
            <button class="btn" onclick="validateAndStart()">Start Game</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="stats-bar">
            <div>Time: <span id="timer">0.0s</span></div>
        </div>
        
        <div class="flashcard"><img id="sign-image" src="" alt="Sign Language Letter"></div>
        <div class="input-area">
            <input type="text" id="guess-input" class="letter-input" maxlength="1" autofocus autocomplete="off">
        </div>
    </div>

    <div id="end-screen" class="hidden">
        <h1>Complete!</h1>
        <p style="margin: 10px 0;">Your Final Time: <strong id="final-time" style="font-size: 1.3rem; color: #222;">0.0 seconds</strong></p>
        <p id="penalty-breakdown" style="font-size: 0.85rem; color: var(--muted); margin-top: -5px; margin-bottom: 15px;"></p>
        
        <h3 style="font-size: 1.1rem; border-bottom: 2px solid #8cd3e4; padding-bottom: 5px; text-align: left;">Global Top 5 Scores</h3>
        <ol id="end-leaderboard" class="score-list"><li>Loading high scores...</li></ol>

        <div class="btn-container">
            <button class="btn" onclick="showStartScreen()">Play Again</button>
        </div>
    </div>
</div>

<script>
    const SCORES_DATABASE_URL = "https://mac-slc-home-default-rtdb.firebaseio.com/scores.json";

    // 1. Lowercase base alphabet
    const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
    let gameQueue = [], currentItemIndex = 0, correctCount = 0, wrongCount = 0;
    let startTime, penaltyTime = 0, timerInterval, playerName = "";
    let isGameActive = false;

    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const endScreen = document.getElementById('end-screen');
    const signImage = document.getElementById('sign-image');
    const guessInput = document.getElementById('guess-input');
    const timerText = document.getElementById('timer');
    const finalTimeText = document.getElementById('final-time');
    const penaltyBreakdownText = document.getElementById('penalty-breakdown');
    const headerStatus = document.getElementById('header-status');
    const frontLeaderboard = document.getElementById('front-leaderboard');
    const endLeaderboard = document.getElementById('end-leaderboard');

    guessInput.addEventListener('input', checkAnswer);

    window.addEventListener('DOMContentLoaded', fetchAndDisplayScores);

    function validateAndStart() {
        const nameInput = document.getElementById('player-name').value.trim();
        if (!nameInput) {
            alert("Please enter a name to join the global leaderboard!");
            return;
        }
        playerName = nameInput;
        startGame();
    }

    function startGame() {
        correctCount = 0; wrongCount = 0; currentItemIndex = 0; penaltyTime = 0;
        isGameActive = true;
        headerStatus.textContent = `Progress: 0/10`;
        timerText.textContent = '0.0s';
        guessInput.value = ''; guessInput.className = 'letter-input';

        const shuffled = [...alphabet].sort(() => 0.5 - Math.random());
        gameQueue = shuffled.slice(0, 10);

        startScreen.classList.add('hidden');
        endScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        loadNextCard();
        setTimeout(() => guessInput.focus(), 50);
        
        startTime = performance.now();
        timerInterval = setInterval(updateTimer, 100);
    }

    function updateTimer() {
        const elapsed = (performance.now() - startTime) + penaltyTime;
        timerText.textContent = (elapsed / 1000).toFixed(1) + 's';
    }

    function loadNextCard() {
        if (correctCount >= 10) { endGame(); return; }
        // 2. Verified path loading strict lowercase filenames (e.g. j.jpg)
        signImage.src = `assets/images/asl/${gameQueue[currentItemIndex]}.jpg`;
        headerStatus.textContent = `Progress: ${correctCount}/10`;
    }

    function checkAnswer(e) {
        // 3. Force user input to lowercase to match the queue logic perfectly
        const inputLetter = e.target.value.toLowerCase();
        if (!inputLetter) return;

        if (inputLetter === gameQueue[currentItemIndex]) {
            guessInput.className = 'letter-input correct';
            correctCount++; currentItemIndex++;
            setTimeout(() => {
                guessInput.value = ''; guessInput.className = 'letter-input';
                loadNextCard(); guessInput.focus();
            }, 200);
        } else {
            guessInput.className = 'letter-input wrong';
            penaltyTime += 1000; wrongCount++;
            timerText.classList.add('penalty');
            setTimeout(() => {
                guessInput.value = ''; guessInput.className = 'letter-input';
                timerText.classList.remove('penalty'); guessInput.focus();
            }, 400);
        }
    }

    function handleExit(e) {
        e.preventDefault();
        if (isGameActive) {
            if (confirm("Game in progress! Are you sure you want to abandon this run and leave?")) {
                clearInterval(timerInterval);
                isGameActive = false;
                window.location.href = "index.html"; 
            }
        } else {
            window.location.href = "index.html";
        }
    }

    function saveGlobalScore(name, time) {
        let scorePayload = {
            username: name,
            time: parseFloat(time),
            date: new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric'})
        };

        fetch(SCORES_DATABASE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(scorePayload)
        })
        .then(() => {
            fetchAndDisplayScores();
        })
        .catch(err => console.error("Error updating leaderboard: ", err));
    }

    function fetchAndDisplayScores() {
        fetch(SCORES_DATABASE_URL)
        .then(response => response.json())
        .then(data => {
            frontLeaderboard.innerHTML = '';
            endLeaderboard.innerHTML = '';

            if (!data) {
                const placeholder = '<li>No records yet. Be the first!</li>';
                frontLeaderboard.innerHTML = placeholder;
                endLeaderboard.innerHTML = placeholder;
                return;
            }

            let scoresArray = Object.keys(data).map(key => data[key]);
            scoresArray.sort((a, b) => a.time - b.time);

            let topThree = scoresArray.slice(0, 3);
            topThree.forEach((score, index) => {
                const li = document.createElement('li');
                let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉';
                li.innerHTML = `<span><strong>${medal}</strong> ${score.username} — ${score.time.toFixed(2)}s</span>`;
                frontLeaderboard.appendChild(li);
            });

            let topFive = scoresArray.slice(0, 5);
            topFive.forEach((score, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span><strong>#${index + 1}</strong> ${score.username} — ${score.time.toFixed(2)}s</span> <span style="color: #888; font-size: 0.85rem;">${score.date}</span>`;
                endLeaderboard.appendChild(li);
            });
        })
        .catch(err => {
            frontLeaderboard.innerHTML = '<li>Error loading scores.</li>';
            endLeaderboard.innerHTML = '<li>Error loading scores.</li>';
        });
    }

    function endGame() {
        clearInterval(timerInterval);
        isGameActive = false;
        const totalElapsedTime = (performance.now() - startTime) + penaltyTime;
        const finalTime = (totalElapsedTime / 1000).toFixed(2);
        
        headerStatus.textContent = "Finished!";
        gameScreen.classList.add('hidden');
        endScreen.classList.remove('hidden');
        finalTimeText.textContent = `${finalTime} seconds`;
        
        if (wrongCount > 0) {
            penaltyBreakdownText.textContent = `(Raw Time: ${((totalElapsedTime - penaltyTime)/1000).toFixed(2)}s + ${wrongCount}s in penalties)`;
        } else {
            penaltyBreakdownText.textContent = `Perfect run! No penalties.`;
        }

        saveGlobalScore(playerName, finalTime);
    }

    function showStartScreen() {
        headerStatus.textContent = "ASL Challenge";
        endScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
        fetchAndDisplayScores();
    }
</script>
</body>
</html>
